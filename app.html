async function deleteInvite(invId){
  if(!confirm('Delete this invite code?')) return;
  try{
    await sb.from('invites').delete().eq('id',invId);
    S._adminInvites=(S._adminInvites||[]).filter(i=>i.id!==invId);
    rerender();
  }catch(e){alert('Error deleting invite: '+e.message);}
}

async function deleteUser(userId){
  if(!confirm('Remove this user? They will lose access and need a new invite to rejoin.')) return;
  try{
    await sb.from('user_roles').delete().eq('user_id',userId);
    await sb.from('user_data').delete().eq('user_id',userId);
    S._adminUsers=(S._adminUsers||[]).filter(u=>u.id!==userId);
    rerender();

  const role=document.getElementById('invite-role')?.value||'teacher';

  const code=Math.random().toString(36).slice(2,8).toUpperCase();

    await sb.from('invites').insert({code,role,label,created_by:_currentUser.id,district_id:S._district||null});

async function storeUserMeta(){
  if(!_currentUser) return;
  try{
    const {data}=await sb.from('user_data').select('data').eq('user_id',_currentUser.id).single();
    if(data&&data.data){
      const d={...data.data};
      d._email=_currentUser.email||'';
      d._displayName=_currentUser.user_metadata?.full_name||_currentUser.email||'';
      await sb.from('user_data').upsert({user_id:_currentUser.id,data:d},{onConflict:'user_id'});
    }
  }catch(e){}
}

function buildAssessments(){

function assSend(){
  const student=document.getElementById('ass-student')?.value;
  const type=document.getElementById('ass-type')?.value;
  const respondent=document.getElementById('ass-respondent')?.value;
  const email=document.getElementById('ass-email')?.value;
  const role=document.getElementById('ass-role')?.value;
  if(!student||!respondent||!email){alert('Fill in student, respondent, and email.');return;}
  const types=type==='BOTH'?['QABF','FAST']:[type];

  // Build email HTML
  const assessLinks=types.map(t=>{
    const linkUrl=window.location.origin+'/'+(t==='QABF'?'QABF_Assessment.html':'FAST_Assessment.html')+'?student='+encodeURIComponent(student)+'&respondent='+encodeURIComponent(respondent);
    return `<div style="background:#f8f8f8;padding:12px 16px;border-radius:8px;margin:8px 0;border-left:4px solid ${t==='QABF'?'#7b4ab4':'#3498c0'}">
      <strong>${t==='QABF'?'Questions About Behavioral Function (QABF)':'Functional Assessment Screening Tool (FAST)'}</strong><br>
      <a href="${linkUrl}" style="color:#2b7a78;font-weight:700">${linkUrl}</a>
    </div>`;
  }).join('');

  const emailHtml=`
    <div style="font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:600px;margin:0 auto;padding:20px">
      <div style="background:#1e3a5f;border-radius:12px 12px 0 0;padding:20px;text-align:center">
        <h1 style="color:#fff;font-size:1.3rem;margin:0">BehaviorLog Pro</h1>
        <p style="color:rgba(255,255,255,.6);font-size:.8rem;margin:4px 0 0">Sure Step Education</p>
      </div>
      <div style="background:#fff;border:1px solid #e0e0e0;border-radius:0 0 12px 12px;padding:24px">
        <p style="font-size:.95rem;margin-bottom:16px">Hello ${esc(respondent)},</p>
        <p style="font-size:.9rem;line-height:1.6;margin-bottom:16px">You are being asked to complete a behavioral assessment for <strong>${esc(student)}</strong>. Please click the link below to complete the assessment. It should take approximately ${type==='BOTH'?'15-20':'8-12'} minutes.</p>
        ${assessLinks}
        <p style="font-size:.9rem;line-height:1.6;margin-top:16px">Your responses will be reviewed by the behavior support team. There are no right or wrong answers — please answer based on what you have personally observed.</p>
        <p style="font-size:.9rem;margin-top:20px">Thank you,<br><strong>Sure Step Education Behavior Support Team</strong></p>
      </div>
      <p style="font-size:.72rem;color:#999;text-align:center;margin-top:12px">This is an automated message from BehaviorLog Pro. Please do not reply to this email.</p>
    </div>`;

  // Send email via serverless function
  const btn=document.querySelector('[onclick="assSend()"]');
  if(btn){btn.disabled=true;btn.textContent='Sending…';}

  fetch('/api/send-email',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      to:email,
      toName:respondent,
      subject:'Behavioral Assessment Request — '+student,
      html:emailHtml
    })
  }).then(r=>r.json()).then(data=>{
    if(data.success){
      types.forEach(t=>{
        S._assSent.push({id:t+'-'+uid(),student,type:t,respondent,email,role,sentAt:new Date().toISOString(),status:'pending'});
      });
      persist();
      alert('✅ Assessment'+(types.length>1?'s':'')+' emailed to '+respondent+' at '+email);
      rerender();
    } else {
      alert('❌ Email failed: '+(data.error||'Unknown error')+'\n\nYou can copy the assessment link instead.');
      if(btn){btn.disabled=false;btn.textContent='📧 Send via Email';}
    }
  }).catch(err=>{
    alert('❌ Email failed: '+err.message+'\n\nYou can copy the assessment link instead.');
    if(btn){btn.disabled=false;btn.textContent='📧 Send via Email';}
  });
}

function assCopyLink(){
  const t=document.getElementById('ass-type')?.value||'QABF';
  const student=document.getElementById('ass-student')?.value||'';
  const types=t==='BOTH'?['QABF','FAST']:[t];
  const links=types.map(ty=>window.location.origin+'/'+(ty==='QABF'?'QABF_Assessment.html':'FAST_Assessment.html')+'?student='+encodeURIComponent(student));
  try{navigator.clipboard.writeText(links.join('\n'));alert('Links copied!\n'+links.join('\n'));}catch(e){alert('Links:\n'+links.join('\n'));}
}

function assTabInbox(subs,scoredIds){
  if(!subs.length) return '<div class="empty"><div class="empty-icon">📥</div><p>No submissions yet.</p></div>';
  const thStyle='text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--border)';
  const rows=subs.sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt)).map(s=>{
    const done=scoredIds.has(s.id);
    return `<tr>
      <td style="padding:10px;border-bottom:1px solid var(--border)"><strong>${esc(s.studentName||'Unknown')}</strong><br><span class="muted" style="font-size:.72rem">${esc(s.behavior||'')}</span></td>
      <td style="padding:10px;border-bottom:1px solid var(--border)"><span class="tag" style="background:${s.type==='QABF'?'#f0e6f8;color:#7b4ab4':'#e5f2fa;color:#3498c0'}">${s.type}</span></td>
      <td style="padding:10px;border-bottom:1px solid var(--border);font-size:.82rem">${esc(s.respondent||s.informant||'Unknown')}</td>
      <td style="padding:10px;border-bottom:1px solid var(--border);font-size:.82rem">${fmtDateS(s.submittedAt)}</td>
      <td style="padding:10px;border-bottom:1px solid var(--border)"><span class="tag" style="background:${done?'#e5f2fa;color:var(--accent)':'var(--green-soft);color:#065f46'}">${done?'✅ Scored':'📥 Ready'}</span></td>
      <td style="padding:10px;border-bottom:1px solid var(--border)">
        <button class="btn btn-sm ${done?'btn-ghost':'btn-primary'}" onclick="assScore('${s.id}')">${done?'View':'Score'}</button>
      </td>
    </tr>`;
  }).join('');
  return `<div class="card"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr>
    ${['Student','Type','Respondent','Date','Status',''].map(h=>`<th style="${thStyle}">${h}</th>`).join('')}
  </tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function assScore(subId){
  const subs=getAssSubmissions();
  const sub=subs.find(s=>s.id===subId);
  if(!sub) return;
  const scores=sub.type==='QABF'?scoreQABF(sub):scoreFAST(sub);
  const cats=sub.type==='QABF'?
    {att:{name:'Attention',color:'#4a90d9'},esc:{name:'Escape',color:'#e67e22'},non:{name:'Non-Social',color:'#27ae60'},phy:{name:'Physical',color:'#e74c3c'},tan:{name:'Tangible',color:'#9b59b6'}}:
    {att:{name:'Attention',color:'#4a90d9'},tan:{name:'Tangible',color:'#9b59b6'},esc:{name:'Escape',color:'#e67e22'},sen:{name:'Sensory',color:'#27ae60'},pain:{name:'Pain',color:'#e74c3c'}};
  let highest='',highVal=-1;
  Object.entries(scores).forEach(([k,v])=>{if(v>highVal){highVal=v;highest=k;}});
  
  let bars='';
  Object.entries(cats).forEach(([k,c])=>{
    const v=scores[k]||0;const max=sub.type==='QABF'?15:(k==='sen'||k==='pain'?6:8);
    const pct=Math.round((v/max)*100);const isPrimary=k===highest&&highVal>0;
    bars+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div style="width:110px;font-size:.82rem;font-weight:600">${c.name}${isPrimary?' <span style="background:var(--nav);color:#fff;font-size:.65rem;padding:2px 8px;border-radius:10px">PRIMARY</span>':''}</div>
      <div style="flex:1;height:22px;background:var(--bg2);border-radius:11px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${c.color};border-radius:11px;transition:width .6s"></div></div>
      <div style="width:40px;text-align:right;font-weight:700;font-size:.85rem;color:${c.color}">${v}/${max}</div>
    </div>`;
  });

  const alreadyScored=S._assScored.some(s=>s.submissionId===subId);
  S._scoringTemp={sub,scores,primary:highest};
  S._modal={type:'assScore',content:`
    <h2 style="margin-bottom:14px">Score ${sub.type} — ${esc(sub.studentName||'Student')}</h2>
    <p style="font-size:.84rem;color:var(--muted);margin-bottom:4px"><strong>Respondent:</strong> ${esc(sub.respondent||sub.informant||'Unknown')} · <strong>Behavior:</strong> ${esc(sub.behavior||'N/A')}</p>
    <p class="muted" style="font-size:.78rem;margin-bottom:14px">Submitted ${fmtDate(sub.submittedAt)}</p>
    <div style="background:var(--surface2);border-radius:12px;padding:16px;margin-bottom:12px">${bars}</div>
    ${highVal>0?`<div style="padding:12px;background:var(--green-soft);border-radius:10px;border-left:4px solid var(--accent)"><strong>Primary Function: ${cats[highest]?.name||highest}</strong></div>`:''}
    ${alreadyScored?'':'<button class="btn btn-primary" onclick="assSaveScore()" style="margin-top:12px">✅ Save Score</button>'}
  `};
  rerender();
}

function scoreQABF(sub){
  const catQs={att:[1,6,11,16,21],esc:[2,7,12,17,22],non:[3,8,13,18,23],phy:[4,9,14,19,24],tan:[5,10,15,20,25]};
  const scores={};
  Object.entries(catQs).forEach(([k,qs])=>{let t=0;qs.forEach(q=>{const a=sub.answers[q];if(a&&a.score!=null)t+=a.score;});scores[k]=t;});
  return scores;
}

function scoreFAST(sub){
  const catQs={att:[1,2,3,4,5,6,7,8],tan:[1,2,3,9,10,11,12,13],esc:[1,2,3,14,15,16,17,18],sen:[19,20,21,22,23,24],pain:[19,20,24,25,26,27]};
  const scores={};
  Object.entries(catQs).forEach(([k,qs])=>{let t=0;qs.forEach(q=>{if(sub.answers[q]==='yes')t++;});scores[k]=t;});
  return scores;
}

function assSaveScore(){
  if(!S._scoringTemp) return;
  const{sub,scores,primary}=S._scoringTemp;
  if(S._assScored.some(s=>s.submissionId===sub.id)) return;
  S._assScored.push({submissionId:sub.id,type:sub.type,studentName:sub.studentName,behavior:sub.behavior,respondent:sub.respondent||sub.informant,scores,primary,scoredAt:new Date().toISOString()});
  persist();S._modal=null;S._scoringTemp=null;rerender();
}

function assTabScored(){
  if(!S._assScored.length) return '<div class="empty"><div class="empty-icon">✅</div><p>No scored assessments yet.</p></div>';
  const catColors={att:'#4a90d9',esc:'#e67e22',non:'#27ae60',phy:'#e74c3c',tan:'#9b59b6',sen:'#27ae60',pain:'#e74c3c'};
  return S._assScored.sort((a,b)=>new Date(b.scoredAt)-new Date(a.scoredAt)).map(s=>`<div class="card mb3">
    <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div><strong>${esc(s.studentName)}</strong> <span class="tag" style="background:${s.type==='QABF'?'#f0e6f8;color:#7b4ab4':'#e5f2fa;color:#3498c0'}">${s.type}</span></div>
      <span class="muted" style="font-size:.78rem">${fmtDateS(s.scoredAt)}</span>
    </div>
    <div style="padding:14px 16px">
      <p class="muted" style="font-size:.82rem;margin-bottom:8px">Behavior: ${esc(s.behavior||'N/A')} · Respondent: ${esc(s.respondent||'')}</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${Object.entries(s.scores).map(([k,v])=>`<span class="tag" style="background:${k===s.primary?catColors[k]||'var(--accent)':'var(--bg2)'};color:${k===s.primary?'#fff':'var(--text)'}">${k.toUpperCase()}: ${v}${k===s.primary?' ★':''}</span>`).join('')}</div>
    </div>
  </div>`).join('');
}

function assTabGenerate(){
  const scoredStudents=[...new Set(S._assScored.map(s=>s.studentName).filter(Boolean))];
  if(!scoredStudents.length) return '<div class="empty"><div class="empty-icon">📄</div><p>Score an assessment first to generate a report.</p></div>';
  const selStudent=S._assGenStudent||'';
  const studentScored=selStudent?S._assScored.filter(s=>s.studentName===selStudent):[];
  const genType=S._assGenType;
  return `<div class="card mb4"><div style="padding:14px 16px;font-weight:700;border-bottom:1px solid var(--border)">Step 1 — Select Student</div><div style="padding:16px">
    <div class="slabel">Student (with scored data)</div>
    <select class="input" onchange="S._assGenStudent=this.value;S._assGenType=null;rerender()">
      <option value="">Select…</option>
      ${scoredStudents.map(n=>`<option value="${esc(n)}" ${n===selStudent?'selected':''}>${esc(n)}</option>`).join('')}
    </select>
    ${studentScored.map(s=>`<div style="padding:8px;background:var(--surface2);border-radius:8px;margin-top:8px;font-size:.82rem">
      <span class="tag" style="background:${s.type==='QABF'?'#f0e6f8;color:#7b4ab4':'#e5f2fa;color:#3498c0'}">${s.type}</span>
      Primary: <strong>${(s.primary||'').toUpperCase()}</strong> · ${esc(s.respondent||'')} · ${fmtDateS(s.scoredAt)}
    </div>`).join('')}
  </div></div>
  ${selStudent?`<div class="card"><div style="padding:14px 16px;font-weight:700;border-bottom:1px solid var(--border)">Step 2 — Choose Report</div><div style="padding:16px">
    <div class="grid2 mb3">
      <div onclick="S._assGenType='BIP';rerender()" style="background:${genType==='BIP'?'var(--accent-soft)':'var(--surface)'};border:2px solid ${genType==='BIP'?'var(--accent)':'var(--border)'};border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .15s">
        <div style="font-size:28px;margin-bottom:8px">📋</div>
        <div style="font-weight:800;font-size:.95rem;color:var(--nav)">Behavior Intervention Plan</div>
        <div class="muted" style="font-size:.78rem;margin-top:6px;line-height:1.5">Prevention strategies, replacement behaviors, escalation matrix, data collection.</div>
      </div>
      <div onclick="S._assGenType='FBA';rerender()" style="background:${genType==='FBA'?'var(--accent-soft)':'var(--surface)'};border:2px solid ${genType==='FBA'?'var(--accent)':'var(--border)'};border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .15s">
        <div style="font-size:28px;margin-bottom:8px">🔍</div>
        <div style="font-weight:800;font-size:.95rem;color:var(--nav)">Functional Behavior Assessment</div>
        <div class="muted" style="font-size:.78rem;margin-top:6px;line-height:1.5">Setting events, antecedents, consequences, hypothesis statements.</div>
      </div>
    </div>
    ${genType?`<button class="btn btn-primary" onclick="alert('${genType} generation for '+S._assGenStudent+' — template integration coming soon.')">📄 Generate ${genType} Report</button>`:''}
  </div></div>`:''}`;
}

// Extend modal to handle assessment scoring
const _origBuildModalFn=buildModal;
buildModal=function(){
  if(S._modal&&S._modal.type==='assScore'){
    return `<div class="modal-overlay" onclick="if(event.target===this){S._modal=null;S._scoringTemp=null;rerender();}">
      <div class="modal-body" style="max-width:540px">${S._modal.content}
        <div style="text-align:right;margin-top:16px"><button class="btn btn-ghost" onclick="S._modal=null;S._scoringTemp=null;rerender()">Close</button></div>
      </div>
    </div>`;
  }
  return _origBuildModalFn();
};

// Splash dismiss helper
function dismissSplash(){
  if(window._splashDone) return;
  window._splashDone=true;
  const splash=document.getElementById('splash');
  if(splash){
    splash.style.animation='splashOut .8s ease forwards';
    setTimeout(()=>{splash.remove();document.getElementById('app').style.opacity='1';},800);
  } else {
    document.getElementById('app').style.opacity='1';
  }
}
// Fallback: dismiss after 6s for local testing without auth
setTimeout(()=>{if(!window._splashDone){dismissSplash();if(!_currentUser)rerender();}},6000);

render();

// ── BOOT — async startup ───────────────────────────────────────────────────
async function boot(){
  const authed = await initAuth();
  if(!authed) return;

  // If a founder is mid-break-glass, surface the banner (session is the target's).
  try{ S._breakGlass = JSON.parse(localStorage.getItem('bl_bg_active')||'null'); }catch(e){ S._breakGlass=null; }

  // Load role + district from Supabase (user_roles is the source of truth)
  try{
    let {data:roleData}=await sb.from('user_roles').select('role,district_id').eq('user_id',_currentUser.id).single();
    if(!roleData){
      // No role yet — provision server-side from an invite code (or default to teacher).
      const params=new URLSearchParams(window.location.search);
      const inviteCode=params.get('invite');
      try{ await sb.rpc('redeem_invite',{p_code:inviteCode||null}); }catch(re){ console.warn('redeem_invite failed:',re); }
      if(inviteCode) window.history.replaceState({},'',window.location.pathname);
      ({data:roleData}=await sb.from('user_roles').select('role,district_id').eq('user_id',_currentUser.id).single());
    }
    S._role=(roleData&&roleData.role)||'teacher';
    S._district=(roleData&&roleData.district_id)||null;
    // Resolve the district name for display
    if(S._district){
      try{ const {data:d}=await sb.from('districts').select('name').eq('id',S._district).single(); S._districtName=(d&&d.name)||''; }
      catch(de){ S._districtName=''; }
    } else { S._districtName=''; }
  }catch(e){
    console.error('Role load error:',e);
    // Offline fallback — cached role/district
    try{ const cachedRole=localStorage.getItem('bl_role'); S._role=cachedRole||'teacher'; }catch(le){S._role='teacher';}
    try{ S._districtName=localStorage.getItem('bl_district')||''; }catch(le){}
  }
  // Cache role + district for offline use
  try{localStorage.setItem('bl_role',S._role);}catch(e){}
  try{localStorage.setItem('bl_district',S._districtName||'');}catch(e){}

  // Load cloud data
  stored = await loadFromCloud();

  // Hydrate state
  S.clients   = stored.clients||[];
  S.customs   = stored.customs||[];
  S.sessions  = stored.sessions||[];
  S.goals     = stored.goals||[];
  S._strengths= stored.strengths||{};

  // ── One-time migration: legacy sessType==='fba' sessions become Behaviorist Log entries ──
  // Previously, "Behaviorist Observation" was its own session type. We now treat all sessions
  // uniformly and let behaviorists post-hoc flag a session as part of their FBA documentation.
  // For backward compatibility, any pre-existing fba-type session is auto-flagged so the
  // FBA Readiness gauge and existing analytics keep working without data loss.
  let _legacyFbaMigrated=false;
  S.sessions=S.sessions.map(s=>{
    if(s.sessType==='fba' && s.isFbaObservation===undefined){
      _legacyFbaMigrated=true;
      // Demote sessType to 'general' so it no longer drives any FBA-specific UI paths,
      // but flag it as a Behaviorist Log entry so it still counts toward FBA readiness.
      return {...s, sessType:'general', isFbaObservation:true, _legacyFbaSession:true};
    }
    return s;
  });
  // Persist the migration after the rest of state hydrates (see bottom of function)

  S._bipTemplate    = stored._bipTemplate||null;
  S._bipTemplateName= stored._bipTemplateName||null;
  S._goalTemplate   = stored._goalTemplate||null;
  S._goalTemplateName=stored._goalTemplateName||null;
  S._fbaTemplate    = stored._fbaTemplate||null;
  S._fbaTemplateName= stored._fbaTemplateName||null;
  S._apiKey   = stored._apiKey||null;
  S._assSent  = stored._assSent||[];
  S._assScored= stored._assScored||[];
  S._measureTypes= stored._measureTypes||{};
  // _role is NOT loaded from stored data — Supabase user_roles table is the source of truth

  // Show user info in header
  renderUserBadge();
  storeUserMeta(); // save email/name for admin panel lookup

  // If any legacy FBA sessions were just migrated, save the updated state so future loads are no-op
  if(_legacyFbaMigrated){ try { persist(); } catch(e){ console.warn('Migration save failed:',e); } }

  // Load shares (owned + shared-with-me) and merge read-only shared students
  await loadShares();

  rerender();
  tick();

  // Dismiss splash screen
  setTimeout(dismissSplash, 2000);
}

function renderUserBadge(){
  const u=_currentUser;
  if(!u) return;
  const name=u.user_metadata?.full_name||u.email||'Teacher';
  const avatar=u.user_metadata?.avatar_url;
  const roleLabel=S._role==='admin'?'Administrator':S._role==='school_psych'?'School Psychologist':S._role==='behaviorist'?'Behaviorist':'Teacher';
  const initials=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const badge=document.createElement('div');
  badge.id='user-badge';
  badge.style.cssText='position:fixed;bottom:16px;right:16px;z-index:9000;display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);border-radius:40px;padding:6px 14px 6px 8px;box-shadow:0 2px 12px rgba(0,0,0,.12);cursor:pointer;font-family:inherit';
  badge.title='Sign out';
  badge.onclick=signOut;
  badge.innerHTML=(avatar
    ?`<img src="${avatar}" style="width:28px;height:28px;border-radius:50%;object-fit:cover"/>`
    :`<div style="width:28px;height:28px;border-radius:50%;background:var(--nav);color:#fff;font-size:.7rem;font-weight:800;display:flex;align-items:center;justify-content:center">${initials}</div>`)
    +`<div style="line-height:1.2"><div style="font-size:.75rem;font-weight:700;color:var(--text)">${name.split(' ')[0]}</div><div style="font-size:.63rem;color:var(--muted)">${roleLabel} · Sign out</div></div>`;
  document.body.appendChild(badge);
}

async function signOut(){
  if(!confirm('Sign out of BehaviorLog Pro?')) return;
  await sb.auth.signOut();
  window.location.href='index.html';
}

// ── Register Service Worker (PWA / offline) ───────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(function(reg){
    console.log('Service worker registered');
    // Check for updates periodically
    setInterval(function(){ reg.update(); }, 60*60*1000); // hourly
  }).catch(function(err){
    console.log('Service worker registration failed:', err);
  });
}

boot();
</script>
