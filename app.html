          ${S._selectMode?'':'<div class="client-actions">'}
          ${S._selectMode?'':`<button class="btn btn-ghost btn-sm" onclick="goAnalytics('${c.id}','charts')">📊 Data</button>`}
          ${S._selectMode?'':isBehaviorist()?`<button class="btn btn-ghost btn-sm" onclick="openManualEntry('${c.id}')" title="Manual data entry" style="color:var(--purple)">📝 Enter</button>`:''}
            ${S._selectMode?'':`<button class="btn btn-ghost btn-sm" title="Link behaviorist" onclick="linkBehaviorist('${c.id}')" style="color:var(--purple)">🧠</button>`}
            ${S._selectMode?'':`<button class="btn btn-ghost btn-sm" title="Student settings" onclick="openClientSettings('${c.id}')">⚙️</button>`}
            ${S._selectMode?'':`<button class="btn btn-ghost btn-sm" title="Delete student" style="color:var(--red);border:1.5px solid #fca5a5;background:#fff5f5" onclick="confirmDeleteClient('${c.id}')">🗑</button>`}
            ${S._selectMode?'':`<button class="btn btn-primary btn-sm" onclick="openSessType('${c.id}')">▶ Record</button>`}
          ${S._selectMode?'':'</div>'}
        </div>

      </div>`;
    });
    if(!filtered.length) out+=`<div class="empty" style="padding:20px"><p class="muted" style="font-size:.85rem">No students matching "${esc(S._clientSearch)}"</p></div>`;
  }



  out+='</div>'; // close page-body
  return out;
}

// ── RECORD ─────────────────────────────────────────────────────────────────
function buildRecord(){
  if(S.isMulti) return buildMultiRecord();
  const sess=S.activeSess;
  const sessType=S.sessType||'initial';
  const isGoalSpec=sessType==='tracking';
  const isInitial=sessType==='initial';
  const isGeneral=sessType==='general';
  const isFba=sessType==='fba';
  const cg=clientGoals(sess.clientId);
  const events=sess.events||[];
  const activeIncs=Object.values(S.incidents); // concurrent incidents
  let behs;
  if(isGoalSpec){
    const goalLabels=[...new Set(cg.map(g=>g.behaviorLabel))];
    behs=allBehs().filter(b=>goalLabels.includes(b.label));
    if(!behs.length)behs=clientBehs(sess.clientId);
  } else if(isInitial){
    const selIds=S._initialBehs||sess.selectedBehs||[];
    behs=selIds.length?allBehs().filter(b=>selIds.includes(b.id)):allBehs();
  } else if(isFba){
    behs=allBehs();
  } else {
    behs=clientBehs(sess.clientId);
  }
  const sessionTypeBadge=isGoalSpec
    ?`<span class="tag" style="background:var(--accent-soft);color:var(--accent);border:1px solid #a3ccdf">🎯 Goal-Specific</span>`
    :isGeneral
    ?`<span class="tag" style="background:var(--amber-soft);color:var(--amber);border:1px solid #e8c97a">📋 General Tracking</span>`
    :isFba
    ?`<span class="tag" style="background:var(--fba-soft);color:var(--fba-green);border:1px solid var(--fba-mid);font-weight:800">🧠 Behaviorist Observation</span>`
    :`<span class="tag" style="background:var(--purple-soft);color:var(--purple);border:1px solid #c8b8f0">🔍 Initial Assessment</span>`;
  let liveGoals='';
  if(isGoalSpec&&cg.length>0){
    liveGoals=`<div class="card mb3" style="padding:14px 16px"><div class="slabel">Goal Progress — Live</div>${cg.map(g=>{const cnt=behFreq({events},g.behaviorLabel);const pct=Math.min(100,g.target>0?(cnt/g.target)*100:0);const over=cnt>g.target;return`<div style="margin-bottom:8px"><div class="row between" style="font-size:.8rem;margin-bottom:3px"><span style="font-weight:600">${esc(g.behaviorLabel)}</span><span class="mono" style="color:${over?'var(--red)':'var(--green)'};font-size:.82rem">${cnt}/≤${g.target} ${over?'⚠':'✓'}</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${over?'var(--red)':pct>80?'var(--yellow)':'var(--green)'}"></div></div></div>`;}).join('')}</div>`;
  }

  // ── Behavior grid — all can be active simultaneously ─────────────────────
  const behGrid=behs.map(b=>{
    const inc=S.incidents[b.id];
    const oppLabel=getOpposite(b.label);
    const measure=getBehMeasure(b.id);
    const mIcon=measure==='frequency'?'🔢':measure==='intensity'?'📊':measure==='latency'?'🔄':'⏱';
    const freqCount=(S.activeSess.events||[]).filter(e=>e.behaviorId===b.id&&e.type==='frequency').length;
    if(inc){
      return`<div class="beh-btn" style="border-color:var(--red);background:#fff1f2;animation:beh-pulse 1.5s ease-in-out infinite;position:relative;min-height:90px" onclick="startIncident('${b.id}')">
        <span style="font-size:2rem">✅</span>
        <span class="beh-label" style="color:#b91c1c;font-weight:800;font-size:.72rem;line-height:1.2">${esc(oppLabel)}</span>
        <span id="inc-timer-${b.id}" style="font-family:'Courier New',monospace;font-size:.68rem;color:var(--red);font-weight:700;margin-top:2px">${fmt(inc.elapsed||0)}</span>
        <span style="position:absolute;top:4px;left:4px;width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1s infinite"></span>
      </div>`;
    } else if(measure==='frequency'){
      return`<div class="beh-btn" onclick="startIncident('${b.id}')" style="position:relative">
        <span style="font-size:2rem">${b.icon}</span>
        <span class="beh-label" style="font-size:.78rem;font-weight:700;margin-top:4px">${esc(b.label)}</span>
        ${freqCount>0?`<span style="position:absolute;top:4px;right:6px;background:var(--accent);color:#fff;font-size:.68rem;font-weight:800;padding:1px 7px;border-radius:10px">${freqCount}</span>`:''}
        <span style="font-size:.58rem;color:var(--muted);margin-top:2px">${mIcon} tap to count</span>
      </div>`;
    } else {
      return`<div class="beh-btn" onclick="startIncident('${b.id}')" style="position:relative">
        <span style="font-size:2rem">${b.icon}</span>
        <span class="beh-label" style="font-size:.78rem;font-weight:700;margin-top:4px">${esc(b.label)}</span>
        <span style="font-size:.58rem;color:var(--muted);margin-top:2px">${mIcon} ${measure}</span>
      </div>`;
    }
  }).join('');

  // ── Active incident panels — one card per running behavior ───────────────
  let activeCards='';
  if(activeIncs.length>0){
    activeCards=`<div class="card mb3" style="background:linear-gradient(135deg,#fff1f2,#ffe4e6);border:2px solid #fca5a5;padding:14px 16px">
      <div class="slabel" style="color:var(--red);margin-bottom:10px">⏱ ${activeIncs.length} Behavior${activeIncs.length>1?'s':''} in Progress — tap button to end</div>
      ${activeIncs.map(inc=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:12px;border:1.5px solid #fca5a5;margin-bottom:8px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:.88rem;color:var(--red)">${inc.behIcon} ${esc(inc.behLabel)}</div>
          <div style="margin-top:6px"><div class="slabel" style="font-size:.65rem">Antecedent (A — captured at start)</div>
            <div style="font-size:.78rem;color:var(--muted);margin-top:1px">${inc.abcA?esc(inc.abcA):'<em>none</em>'}</div>
          </div>
          <div style="margin-top:6px"><div class="slabel" style="font-size:.65rem">Notes during behavior</div>
            <textarea style="width:100%;font-size:.78rem;padding:5px 8px;border-radius:8px;border:1px solid var(--border);resize:none;font-family:inherit;margin-top:2px;height:48px" placeholder="Describe what's happening…" oninput="updateIncNote('${inc.behId}',this.value)">${esc(inc.note||'')}</textarea>
          </div>
        </div>
        <div style="text-align:center;flex-shrink:0">
          <div id="inc-timer-${inc.behId}" style="font-family:'Courier New',monospace;font-size:1.4rem;font-weight:800;color:var(--red);line-height:1">${fmt(inc.elapsed||0)}</div>
          <div style="font-size:.6rem;color:var(--muted);margin-top:2px">duration</div>
        </div>
      </div>`).join('')}
    </div>`;
  }

  // ── A field (before behavior) — only show when NO incidents active ────────
  // Consequence removed while behavior active per spec
  let abcPanel='';
  if(activeIncs.length===0){
    const mTools=[{id:'FREQ',label:'🔢 Frequency',all:true}];
    if(isBehaviorist()) mTools.push({id:'LAT',label:'⏱ Latency',all:false});
    const mBtns=mTools.map(m=>`<button class="btn btn-sm${S.measureMode===m.id?' btn-primary':' btn-ghost'}" onclick="setMeasure('${m.id}')">${m.label}</button>`).join('');
    let ctrl='';
    if(S.measureMode==='FREQ')ctrl=`<div class="muted mt2" style="text-align:center;font-size:.78rem;padding:8px;background:var(--surface2);border-radius:8px">🔢 <strong>Frequency mode active</strong> — tap any behavior button to log +1 count</div>`;
    if(S.measureMode==='LAT')ctrl=`<div style="text-align:center;margin-top:10px"><p class="muted mb2" style="font-size:.8rem">Latency timer</p><div class="timer" id="lat-timer">${fmt(S.latElapsed)}</div><button class="btn mt2" style="width:100%;justify-content:center;font-size:.92rem;padding:12px;${S.latRunning?'background:#fee2e2;color:var(--red);border:1.5px solid #fca5a5':'background:var(--purple-soft);color:var(--purple);border:1.5px solid #ddd6fe'}" onclick="toggleLat()">${S.latRunning?'⏹ Stop & Log':'▶ Start Latency'}</button></div>`;
    abcPanel=`<div class="card mb3" style="padding:14px 16px${isFba?';background:var(--fba-soft);border-color:var(--fba-mid)':''}">
      <div class="slabel" style="margin-bottom:6px${isFba?';color:var(--fba-dark)':''}">Antecedent <span class="muted" style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.75rem;margin-left:6px">What’s happening before — captured when you tap a behavior</span></div>
      <input class="input mb3" id="abc-a" placeholder="Describe what happened before the behavior…" value="${esc(S.abcA)}" oninput="S.abcA=this.value" style="${isFba?'border-color:var(--fba-mid)':''}"/>
      <div class="row between"><span class="slabel" style="margin:0">Additional Tools</span><div class="row gap1">${mBtns}</div></div>${ctrl}
    </div>`;
  } else {
    abcPanel=`<div class="card mb3" style="padding:10px 14px;background:var(--surface2);border:1px dashed var(--border2)">
      <div class="muted" style="font-size:.78rem;text-align:center">💡 Consequence (C) field appears after behavior ends · Notes field above per behavior</div>
    </div>`;
  }

  // ── Event feed with notes ─────────────────────────────────────────────────
  const evFeed=events.length>0?`<div class="card mb3"><div class="slabel" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'" style="cursor:pointer;user-select:none">Session Events (${events.length}) <span style="font-size:.7rem;color:var(--accent)">▼ tap to toggle</span></div><div class="scroll" style="display:none">${[...events].reverse().map((ev,ri)=>{
    const ei=events.length-1-ri;
    const intPills=(ev.type==='duration'||ev.type==='intensity'||ev.type==='frequency')?
      '<div style="display:flex;gap:3px;margin-top:4px">'+[1,2,3,4].map(l=>'<div onclick="setEvIntensity('+ei+','+l+')" style="padding:2px 8px;border-radius:6px;font-size:.65rem;font-weight:700;cursor:pointer;background:'+(ev.intensity===l?INT_COLORS[l]:'var(--surface2)')+';color:'+(ev.intensity===l?INT_TEXT[l]:'var(--muted)')+'">'+INT_LABELS[l]+'</div>').join('')+'</div>':'';
    return `<div class="ev-row" style="position:relative">
    <span class="ev-badge b-${ev.type==='frequency'?'freq':ev.type==='duration'?'dur':ev.type==='intensity'?'int':'lat'}">${ev.type==='frequency'?'FREQ':ev.type==='duration'?'DUR':ev.type==='intensity'?'INT':'LAT'}</span>
    <div style="flex:1">
      <div style="font-size:.84rem;font-weight:700">${ev.behaviorIcon||''} ${esc(ev.behaviorLabel||'')}</div>
      <div class="muted" style="font-size:.74rem">${fmtTime(ev.timestamp)}${ev.type==='duration'?' · '+fmt(ev.durationMs):''}${ev.type==='intensity'&&ev.intensity?' · '+INT_LABELS[ev.intensity]:''}${ev.type==='latency'?' · '+fmt(ev.latencyMs):''}${ev.consequence?' · C: '+esc(ev.consequence):''}${ev.note?'<br><span style="color:var(--text2)">📝 '+esc(ev.note)+'</span>':''}</div>
      <input style="width:100%;margin-top:4px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:.72rem;font-family:inherit;background:var(--surface2)" placeholder="Antecedent — what happened before…" value="${esc(ev.antecedent||'')}" oninput="setEvField(${ei},'antecedent',this.value)"/>
      ${intPills}
    </div>
    <button onclick="deleteEvent(${ei})" title="Delete event" style="position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:6px;border:1px solid #fca5a5;background:#fff5f5;cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center;color:var(--red);opacity:.5;transition:opacity .15s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5">✕</button>
  </div>`;}).join('')}</div></div>`:'';
  const plannedMs=sess.plannedMins?sess.plannedMins*60000:null;
  const elapsedNow=Date.now()-sess.startedAt;
  const remainMs=plannedMs?Math.max(0,plannedMs-elapsedNow):null;
  const overTime=plannedMs&&elapsedNow>plannedMs;
  const fbaBannerStyle=isFba?'background:linear-gradient(135deg,var(--fba-soft),#d0f0e4);border-color:var(--fba-mid)':'';
  const fbaHypField=isFba?`<div class="card mb3" style="background:var(--fba-soft);border:1.5px solid var(--fba-mid);padding:13px 15px">
    <div class="row between mb2">
      <div class="slabel" style="margin:0;color:var(--fba-dark)">🔬 Developing Hypothesis</div>
      <span style="font-size:.7rem;color:var(--fba-green);font-style:italic">Behaviorist notes — not included in parent reports</span>
    </div>
    <textarea class="input" placeholder="Document emerging behavioral function hypotheses, patterns observed, ecological variables…" oninput="S.fbaHypothesis=this.value" style="min-height:70px;border-color:var(--fba-mid)">${esc(S.fbaHypothesis||'')}</textarea>
  </div>`:'';

  const addBehOnFly=isInitial?'<div style="display:flex;gap:6px;margin-bottom:12px;align-items:center"><input class="input" id="live-add-beh" placeholder="Add new behavior on the fly…" style="flex:1;font-size:.82rem;padding:8px 10px" onkeydown="if(event.key===\'Enter\')liveAddBeh()"/><button class="btn btn-primary btn-xs" onclick="liveAddBeh()" style="white-space:nowrap">+ Add</button></div>':'';

  return `<div class="live-banner" style="${isFba?fbaBannerStyle:overTime?'background:linear-gradient(135deg,#fff1f2,#ffe4e6);border-color:#fca5a5':''}"><div class="row gap2"><span class="live-dot" style="${overTime?'background:var(--red)':isFba?'background:var(--fba-green)':''}"></span><div><div style="font-weight:800;color:${isFba?'var(--fba-dark)':overTime?'var(--red)':'var(--green)'}">Live${isFba?' FBA':''} Session — ${esc(S.selClient.name)}${isFba&&sess.behavioristName?' <span style="font-size:.72rem;font-weight:600;color:var(--fba-green)">· '+esc(sess.behavioristName)+'</span>':''}</div>
          ${sess.location?`<div style="font-size:.74rem;color:var(--muted);margin-top:1px">📍 ${esc(sess.location)} · ${new Date(sess.startedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})}</div>`:`<div style="font-size:.74rem;color:var(--muted);margin-top:1px">${new Date(sess.startedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})}</div>`}<div class="row gap2 mt1" style="flex-wrap:wrap"><span class="muted mono" id="sess-elapsed" style="font-size:.8rem">${fmt(elapsedNow)} elapsed</span>${plannedMs?`<span id="sess-remain" class="mono" style="font-size:.8rem;font-weight:700;color:${overTime?'var(--red)':'var(--muted)'}">${overTime?'⚠ +'+fmt(elapsedNow-plannedMs)+' over':'⏱ '+fmt(remainMs)+' left'}</span>`:''}</div></div></div><div class="row gap2">${sessionTypeBadge}<button class="btn btn-danger btn-sm" onclick="endSession()">⏹ End</button></div></div>${liveGoals}<div class="slabel" style="margin-bottom:10px">${isGoalSpec?'IEP Goal Behaviors':isGeneral?'Configured Behaviors':isFba?'All Behaviors — Behaviorist Observation':isInitial?'Assessment Behaviors':'All Behaviors'}</div>${abcPanel}<div class="beh-grid mb3">${behGrid}</div>${addBehOnFly}${activeCards}${evFeed}${fbaHypField||''}`;
}

// ── MULTI-CLIENT RECORD ────────────────────────────────────────────────────
function buildMultiRecord(){
  const slot=cs(); if(!slot) return '<p>No active session</p>';
  const sessType=slot.sessType||'initial';
  const isGoalSpec=sessType==='tracking';
  const isInitial=sessType==='initial';
  const isGeneral=sessType==='general';
  const isTracking=isGoalSpec; // compat alias
  const cg=clientGoals(slot.clientId);
  const events=slot.events||[];

  // ── Client tab bar ────────────────────────────────────────────────────────
  const overallStart=Math.min(...S.multiSessions.map(s=>s.startedAt));
  const totalElapsed=Date.now()-overallStart;

  const tabBar=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:10px;margin-bottom:14px;box-shadow:var(--shadow)">
    <div class="row between mb2">
      <div>
        <div style="font-weight:800;font-size:.82rem;color:var(--accent)">🟢 Group Session — ${S.multiSessions.length} Students</div>
        ${S.multiSessions[0]&&S.multiSessions[0].location?`<div style="font-size:.72rem;color:var(--muted);margin-top:1px">📍 ${esc(S.multiSessions[0].location)} · ${new Date(S.multiSessions[0].startedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})}</div>`:`<div style="font-size:.72rem;color:var(--muted);margin-top:1px">${new Date(S.multiSessions[0]?.startedAt||Date.now()).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})}</div>`}
      </div>
      <div class="row gap2">
        <span class="muted mono" id="sess-elapsed" style="font-size:.78rem">${fmt(totalElapsed)} elapsed</span>
        <button class="btn btn-danger btn-sm" onclick="endAllSessions()">⏹ End All</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${S.multiSessions.map((s,i)=>{
        const isActive=i===S.activeClientIdx;
        const hasIncident=s.incidents&&Object.keys(s.incidents).length>0;
        const hasPending=s.intensityPrompts&&s.intensityPrompts.length>0;
        const evCount=s.events.length;
        return`<div onclick="switchClient(${i})" style="flex:1;min-width:90px;max-width:160px;padding:10px 10px 8px;border-radius:12px;cursor:pointer;border:2px solid ${isActive?'var(--accent)':hasIncident?'var(--red)':'var(--border)'};background:${isActive?'var(--accent-soft)':hasIncident?'#fff1f2':'var(--surface2)'};transition:all .15s;position:relative">
          ${hasIncident?'<span style="position:absolute;top:4px;right:5px;width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1s infinite"></span>':''}
          ${hasPending?'<span style="position:absolute;top:4px;right:5px;font-size:.65rem">⚡</span>':''}
          <div style="font-weight:800;font-size:.78rem;color:${isActive?'var(--accent)':'var(--text)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.clientName)}</div>
          <div id="tab-badge-${i}" style="font-size:.7rem;font-family:'Courier New',monospace;color:${isActive?'var(--accent)':'var(--muted)'};margin-top:2px">${evCount} event${evCount!==1?'s':''}</div>
          ${hasIncident?`<div style="font-size:.62rem;color:var(--red);font-weight:700;margin-top:2px">⏱ active</div>`:''}
        </div>`;
      }).join('')}
      <div onclick="addClientToSession()" style="flex:0 0 auto;padding:10px;border-radius:12px;cursor:pointer;border:2px dashed var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;min-width:44px" title="Add student">
        <span style="font-size:1.1rem;color:var(--muted)">+</span>
      </div>
    </div>
  </div>`;

  // ── Behavior panel for focused client ────────────────────────────────────
  let behs;
  if(isGoalSpec){
    const goalLabels=[...new Set(cg.map(g=>g.behaviorLabel))];
    behs=allBehs().filter(b=>goalLabels.includes(b.label));
    if(!behs.length)behs=clientBehs(slot.clientId);
  } else if(isInitial){ behs=allBehs();
  } else { behs=clientBehs(slot.clientId); }

  const sessionTypeBadge=isGoalSpec
    ?`<span class="tag" style="background:var(--accent-soft);color:var(--accent);border:1px solid #a3ccdf;font-size:.68rem">🎯 Goals</span>`
    :isGeneral
    ?`<span class="tag" style="background:var(--amber-soft);color:var(--amber);border:1px solid #e8c97a;font-size:.68rem">📋 General</span>`
    :`<span class="tag" style="background:var(--purple-soft);color:var(--purple);border:1px solid #c8b8f0;font-size:.68rem">🔍 Initial</span>`;

  // live goal tracker for this client
  let liveGoals='';
  if(isTracking&&cg.length>0){
    liveGoals=`<div class="card mb3" style="padding:12px 14px"><div class="slabel" style="font-size:.68rem">Goal Progress</div>${cg.map(g=>{const cnt=behFreq({events},g.behaviorLabel);const pct=Math.min(100,g.target>0?(cnt/g.target)*100:0);const over=cnt>g.target;return`<div style="margin-bottom:6px"><div class="row between" style="font-size:.75rem;margin-bottom:3px"><span style="font-weight:600">${esc(g.behaviorLabel)}</span><span class="mono" style="color:${over?'var(--red)':'var(--green)'};font-size:.75rem">${cnt}/≤${g.target}</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${over?'var(--red)':pct>80?'var(--yellow)':'var(--green)'}"></div></div></div>`;}).join('')}</div>`;
  }

  // ── Behavior grid — concurrent, mirrors single-client exactly ──────────
  const slotIncs=slot.incidents||{};
  const activeSlotIncs=Object.values(slotIncs);

  const behGrid=behs.map(b=>{
    const inc=slotIncs[b.id];
    const oppLabel=getOpposite(b.label);
    if(inc){
      return`<div class="beh-btn" style="border-color:var(--red);background:#fff1f2;animation:beh-pulse 1.5s ease-in-out infinite;position:relative;min-height:90px" onclick="mStartIncident('${b.id}')">
        <span style="font-size:2rem">✅</span>
        <span class="beh-label" style="color:#b91c1c;font-weight:800;font-size:.72rem;line-height:1.2">${esc(oppLabel)}</span>
        <span id="inc-timer-m-${b.id}" style="font-family:'Courier New',monospace;font-size:.68rem;color:var(--red);font-weight:700;margin-top:2px">${fmt(inc.elapsed||0)}</span>
        <span style="position:absolute;top:4px;left:4px;width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1s infinite"></span>
      </div>`;
    } else {
      return`<div class="beh-btn" onclick="mStartIncident('${b.id}')">
        <span style="font-size:2rem">${b.icon}</span>
        <span class="beh-label" style="font-size:.78rem;font-weight:700;margin-top:4px">${esc(b.label)}</span>
      </div>`;
    }
  }).join('');

  // ── Active incident panels — one per running behavior (same as single) ──
  let activeCards='';
  if(activeSlotIncs.length>0){
    activeCards=`<div class="card mb3" style="background:linear-gradient(135deg,#fff1f2,#ffe4e6);border:2px solid #fca5a5;padding:14px 16px">
      <div class="slabel" style="color:var(--red);margin-bottom:10px">⏱ ${activeSlotIncs.length} Behavior${activeSlotIncs.length>1?'s':''} in Progress — tap button to end</div>
      ${activeSlotIncs.map(inc=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:12px;border:1.5px solid #fca5a5;margin-bottom:8px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:.88rem;color:var(--red)">${inc.behIcon} ${esc(inc.behLabel)}</div>
          <div style="margin-top:6px"><div class="slabel" style="font-size:.65rem">Antecedent (captured at start)</div>
            <div style="font-size:.78rem;color:var(--muted);margin-top:1px">${inc.abcA?esc(inc.abcA):'<em>none</em>'}</div>
          </div>
          <div style="margin-top:6px"><div class="slabel" style="font-size:.65rem">Notes during behavior</div>
            <textarea style="width:100%;font-size:.78rem;padding:5px 8px;border-radius:8px;border:1px solid var(--border);resize:none;font-family:inherit;margin-top:2px;height:48px" placeholder="Describe what's happening…" oninput="mUpdateIncNote('${inc.behId}',this.value)">${esc(inc.note||'')}</textarea>
          </div>
        </div>
        <div style="text-align:center;flex-shrink:0">
          <div id="inc-timer-m-${inc.behId}" style="font-family:'Courier New',monospace;font-size:1.4rem;font-weight:800;color:var(--red);line-height:1">${fmt(inc.elapsed||0)}</div>
          <div style="font-size:.6rem;color:var(--muted);margin-top:2px">duration</div>
        </div>
      </div>`).join('')}
    </div>`;
  }

  // ── Antecedent field — hidden while behaviors active; consequence after ──
  let measurePanel='';
  if(activeSlotIncs.length===0){
    const mm=slot.measureMode;
    const mTools2=[{id:'FREQ',label:'🔢 Frequency'}];
    if(isBehaviorist()) mTools2.push({id:'LAT',label:'⏱ Latency'});
    const mBtns=mTools2.map(m=>`<button class="btn btn-sm${mm===m.id?' btn-primary':' btn-ghost'}" onclick="mSetMeasure('${m.id}')">${m.label}</button>`).join('');
    let ctrl='';
    if(mm==='FREQ')ctrl=`<div class="muted mt2" style="text-align:center;font-size:.78rem;padding:8px;background:var(--surface2);border-radius:8px">🔢 <strong>Frequency mode</strong> — tap behavior buttons to count</div>`;
    if(mm==='LAT')ctrl=`<div style="text-align:center;margin-top:10px"><p class="muted mb2" style="font-size:.8rem">Latency timer</p><div class="timer" id="lat-timer">${fmt(slot.latElapsed||0)}</div><button class="btn mt2" style="width:100%;justify-content:center;font-size:.92rem;padding:12px;${slot.latRunning?'background:#fee2e2;color:var(--red);border:1.5px solid #fca5a5':'background:var(--purple-soft);color:var(--purple);border:1.5px solid #ddd6fe'}" onclick="mToggleLat()">${slot.latRunning?'⏹ Stop & Log':'▶ Start Latency'}</button></div>`;
    measurePanel=`<div class="card mb3" style="padding:14px 16px">
      <div class="slabel" style="margin-bottom:10px">Antecedent <span class="muted" style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.75rem;margin-left:6px">What's happening before — captured when you tap a behavior</span></div>
      <input class="input mb3" placeholder="Describe what happened before the behavior…" value="${esc(slot.abcA||'')}" oninput="setCs({abcA:this.value})"/>
      <div class="row between"><span class="slabel" style="margin:0">Tools</span><div class="row gap1">${mBtns}</div></div>${ctrl}
    </div>`;
  } else {
    measurePanel=`<div class="card mb3" style="padding:10px 14px;background:var(--surface2);border:1px dashed var(--border2)">
      <div class="muted" style="font-size:.78rem;text-align:center">💡 Consequence (C) appears after behavior ends · Notes field above per behavior</div>
    </div>`;
  }

  const evFeed=events.length>0?`<div class="card mb3"><div class="slabel">Events — ${esc(slot.clientName)} (${events.length})</div><div class="scroll">${[...events].reverse().map(ev=>`<div class="ev-row"><span class="ev-badge b-${ev.type==='frequency'?'freq':ev.type==='duration'?'dur':ev.type==='intensity'?'int':'lat'}">${ev.type==='frequency'?'FREQ':ev.type==='duration'?'DUR':ev.type==='intensity'?'INT':'LAT'}</span><div style="flex:1"><div style="font-size:.84rem;font-weight:700">${ev.behaviorIcon} ${esc(ev.behaviorLabel)}</div><div class="muted">${fmtTime(ev.timestamp)}${ev.type==='duration'?' · '+fmt(ev.durationMs):''}${ev.type==='intensity'?' · '+INT_LABELS[ev.intensity]:''}${ev.type==='latency'?' · '+fmt(ev.latencyMs):''}${ev.antecedent?' · A: '+esc(ev.antecedent):''}${ev.consequence?' · C: '+esc(ev.consequence):''}${ev.note?'<br><span style="color:var(--text2)">📝 '+esc(ev.note)+'</span>':''}</div></div></div>`).join('')}</div></div>`:'';

  return`${tabBar}
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="font-weight:800;font-size:1rem;color:var(--text)">${esc(slot.clientName)}</div>
    <div class="row gap2">${sessionTypeBadge}<button class="btn btn-ghost btn-sm" onclick="endOneSession(${S.activeClientIdx})">End This Student</button></div>
  </div>
  ${liveGoals}
  <div class="slabel" style="margin-bottom:10px">${isGoalSpec?'IEP Goal Behaviors':isGeneral?'Configured Behaviors':'All Behaviors'}</div>
  <div class="beh-grid mb3">${behGrid}</div>
  ${measurePanel}${evFeed}
  `;
}

// ── SUMMARY ────────────────────────────────────────────────────────────────
function buildSummary(){
  const sess=S.selSess; if(!sess) return '';
  const events=sess.events||[];
  const byB={};
  events.forEach(ev=>{
    if(!byB[ev.behaviorLabel])byB[ev.behaviorLabel]={label:ev.behaviorLabel,icon:ev.behaviorIcon,freq:0,durs:[],ints:[],lats:[],abcs:[]};
    if(ev.type==='frequency')byB[ev.behaviorLabel].freq++;
    if(ev.type==='duration')byB[ev.behaviorLabel].durs.push(ev.durationMs);
    if(ev.type==='intensity')byB[ev.behaviorLabel].ints.push(ev.intensity);
    if(ev.type==='latency')byB[ev.behaviorLabel].lats.push(ev.latencyMs);
    if(ev.antecedent||ev.consequence||ev.note)byB[ev.behaviorLabel].abcs.push({t:ev.timestamp,a:ev.antecedent,c:ev.consequence,n:ev.note});
  });
  const bList=Object.values(byB);
  const cg=clientGoals(sess.clientId);
  const isInitial=sess.sessType==='initial';
  const isGeneral=sess.sessType==='general';
  const isGoalSpec=sess.sessType==='tracking';
  const isFbaSess=sess.sessType==='fba';

  let recPanel='';
  if((isInitial||isGeneral)&&bList.length>0){
    recPanel=`<div class="card mb3" style="border-color:var(--purple);background:var(--purple-soft)">
      <div class="slabel" style="color:var(--purple)">📋 Goal Recommendations</div>
      <p style="font-size:.84rem;color:var(--text2);margin-bottom:12px">Based on this assessment, consider writing goals for:</p>
      ${bList.sort((a,b)=>(b.freq+b.durs.length+b.ints.length+b.lats.length)-(a.freq+a.durs.length+a.ints.length+a.lats.length)).map(b=>{
        const total=b.freq+b.durs.length+b.ints.length+b.lats.length;
        const alreadyHas=cg.some(g=>g.behaviorLabel===b.label);
        return`<div class="row between" style="padding:8px 0;border-bottom:1px solid #e9d5ff">
          <div class="row gap2"><span style="font-size:1.1rem">${b.icon}</span>
            <div><div style="font-weight:700;font-size:.88rem">${esc(b.label)}</div>
            <div class="muted">${total} event${total!==1?'s':''} this session</div></div>
          </div>
          ${alreadyHas?`<span class="tag" style="background:#ecfdf5;color:#065f46">✓ Goal exists</span>`:isBehaviorist()?`<button class="btn btn-sm" class="btn-purple" onclick="quickGoal('${esc(b.label)}')">+ Write Goal</button>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }

  let goalPerf='';
  if(!isInitial&&cg.length>0){
    goalPerf=`<div class="card mb3">
      <div class="slabel">Goal Performance This Session</div>
      ${cg.map(g=>{
        const cnt=behFreq(sess,g.behaviorLabel);
        const met=cnt<=g.target;
        return`<div class="row between" style="padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-weight:700">${esc(g.behaviorLabel)}</span>
          <div class="row gap2">
            <span class="mono" style="font-size:.88rem;color:${met?'var(--green)':'var(--red)'}">${cnt}/≤${g.target}</span>
            <span class="tag" style="background:${met?'var(--green-soft)':'var(--red-soft)'};color:${met?'var(--green)':'var(--red)'}">${met?'✓ Met':'✗ Over'}</span>
          </div></div>`;
      }).join('')}</div>`;
  }

  const chart=bList.length>0?buildBarChart(bList.map(b=>({label:b.label,val:b.freq+b.durs.length+b.ints.length+b.lats.length})),'Events'):'';
  const typeBadge=sess.sessType==='initial'?`<span class="tag" style="background:var(--purple-soft);color:var(--purple);margin-left:9px">🔍 Initial Assessment</span>`
    :sess.sessType==='tracking'?`<span class="tag" style="background:var(--accent-soft);color:var(--accent);margin-left:9px">🎯 Goal-Specific</span>`
    :sess.sessType==='general'?`<span class="tag" style="background:var(--amber-soft);color:var(--amber);margin-left:9px">📋 General Tracking</span>`
    :sess.sessType==='fba'?`<span class="tag" style="background:var(--fba-soft);color:var(--fba-green);margin-left:9px;font-weight:800">🧠 Behaviorist Observation</span>`
    :sess.sessType==='manual'?`<span class="tag" style="background:var(--orange-soft);color:var(--orange);margin-left:9px">📝 Manual Entry</span>`:'';

  // behaviorist session metadata card (shown in summary when it's an behaviorist session)
  const fbaMetaCard=isFbaSess?`<div class="card mb3" style="background:var(--fba-soft);border:1.5px solid var(--fba-mid);padding:13px 15px">
    <div class="slabel" style="color:var(--fba-dark);margin-bottom:10px">🧠 Behaviorist Session Data</div>
    ${sess.behavioristName?`<div style="margin-bottom:8px;font-size:.82rem"><strong>Behaviorist:</strong> ${esc(sess.behavioristName)}</div>`:''}
    ${sess.settingEvents&&sess.settingEvents.length?`<div style="margin-bottom:8px"><div style="font-size:.73rem;font-weight:700;color:var(--fba-dark);margin-bottom:4px">Setting Events Present:</div><div style="display:flex;flex-wrap:wrap;gap:5px">${sess.settingEvents.map(s=>`<span style="padding:3px 9px;border-radius:16px;background:var(--fba-green);color:#fff;font-size:.7rem;font-weight:700">${s}</span>`).join('')}</div></div>`:''}
    ${sess.settingEventsNote?`<div style="margin-bottom:8px;font-size:.78rem;color:var(--text2)"><strong>Setting notes:</strong> ${esc(sess.settingEventsNote)}</div>`:''}
    ${sess.fbaHypothesis?`<div style="margin-bottom:6px"><div style="font-size:.73rem;font-weight:700;color:var(--fba-dark);margin-bottom:4px">Behaviorist Hypothesis Notes:</div><div style="font-size:.78rem;color:var(--text2);background:rgba(255,255,255,.6);border-radius:8px;padding:8px 10px;border-left:3px solid var(--fba-green)">${esc(sess.fbaHypothesis)}</div></div>`:''}
    <div style="margin-top:8px;font-size:.7rem;color:var(--fba-green);font-style:italic;border-top:1px solid var(--fba-mid);padding-top:8px">Supplemental reports from other session types are reference data only. FBA conclusions are those of the behaviorist.</div>
  </div>`:'';

  const bCards=bList.map(b=>`<div class="card mb2">
    <h3>${b.icon} ${esc(b.label)}</h3>
    <div class="row gap2 mt2 wrap">
      ${b.freq>0?`<span class="tag" style="background:var(--sky-soft);color:var(--sky)">Frequency: ${b.freq}</span>`:''}
      ${b.durs.length>0?`<span class="tag" style="background:var(--green-soft);color:var(--green)">Avg Duration: ${fmt(b.durs.reduce((a,v)=>a+v,0)/b.durs.length)}</span>`:''}
      ${b.ints.length>0?`<span class="tag" style="background:var(--yellow-soft);color:#92400e">Avg Intensity: ${(b.ints.reduce((a,v)=>a+v,0)/b.ints.length).toFixed(1)}/4</span>`:''}
      ${b.lats.length>0?`<span class="tag" style="background:var(--purple-soft);color:var(--purple)">Avg Latency: ${fmt(b.lats.reduce((a,v)=>a+v,0)/b.lats.length)}</span>`:''}
    </div>
    ${b.abcs.map(abc=>`<div style="margin-top:8px;font-size:.79rem;color:var(--muted);border-left:3px solid var(--border2);padding-left:10px;line-height:1.6">
      ${fmtTime(abc.t)}${abc.a?` · <b>A:</b> ${esc(abc.a)}`:''}${abc.c?` · <b>C:</b> ${esc(abc.c)}`:''} ${abc.n?`<br><span style="color:var(--text2)">📝 ${esc(abc.n)}</span>`:''}</div>`).join('')}
  </div>`).join('');

  // ── Student Strengths Highlight (captured from session notes or editable here)
  const strengthKey='strength_'+sess.id;
  const savedStrength=S._strengths&&S._strengths[sess.id]?S._strengths[sess.id]:'';

  return `<div class="sub-view"><button class="back-btn" onclick="S.selClient=S.clients.find(c=>c.id===S.selSess.clientId)||S.selClient;S.view='analytics';S._anaTab='history';rerender()">← History</button>
  <div class="row" style="margin-bottom:5px"><h2>Session Summary</h2>${typeBadge}</div>
  <p class="muted">${esc(sess.clientName)} · ${fmtDate(sess.startedAt)} · ${fmtTime(sess.startedAt)}</p>
  <hr class="divider"/>
  ${fbaMetaCard}
  <!-- Location + time meta row -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    <span style="font-size:.78rem;background:var(--surface2);padding:4px 10px;border-radius:7px;color:var(--text2);font-weight:600">🕐 ${new Date(sess.startedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})} – ${sess.endedAt?new Date(sess.endedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}):'ongoing'}</span>
    ${sess.location?`<span style="font-size:.78rem;background:var(--accent-soft);padding:4px 10px;border-radius:7px;color:var(--accent);font-weight:600">📍 ${esc(sess.location)}</span>`:''}
  </div>
  <div class="${sess.plannedMins?'grid2':'grid3'} mb3" style="${sess.plannedMins?'grid-template-columns:1fr 1fr 1fr 1fr':''}">
    <div class="stat-box"><div class="stat-n">${events.length}</div><div class="stat-l">Events</div></div>
    <div class="stat-box"><div class="stat-n">${bList.length}</div><div class="stat-l">Behaviors</div></div>
    <div class="stat-box"><div class="stat-n mono">${fmt(sess.endedAt-sess.startedAt)}</div><div class="stat-l">Duration</div></div>
    ${sess.plannedMins?`<div class="stat-box"><div class="stat-n mono">${sess.plannedMins}m</div><div class="stat-l">Planned</div></div>`:''}
  </div>
  ${recPanel}${goalPerf}
  ${chart?`<div class="card mb3"><div class="slabel">Frequency by Behavior</div>${chart}</div>`:''}
  ${bCards}
  ${sess.note?`<div class="card mt2"><div class="slabel">Session Notes</div><p style="font-size:.88rem;margin-top:7px;line-height:1.6">${esc(sess.note)}</p></div>`:''}

  <div class="card mt3" style="border:2px solid #8dcde3;background:linear-gradient(135deg,var(--accent-soft),#f0fafd)">
    <div class="row between mb2"><div>
      <div class="slabel" style="color:var(--accent);margin-bottom:2px">⭐ Student Strengths This Session</div>
      <p style="font-size:.78rem;color:var(--muted)">What did the student do well? Positive behaviors, coping, or progress observed.</p>
    </div></div>
    <textarea class="input" id="strength-input" placeholder="e.g. Remained seated for first 10 min, responded to redirection, showed peer awareness…" style="min-height:80px" oninput="saveStrength('${esc(sess.id)}',this.value)">${esc(S._strengths&&S._strengths[sess.id]?S._strengths[sess.id]:'')}</textarea>
  </div>

  <div class="card mt3" style="padding:14px 18px">
    <div class="slabel mb3">Export This Session</div>
    <div class="row gap2 wrap">
      <button class="btn btn-primary btn-sm" onclick="doExportPDF()">📄 PDF Report</button>
      <button class="btn btn-ghost btn-sm" onclick="exportSessionCSV('${esc(sess.id)}')">📊 CSV Data</button>
      <button class="btn btn-ghost btn-sm" onclick="exportSessionJSON('${esc(sess.id)}')">💾 JSON</button>
    </div>
  </div>
  </div>`;
}

// ── HISTORY ────────────────────────────────────────────────────────────────
function buildHistory(){
  const c=S.selClient;
  const cs=S.sessions.filter(s=>s.clientId===c.id).sort((a,b)=>b.startedAt-a.startedAt);
  const trend=cs.slice().reverse().map(s=>({label:fmtDateS(s.startedAt),val:s.events.length}));
  const lineChart=trend.length>1?buildLineChart(trend,'Events'):'';
  const rows=cs.length===0
    ?`<div class="empty"><div class="empty-icon">📋</div><p>No sessions recorded yet.</p></div>`
    :cs.map(s=>{
      const typeBadge=s.sessType==='initial'?`<span class="tag" style="background:var(--purple-soft);color:var(--purple);font-size:.65rem">🔍</span>`
        :s.sessType==='tracking'?`<span class="tag" style="background:var(--accent-soft);color:var(--accent);font-size:.65rem">🎯</span>`
        :s.sessType==='general'?`<span class="tag" style="background:var(--amber-soft);color:var(--amber);font-size:.65rem">📋</span>`
        :s.sessType==='fba'?`<span class="tag" style="background:var(--fba-soft);color:var(--fba-green);font-size:.65rem;font-weight:800">🧠</span>`:'';
      return`<div class="chip mb2" onclick="goSummary('${s.id}')">
        <div class="row gap2"><div>
          <div class="row gap2"><span style="font-weight:700">${fmtDate(s.startedAt)} · ${fmtTime(s.startedAt)}</span>${typeBadge}</div>
          <div class="muted mt1">${s.events.length} events · ${fmt(s.endedAt-s.startedAt)}${s.plannedMins?' · planned '+s.plannedMins+'m':''}${s.location?' · 📍'+s.location:''}</div>
        </div></div>
        <span style="color:var(--accent);font-weight:700">→</span></div>`;
    }).join('');
  return `<p class="muted mb3">${cs.length} session${cs.length!==1?'s':''} recorded</p>
  ${lineChart?`<div class="card mb3"><div class="slabel">Events per Session</div>${lineChart}</div>`:''}
  ${rows}`;
}

// ── GOALS ──────────────────────────────────────────────────────────────────
function buildGoals(){
  const c=S.selClient;
  const glist=clientGoals(c.id);
  const cs=S.sessions.filter(s=>s.clientId===c.id).sort((a,b)=>a.startedAt-b.startedAt);

  const form=`<div id="goal-form" style="display:none" class="card mb3" style="border-left:4px solid var(--accent)">
    <div class="slabel">New Frequency Goal</div>
    <div class="grid2 mt2">
      <div><div class="muted mb1">Behavior</div>
        <select class="input" id="goal-beh"><option value="">Select…</option>
          ${allBehs().map(b=>`<option value="${esc(b.label)}">${b.icon} ${esc(b.label)}</option>`).join('')}
        </select></div>
      <div><div class="muted mb1">Max occurrences per session</div>
        <input class="input" type="number" min="0" id="goal-target" placeholder="e.g. 3"/></div>
    </div>
    <div class="mt2"><div class="muted mb1">Goal notes / baseline</div>
      <input class="input" id="goal-notes" placeholder="Context, baseline data, intervention notes…"/></div>
    <div class="row gap2 mt3">
      <button class="btn btn-primary" onclick="doAddGoal()">Save Goal</button>
      <button class="btn btn-ghost" onclick="hideGoalForm()">Cancel</button>
    </div></div>`;

  const cards=glist.length===0
    ?`<div class="empty"><div class="empty-icon">🎯</div><p style="font-weight:600;margin-bottom:6px">No goals yet</p><p>Write goals to enable Goal Tracking sessions.</p></div>`
    :glist.map(g=>{
      const td=cs.slice(-10).map(s=>({label:fmtDateS(s.startedAt),val:behFreq(s,g.behaviorLabel),target:g.target}));
      const counts=td.map(d=>d.val);
      const avg=counts.length?counts.reduce((a,v)=>a+v,0)/counts.length:0;
      const met=avg<=g.target;
      const pct=g.target>0?Math.min(100,(avg/g.target)*100):0;
      const early=counts.slice(0,3).reduce((a,v)=>a+v,0)/Math.max(1,Math.min(3,counts.length));
      const late=counts.slice(-3).reduce((a,v)=>a+v,0)/3;
      const trend=counts.length>3?late-early:0;
      const trendStr=trend<-0.2?'↓ Improving':trend>0.2?'↑ Increasing':'→ Stable';
      const trendCol=trend<-0.2?'var(--green)':trend>0.2?'var(--red)':'var(--muted)';
      const chart=td.length>1?buildGoalLineChart(td,g.target):'';
      return`<div class="goal-card ${met?'goal-met':avg>g.target*1.5?'goal-risk':''}">
        <div class="row between mb2">
          <div class="row gap2">
            <span style="font-weight:800;font-size:1rem">${esc(g.behaviorLabel)}</span>
            <span class="tag" style="background:${met?'var(--green-soft)':'var(--red-soft)'};color:${met?'var(--green)':'var(--red)'}">${met?'✓ On Track':'⚠ Needs Support'}</span>
          </div>
          ${isBehaviorist()?`<button class="btn btn-danger btn-xs" onclick="removeGoal('${g.id}')">Remove</button>`:''}
        </div>
        <div class="grid3 mb2">
          <div class="stat-box" style="padding:9px"><div class="stat-n" style="font-size:1.2rem">≤${g.target}</div><div class="stat-l">Target/session</div></div>
          <div class="stat-box" style="padding:9px"><div class="stat-n" style="font-size:1.2rem;color:${met?'var(--green)':'var(--red)'}">${avg.toFixed(1)}</div><div class="stat-l">Recent avg</div></div>
          <div class="stat-box" style="padding:9px"><div class="stat-n" style="font-size:.95rem;color:${trendCol}">${trendStr}</div><div class="stat-l">Trend</div></div>
        </div>
        <div style="margin-bottom:10px">
          <div class="row between mb1"><span class="muted" style="font-size:.72rem">Progress toward goal</span>
          <span style="font-size:.72rem;font-weight:700;color:${met?'var(--green)':'var(--red)'}">${met?'Met':Math.round(pct)+'% of target'}</span></div>
          <div class="prog-track"><div class="prog-fill" style="width:${Math.min(100,pct)}%;background:${met?'var(--green)':pct>80?'var(--red)':'var(--yellow)'}"></div></div>
        </div>
        ${chart}
        ${g.notes?`<p style="font-size:.78rem;color:var(--muted);margin-top:7px;font-style:italic">📝 ${esc(g.notes)}</p>`:''}
      </div>`;
    }).join('');

  return`<div class="row between mb3">
    <div class="slabel" style="margin:0;align-self:center">IEP Goals</div>
    ${isBehaviorist()?`<button class="btn btn-primary btn-sm" onclick="showGoalForm()">+ New Goal</button>`:''}
  </div>${isBehaviorist()?form:''}${cards}`;
}
function buildReports(){
  const c=S.selClient;
  const range=S._reportRange||'all';
  const allSess=S.sessions.filter(s=>s.clientId===c.id).sort((a,b)=>a.startedAt-b.startedAt);
  let start=null; const end=new Date();
  if(range==='week'){start=new Date();start.setDate(start.getDate()-7);}
  if(range==='month'){start=new Date();start.setMonth(start.getMonth()-1);}
  if(range==='quarter'){start=new Date();start.setMonth(start.getMonth()-3);}
  const filtered=allSess.filter(s=>!start||(new Date(s.startedAt)>=start&&new Date(s.startedAt)<=end));
  const allEv=filtered.flatMap(s=>s.events);
  const byB={};
  allEv.forEach(ev=>{if(!byB[ev.behaviorLabel])byB[ev.behaviorLabel]={label:ev.behaviorLabel,count:0};byB[ev.behaviorLabel].count++;});
  const bList=Object.values(byB).sort((a,b)=>b.count-a.count);
  const cg=clientGoals(c.id);
  const chart=bList.length>0?buildBarChart(bList.slice(0,6).map(b=>({label:b.label,val:b.count})),'Count'):'';
  const initSess=filtered.filter(s=>s.sessType==='initial').length;
  const genSess=filtered.filter(s=>s.sessType==='general').length;
  const trackSess=filtered.filter(s=>s.sessType==='tracking').length;
  const fbaSess=filtered.filter(s=>s.sessType==='fba').length;

  return`<div class="row between mb3"><div class="slabel" style="margin:0;align-self:center">Session Report</div><button class="btn btn-orange btn-sm" onclick="doExportPDF()">⬇ PDF</button></div>
  <div class="card mb3">
    <div class="row gap2 mt2 wrap">
      ${[['all','All Time'],['week','Last 7 Days'],['month','Last Month'],['quarter','Last Quarter']].map(([v,l])=>`
        <button class="btn btn-sm${range===v?' btn-primary':' btn-ghost'}" onclick="setReportRange('${v}')">${l}</button>`).join('')}
    </div>
    <div class="row gap3 mt2 wrap">
      <p class="muted">${filtered.length} session${filtered.length!==1?'s':''} · ${allEv.length} total events</p>
      ${initSess>0?`<span class="tag" style="background:var(--purple-soft);color:var(--purple)">🔍 ${initSess} Initial</span>`:''}
      ${genSess>0?`<span class="tag" style="background:var(--amber-soft);color:var(--amber)">📋 ${genSess} General</span>`:''}
      ${trackSess>0?`<span class="tag" style="background:var(--accent-soft);color:var(--accent)">🎯 ${trackSess} Goal-Specific</span>`:''}
      ${fbaSess>0?`<span class="tag" style="background:var(--fba-soft);color:var(--fba-green);font-weight:800">🧠 ${fbaSess} FBA</span>`:''}
    </div>
  </div>
  <div class="grid3 mb3">
    <div class="stat-box"><div class="stat-n">${filtered.length}</div><div class="stat-l">Sessions</div></div>
    <div class="stat-box"><div class="stat-n">${allEv.length}</div><div class="stat-l">Events</div></div>
    <div class="stat-box"><div class="stat-n">${bList.length}</div><div class="stat-l">Behaviors</div></div>
  </div>
  ${chart?`<div class="card mb3"><div class="slabel">Behavior Frequency</div>${chart}</div>`:''}
  ${cg.length>0?`<div class="card mb3"><div class="slabel">Goal Status</div>
    ${cg.map(g=>{
      const counts=filtered.map(s=>behFreq(s,g.behaviorLabel));
      const avg=counts.length?counts.reduce((a,v)=>a+v,0)/counts.length:0;
      const met=avg<=g.target;
      return`<div class="row between" style="padding:9px 0;border-bottom:1px solid var(--border)">
        <div><span style="font-weight:700">${esc(g.behaviorLabel)}</span><span class="muted" style="margin-left:7px">target ≤${g.target}</span></div>
        <div class="row gap2">
          <span class="mono" style="font-size:.88rem;color:${met?'var(--green)':'var(--red)'}">${avg.toFixed(1)} avg</span>
          <span class="tag" style="background:${met?'var(--green-soft)':'var(--red-soft)'};color:${met?'var(--green)':'var(--red)'}">${met?'✓ Met':'✗ Not Met'}</span>
        </div></div>`;
    }).join('')}</div>`:''}
  <div class="card" style="border-color:#fed7aa;background:#fff7ed">
    <div class="row gap3">
      <span style="font-size:1.8rem">📄</span>
      <div style="flex:1">
        <div style="font-weight:700;color:#c2410c">IEP-Ready PDF Export</div>
        <p class="muted mt1">Goal progress bars, session table, ABC log — formatted for IEP documentation.</p>
      </div>
      <button class="btn btn-orange" onclick="doExportPDF()">⬇ Export</button>
    </div></div>`;
}

// ── MULTI-SESSION SUMMARY ──────────────────────────────────────────────────
function buildMultiSummary(){
  // Get the sessions that were just ended (most recent per client in the group)
  // They were pushed to S.sessions at endAllSessions/endOneSession time
  // We track by looking at sessions ended within the last 5 minutes
  const cutoff=Date.now()-5*60*1000;
  const recent=S.sessions.filter(s=>s.endedAt&&s.endedAt>cutoff)
    .sort((a,b)=>a.startedAt-b.startedAt);

  if(!recent.length){
    return`<div class="sub-view"><button class="back-btn" onclick="goHome()">← Back</button>
    <h2 class="mb4">Group Session Summary</h2>
    <div class="empty"><div class="empty-icon">📋</div><p>No recent group sessions found.</p></div>`;
  }

  const totalEvents=recent.reduce((sum,s)=>sum+(s.events||[]).length,0);
  const totalDuration=recent.reduce((sum,s)=>sum+(s.endedAt-s.startedAt),0);

  return`<div class="sub-view"><button class="back-btn" onclick="goHome()">← Back</button>
  <div class="row between mb4">
    <div><h2>Group Session Summary</h2><p class="muted mt1">${recent.length} student${recent.length!==1?'s':''} · ${fmtDate(recent[0].startedAt)}</p></div>
  </div>

  <div class="grid3 mb4">
    <div class="stat-box"><div class="stat-n">${recent.length}</div><div class="stat-l">Students</div></div>
    <div class="stat-box"><div class="stat-n">${totalEvents}</div><div class="stat-l">Total Events</div></div>
    <div class="stat-box"><div class="stat-n">${fmt(totalDuration)}</div><div class="stat-l">Session Length</div></div>
  </div>

  ${recent.map(sess=>{
    const events=sess.events||[];
    const byB={};
    events.forEach(ev=>{

// ── ANALYTICS ──────────────────────────────────────────────────────────────
function buildAnalyticsCharts(){
  const c=S.selClient;
  const range=S._anaRange||'week';
  const anaBeh=S._anaBeh||'all';
  const allSess=S.sessions.filter(s=>s.clientId===c.id);
  const allBehs2=[...new Set(allSess.flatMap(s=>s.events.map(e=>e.behaviorLabel)))].filter(Boolean);

  // ── Build time-bucketed data ──────────────────────────────────────────────
  function getBuckets(rangeKey){
    const now=new Date(); const buckets=[];
    if(rangeKey==='week'){
      // Last 14 days by day
      for(let i=13;i>=0;i--){
        const d=new Date(now); d.setDate(d.getDate()-i);
        const key=d.toISOString().slice(0,10);
        const label=d.toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric'});
        buckets.push({key,label,short:d.toLocaleDateString('en-US',{weekday:'short'})});
      }
    } else if(rangeKey==='month'){
      // Last 12 weeks by week
      for(let i=11;i>=0;i--){
        const d=new Date(now); d.setDate(d.getDate()-i*7);
        const wk=getWeekKey(d);
        const label='Wk of '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        buckets.push({key:wk,label,short:d.toLocaleDateString('en-US',{month:'short',day:'numeric'})});
      }
    } else if(rangeKey==='year'){
      // Last 12 months by month
      for(let i=11;i>=0;i--){
        const d=new Date(now.getFullYear(),now.getMonth()-i,1);
        const key=d.toISOString().slice(0,7);
        const label=d.toLocaleDateString('en-US',{month:'short',year:'numeric'});
        buckets.push({key,label,short:d.toLocaleDateString('en-US',{month:'short'})});
      }
    } else {
      // All time by year
      const years=[...new Set(allSess.map(s=>new Date(s.startedAt).getFullYear()))].sort();
      if(!years.length) years.push(now.getFullYear());
      years.forEach(y=>buckets.push({key:String(y),label:String(y),short:String(y)}));
    }
    return buckets;
  }
  function getWeekKey(d){
    const tmp=new Date(d); tmp.setHours(0,0,0,0);
    tmp.setDate(tmp.getDate()-tmp.getDay());
    return tmp.toISOString().slice(0,10);
  }
  function dateKey(ts,rangeKey){
    const d=new Date(ts);
    if(rangeKey==='week') return d.toISOString().slice(0,10);
    if(rangeKey==='month') return getWeekKey(d);
    if(rangeKey==='year') return d.toISOString().slice(0,7);
    return String(d.getFullYear());
  }

  const buckets=getBuckets(range);
  const bucketKeys=buckets.map(b=>b.key);

  // Count events per bucket per behavior
  function countByBucket(behLabel){
    const map={};
    bucketKeys.forEach(k=>{map[k]=0;});
    allSess.forEach(s=>{
      s.events.forEach(ev=>{
        if(behLabel!=='all'&&ev.behaviorLabel!==behLabel) return;
        const k=dateKey(ev.timestamp,range);
        if(k in map) map[k]++;
      });
    });
    return buckets.map(b=>map[b.key]||0);
  }

  // Duration averages per bucket
  function durationByBucket(behLabel){
    const map={};
    bucketKeys.forEach(k=>{map[k]={sum:0,cnt:0};});
    allSess.forEach(s=>{
      s.events.filter(ev=>ev.type==='duration'&&(behLabel==='all'||ev.behaviorLabel===behLabel)).forEach(ev=>{
        const k=dateKey(ev.timestamp,range);
        if(k in map){map[k].sum+=ev.durationMs;map[k].cnt++;}
      });
    });
    return buckets.map(b=>map[b.key].cnt?Math.round(map[b.key].sum/map[b.key].cnt/1000):0);
  }

  // Intensity averages per bucket
  function intensityByBucket(behLabel){
    const map={};
    bucketKeys.forEach(k=>{map[k]={sum:0,cnt:0};});
    allSess.forEach(s=>{
      s.events.filter(ev=>ev.type==='intensity'&&(behLabel==='all'||ev.behaviorLabel===behLabel)).forEach(ev=>{
        const k=dateKey(ev.timestamp,range);
        if(k in map){map[k].sum+=ev.intensity;map[k].cnt++;}
      });
    });
    return buckets.map(b=>map[b.key].cnt?(map[b.key].sum/map[b.key].cnt).toFixed(1):0);
  }

  const freqData=countByBucket(anaBeh);
  const durData=durationByBucket(anaBeh);
  const intData=intensityByBucket(anaBeh);
  const labels=buckets.map(b=>b.short);

  // Total stats for the period
  const totalEvents=freqData.reduce((a,v)=>a+v,0);
  const peakDay=buckets[freqData.indexOf(Math.max(...freqData))];
  const avgPerBucket=buckets.length?(totalEvents/buckets.length).toFixed(1):0;
  const hasData=totalEvents>0;

  // Per-behavior breakdown for heatmap
  const behRows=allBehs2.map(bl=>{
    const counts=countByBucket(bl);
    const total=counts.reduce((a,v)=>a+v,0);
    const peak=Math.max(...counts,1);
    return{label:bl,counts,total,peak};
  }).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);

  const rangeLabels={week:'Last 14 Days',month:'Last 12 Weeks',year:'Last 12 Months',all:'All Time'};

  return`
  <div class="card mb3" style="padding:14px 18px">
    <div class="row gap2 wrap" style="margin-bottom:10px">
      <div class="slabel" style="margin:0;align-self:center">Time Period</div>
      <div class="row gap1 wrap">
        ${[['week','Daily'],['month','Weekly'],['year','Monthly'],['all','Yearly']].map(([v,l])=>
          `<button class="btn btn-sm${range===v?' btn-primary':' btn-ghost'}" onclick="setAnaRange('${v}')">${l}</button>`
        ).join('')}
      </div>
    </div>
    <div class="row gap2 wrap">
      <div class="slabel" style="margin:0;align-self:center">Behavior</div>
      <div class="row gap1 wrap">
        <button class="btn btn-sm${anaBeh==='all'?' btn-primary':' btn-ghost'}" onclick="setAnaBeh('all')">All</button>
        ${allBehs2.map(bl=>`<button class="btn btn-sm${anaBeh===bl?' btn-primary':' btn-ghost'}" onclick="setAnaBeh('${esc(bl)}')">${esc(bl)}</button>`).join('')}
      </div>
    </div>
  </div>

  ${!hasData?`<div class="empty"><div class="empty-icon">📊</div><p style="font-weight:600">No data yet for this period</p><p class="mt2">Record sessions to see analytics here.</p></div>`:`

  <div class="grid3 mb3">
    <div class="stat-box"><div class="stat-n">${totalEvents}</div><div class="stat-l">Total Events</div></div>
    <div class="stat-box"><div class="stat-n">${avgPerBucket}</div><div class="stat-l">Avg per ${range==='week'?'Day':range==='month'?'Week':range==='year'?'Month':'Year'}</div></div>
    <div class="stat-box"><div class="stat-n" style="font-size:1rem">${peakDay?peakDay.short:'—'}</div><div class="stat-l">Peak ${range==='week'?'Day':range==='month'?'Week':range==='year'?'Month':'Year'}</div></div>
  </div>

  <div class="card mb3">
    <div class="row between mb3">
      <div>
        <div style="font-weight:700">Frequency Over Time</div>
        <div class="muted" style="font-size:.78rem">${rangeLabels[range]} · ${anaBeh==='all'?'All behaviors':esc(anaBeh)}</div>
      </div>
    </div>
    ${buildAreaChart(labels,freqData,'var(--accent)')}
  </div>

  ${durData.some(v=>v>0)?`<div class="card mb3">
    <div class="row between mb3">
      <div>
        <div style="font-weight:700">Average Duration</div>
        <div class="muted" style="font-size:.78rem">Seconds per incident · ${rangeLabels[range]}</div>
      </div>
    </div>
    ${buildAreaChart(labels,durData,'#06d6a0')}
  </div>`:''}

  ${intData.some(v=>v>0)?`<div class="card mb3">
    <div class="row between mb3">
      <div>
        <div style="font-weight:700">Average Intensity</div>
        <div class="muted" style="font-size:.78rem">Scale 1–4 · ${rangeLabels[range]}</div>
      </div>
    </div>
    ${buildAreaChart(labels,intData.map(Number),'#f59e0b',4)}
  </div>`:''}

  ${behRows.length>1?`<div class="card mb3">
    <div style="font-weight:700;margin-bottom:4px">Behavior Heatmap</div>
    <div class="muted mb3" style="font-size:.78rem">Event frequency — darker = more frequent</div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:.72rem">
        <thead>
          <tr>
            <th style="text-align:left;padding:4px 8px;color:var(--muted);font-weight:600;white-space:nowrap;min-width:110px">Behavior</th>
            ${buckets.slice(-10).map(b=>`<th style="text-align:center;padding:4px 4px;color:var(--muted);font-weight:600;white-space:nowrap">${b.short}</th>`).join('')}
            <th style="text-align:center;padding:4px 8px;color:var(--muted);font-weight:600">Total</th>
          </tr>
        </thead>
        <tbody>
          ${behRows.slice(0,8).map(r=>{
            const slicedCounts=r.counts.slice(-10);
            const globalPeak=Math.max(...behRows.map(rr=>Math.max(...rr.counts.slice(-10))),1);
            return`<tr>
              <td style="padding:5px 8px;font-weight:600;white-space:nowrap;color:var(--text)">${esc(r.label)}</td>
              ${slicedCounts.map(v=>{const pct=v/globalPeak;const a=v===0?0:Math.max(0.08,pct);const bg=v===0?'transparent':'rgba(45,125,98,'+a.toFixed(2)+')';const fc=pct>0.6?'#fff':'var(--text)';return'<td style="text-align:center;padding:6px 4px;border-radius:5px;background:'+bg+';color:'+fc+';font-family:Courier New,monospace;font-weight:700">'+( v>0?v:'·')+'</td>';}).join('')}
              <td style="text-align:center;padding:5px 8px;font-weight:800;color:var(--accent);font-family:'Courier New',monospace">${r.total}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`:''}

  `}`;
}

// ── FBA READINESS ──────────────────────────────────────────────────────────
function buildFBA(){
  const c=S.selClient;
  const teacherBanner=!isBehaviorist()?`<div style="background:var(--amber-soft);border:1.5px solid var(--amber);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
    <span style="font-size:1.3rem">👁</span>
    <div><div style="font-weight:800;font-size:.85rem;color:var(--amber)">View Only — Behaviorist Data</div>
    <div style="font-size:.78rem;color:var(--muted);margin-top:2px">behaviorist sessions and analysis are managed by the behavior specialist. You can view this data but cannot create behaviorist sessions or generate reports.</div></div>
  </div>`:'';
  const allSessions=S.sessions.filter(s=>s.clientId===c.id);
  // Only FBA-type sessions count toward FBA progress criteria
  const sessions=allSessions.filter(s=>s.sessType==='fba');
  const suppSessions=allSessions.filter(s=>s.sessType!=='fba');
  const allEv=sessions.flatMap(s=>s.events||[]);
  const suppEv=suppSessions.flatMap(s=>s.events||[]);
  const goals=clientGoals(c.id);

  // ── Score each criterion ─────────────────────────────────────────────────

  // 1. Session count (need ≥6 for solid, 3 minimum) — behaviorist sessions only
  const sessCount=sessions.length;
  const sessScore=sessCount>=6?2:sessCount>=3?1:0;
  const sessMax=2;

  // 2. Setting / location variety — distinct physical locations observed
  const locations=new Set(sessions.map(s=>s.location||'').filter(Boolean));
  const sessTypes=new Set(sessions.map(s=>s.sessType||'initial'));
  // Count distinct locations; if none logged, fall back to session type variety
  const settingVariety=locations.size>=1?locations.size:sessTypes.size;
  const settingScore=settingVariety>=3?2:settingVariety>=2?1:0;
  const settingMax=2;

  // 3. Behaviors identified — need at least 2 distinct target behaviors with data
  const behLabels=[...new Set(allEv.map(e=>e.behaviorLabel).filter(Boolean))];
  const behScore=behLabels.length>=3?2:behLabels.length>=2?1:behLabels.length>=1?0:0;
  const behMax=2;

  // 4. Antecedent data — ABC quality
  const evWithA=allEv.filter(e=>e.antecedent&&e.antecedent.trim().length>2);
  const abcPct=allEv.length>0?evWithA.length/allEv.length:0;
  const abcScore=abcPct>=0.5?2:abcPct>=0.2?1:0;
  const abcMax=2;

  // 5. Consequence data
  const evWithC=allEv.filter(e=>e.consequence&&e.consequence.trim().length>2);
  const consPct=allEv.length>0?evWithC.length/allEv.length:0;
  const consScore=consPct>=0.5?2:consPct>=0.2?1:0;
  const consMax=2;

  // 6. Duration data — need timing on at least some behaviors
  const durEvs=allEv.filter(e=>e.type==='duration'&&e.durationMs>0);
  const durScore=durEvs.length>=10?2:durEvs.length>=4?1:0;
  const durMax=2;

  // 7. Intensity data — severity ratings
  const intEvs=allEv.filter(e=>e.type==='intensity');
  const intScore=intEvs.length>=8?2:intEvs.length>=3?1:0;
  const intMax=2;

  // 8. Goal hypotheses — behavioral function hypotheses require written goals
  const goalScore=goals.length>=2?2:goals.length>=1?1:0;
  const goalMax=2;

  // 9. Trend data — need enough sessions to establish trend (≥5)
  const sessWithEvents=sessions.filter(s=>(s.events||[]).length>0).length;
  const trendScore=sessWithEvents>=5?2:sessWithEvents>=3?1:0;
  const trendMax=2;

  // 10. Observer notes — qualitative context
  const notedSess=sessions.filter(s=>s.note&&s.note.trim().length>10).length;
  const noteScore=notedSess>=4?2:notedSess>=2?1:0;
  const noteMax=2;

  const totalScore=sessScore+settingScore+behScore+abcScore+consScore+durScore+intScore+goalScore+trendScore+noteScore;
  const totalMax=sessMax+settingMax+behMax+abcMax+consMax+durMax+intMax+goalMax+trendMax+noteMax;
  const pct=Math.round((totalScore/totalMax)*100);

  // Readiness tier
  const tier=pct>=80?{label:'FBA Ready',color:'var(--green)',bg:'var(--green-soft)',emoji:'✅',desc:'Data is sufficient to support a defensible FBA and behavior intervention plan.'}
    :pct>=55?{label:'Nearly Ready',color:'var(--amber)',bg:'var(--amber-soft)',emoji:'🔶',desc:'Good foundation. Address the gaps below to strengthen your FBA.'}
    :pct>=30?{label:'In Progress',color:'var(--orange)',bg:'var(--orange-soft)',emoji:'🔷',desc:'Observation underway. Continue collecting data in the areas flagged below.'}
    :{label:'Not Ready',color:'var(--red)',bg:'var(--red-soft)',emoji:'⛔',desc:'Insufficient data for an FBA. See requirements below to get started.'};

  // Behavior-level breakdown
  const behBreakdown=behLabels.map(bl=>{
    const bevs=allEv.filter(e=>e.behaviorLabel===bl);
    const bDurs=bevs.filter(e=>e.type==='duration');
    const bInts=bevs.filter(e=>e.type==='intensity');
    const bAbc=bevs.filter(e=>e.antecedent&&e.antecedent.trim().length>2);
    const bCons=bevs.filter(e=>e.consequence&&e.consequence.trim().length>2);
    const bNotes=bevs.filter(e=>e.note&&e.note.trim().length>2);
    const bIcon=bevs[0]&&bevs[0].behaviorIcon||'🔲';

    // Pattern analysis: most common antecedents
    const antWords={};
    bevs.filter(e=>e.antecedent).forEach(e=>{
      e.antecedent.toLowerCase().split(/\s+/).filter(w=>w.length>3).forEach(w=>{
        antWords[w]=(antWords[w]||0)+1;
      });
    });
    const topAnts=Object.entries(antWords).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([w])=>w);

    const consWords={};
    bevs.filter(e=>e.consequence).forEach(e=>{
      e.consequence.toLowerCase().split(/\s+/).filter(w=>w.length>3).forEach(w=>{
        consWords[w]=(consWords[w]||0)+1;
      });
    });
    const topCons=Object.entries(consWords).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([w])=>w);

    // Guess behavioral function
    const escWords=['demand','task','told','asked','work','instruction','redirect'];
    const attWords=['attention','teacher','adult','peer','ignored','alone','called'];
    const accWords=['toy','item','prefer','want','taken','remove','denied'];
    const autoWords=['alone','quiet','sensory','self','stim','repetit'];

    const antText=(bevs.map(e=>e.antecedent||'').join(' ')+' '+bevs.map(e=>e.note||'').join(' ')).toLowerCase();
    const scores={escape:0,attention:0,access:0,automatic:0};
    escWords.forEach(w=>{if(antText.includes(w))scores.escape+=2;});
    attWords.forEach(w=>{if(antText.includes(w))scores.attention+=2;});
    accWords.forEach(w=>{if(antText.includes(w))scores.access+=2;});
    autoWords.forEach(w=>{if(antText.includes(w))scores.automatic+=2;});
    const topFunc=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
    const funcLabel=topFunc[1]>0?{escape:'Escape/Avoidance',attention:'Attention-Seeking',access:'Access to Preferred',automatic:'Automatic/Sensory'}[topFunc[0]]:null;

    // Locations where this behavior was observed
    const sessWithBeh=sessions.filter(s=>(s.events||[]).some(e=>e.behaviorLabel===bl));
    const bLocs=[...new Set(sessWithBeh.map(s=>s.location||'').filter(Boolean))];
    return{bl,bIcon,bevs,bDurs,bInts,bAbc,bCons,bNotes,topAnts,topCons,funcLabel,bLocs};
  });

  // Criteria rows
  const criteria=[
