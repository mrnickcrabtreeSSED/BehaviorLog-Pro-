<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BehaviorLog"/>
<meta name="theme-color" content="#1e3a5f"/>
<link rel="manifest" href="/manifest.json"/>
<title>BehaviorLog Pro — Sure Step Education</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── DailyWins palette ── */
  --bg:#f2f0ec;
  --bg2:#e8e5df;
  --surface:#ffffff;
  --surface2:#f7f5f1;
  --surface3:#edeae4;
  --border:#dedad3;
  --border2:#c8c3ba;

  /* nav — Sure Step Education navy */
  --nav:#1e3a5f;
  --nav-text:#ffffff;

  /* primary action — Sure Step Education teal */
  --accent:#1a7fa8;
  --accent-soft:#e4f4f9;
  --accent-hover:#15668a;

  /* secondary colors pulled directly from DailyWins pills */
  --orange:#e06018;   /* Sign Out / red-orange */
  --orange-soft:#fef0e6;
  --amber:#e8a100;    /* Schedule pill */
  --amber-soft:#fef8e2;
  --sky:#3498c0;      /* School Team pill */
  --sky-soft:#e5f2fa;
  --purple:#7b4ab4;   /* Customize pill */
  --purple-soft:#f1eaf8;

  /* text */
  --text:#1c1c1c;
  --text2:#3a3a3a;
  --muted:#88857e;

  /* semantic */
  --red:#d43c3c;
  --red-soft:#fdf0f0;
  --yellow:#d99200;
  --yellow-soft:#fef8e2;
  --green:#1a7fa8;
  --green-soft:#e4f4f9;

  --shadow:0 1px 3px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.05);
  --shadow-lg:0 4px 18px rgba(0,0,0,.11),0 1px 4px rgba(0,0,0,.06);

  /* parent portal */
  --pbg:#fff8f2;--psurface:#fff;--ptext:#1c1c1c;
  /* behaviorist session palette */
  --fba-green:#067a5f;
  --fba-soft:#e8f8f3;
  --fba-mid:#d0f0e4;
  --fba-dark:#044f3d;
  --paccent:#1a7fa8;--pmuted:#9a887e;--pborder:#ede5dc;
  --pgreen:#1a7fa8;
}

/* ── Base ────────────────────────────────────────────────────── */
html,body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif}
.app{max-width:900px;margin:0 auto;padding:0 0 90px}
.sub-view{padding:22px 22px 0;max-width:900px;margin:0 auto}
h1{font-size:1.6rem;font-weight:800;letter-spacing:-.4px;color:var(--nav-text)}
h2{font-size:1.25rem;font-weight:700;color:var(--text)}
h3{font-size:.95rem;font-weight:700;color:var(--text)}
.muted{color:var(--muted);font-size:.83rem}
.mono{font-family:'Courier New',monospace}

/* ── Layout helpers ──────────────────────────────────────────── */
.row{display:flex;align-items:center}
.between{justify-content:space-between}
.wrap{flex-wrap:wrap}
.gap1{gap:5px}.gap2{gap:10px}.gap3{gap:14px}.gap4{gap:18px}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:13px}.mt4{margin-top:20px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:13px}.mb4{margin-bottom:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.beh-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:500px){.beh-grid{grid-template-columns:repeat(2,1fr)}}

/* ── Typography ──────────────────────────────────────────────── */
.slabel{font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
  border-radius:16px;font-size:.71rem;font-weight:700}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}

/* ── Sure Step Education nav bar ─────────────────────────────── */
:root{
  --sse-navy:#1e3a5f;
  --sse-teal:#2a8fa8;
  --sse-blue:#1a6fa8;
  --nav:#1e3a5f;
  --nav-text:#ffffff;
}
.app-header{
  background:var(--sse-navy);
  padding:0 26px;
  padding-top:env(safe-area-inset-top,0);
  height:calc(62px + env(safe-area-inset-top,0));
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:0;
  position:sticky;
  top:0;
  z-index:50;
  box-shadow:0 2px 10px rgba(30,58,95,.35);
}
.app-header h1{display:none}
.app-header p{display:none}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-svg{height:38px;width:auto;flex-shrink:0}
.nav-logo-text{display:flex;flex-direction:column;line-height:1}
.nav-logo-text .sse-name{
  font-size:1.1rem;font-weight:800;color:#fff;letter-spacing:-.2px;line-height:1.1}
.nav-logo-text .sse-sub{
  font-size:.65rem;font-weight:600;color:rgba(255,255,255,.6);
  letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.nav-actions{display:flex;align-items:center;gap:7px}
.page-body{padding:22px 22px 0;max-width:900px;margin:0 auto}

/* ── Cards ───────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-accent{border-left:4px solid var(--accent)}

/* ── Buttons — match DailyWins pill style ────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;
  border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:700;
  font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.42;cursor:not-allowed}

/* primary = teal green (Students) */
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 6px rgba(26,127,168,.3)}
.btn-primary:hover:not(:disabled){background:var(--accent-hover);transform:translateY(-1px)}

/* ghost */
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--accent);background:var(--accent-soft)}

/* danger */
.btn-danger{background:var(--red-soft);color:var(--red);border:1.5px solid #f5b8b8}
.btn-danger:hover:not(:disabled){background:#fde8e8}

/* orange accent (Sign Out style) */
.btn-orange{background:var(--orange);color:#fff;box-shadow:0 2px 6px rgba(224,96,24,.3)}
.btn-orange:hover:not(:disabled){background:#c4531a;transform:translateY(-1px)}

/* amber (Schedule style) */
.btn-amber{background:var(--amber);color:#fff;box-shadow:0 2px 6px rgba(232,161,0,.3)}
.btn-amber:hover:not(:disabled){background:#c98c00;transform:translateY(-1px)}

/* sky (School Team style) */
.btn-sky{background:var(--sky);color:#fff;box-shadow:0 2px 6px rgba(52,152,192,.3)}
.btn-sky:hover:not(:disabled){background:#2a7fa8;transform:translateY(-1px)}

/* purple (Customize style) */
.btn-purple{background:var(--purple);color:#fff;box-shadow:0 2px 6px rgba(123,74,180,.3)}
.btn-purple:hover:not(:disabled){background:#663da0;transform:translateY(-1px)}

.btn-sm{padding:5px 11px;font-size:.75rem;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:.69rem;border-radius:6px}

/* ── Inputs ──────────────────────────────────────────────────── */
.input{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);
  border-radius:8px;padding:8px 12px;font-size:.86rem;font-family:inherit;
  outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,127,168,.12);background:#fff}
textarea.input{resize:vertical;min-height:70px}
select.input{cursor:pointer}

/* ── Client cards ────────────────────────────────────────────── */
.client-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:18px;margin-bottom:12px;
  box-shadow:var(--shadow);transition:box-shadow .2s,border-color .2s}
.client-card:hover{box-shadow:var(--shadow-lg);border-color:var(--border2)}
.client-avatar{width:42px;height:42px;border-radius:10px;
  background:var(--nav);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:1rem;flex-shrink:0}
.client-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

/* ── Behavior buttons ────────────────────────────────────────── */
.beh-btn{padding:14px 10px;border-radius:10px;background:var(--surface2);
  border:1.5px solid var(--border);cursor:pointer;text-align:center;
  transition:all .15s;display:flex;flex-direction:column;align-items:center;
  gap:5px;position:relative;min-height:88px;justify-content:center}
.beh-btn:hover{border-color:var(--accent);background:var(--accent-soft)}
.beh-icon{font-size:1.3rem}
.beh-label{font-size:.68rem;font-weight:700;color:var(--text2);line-height:1.2}
.beh-selected{border-color:var(--accent)!important;background:var(--accent-soft)!important}
@keyframes beh-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(212,60,60,.4);border-color:#f87171}
  50%{box-shadow:0 0 0 6px rgba(212,60,60,0);border-color:var(--red)}
}

/* ── Session type selector ───────────────────────────────────── */
.sess-type-card{border:2px solid var(--border);border-radius:12px;padding:18px;
  cursor:pointer;transition:all .2s;background:var(--surface);text-align:center}
.sess-type-card:hover{border-color:var(--accent);background:var(--accent-soft)}
.sess-type-card.selected{border-color:var(--accent);background:var(--accent-soft);
  box-shadow:0 0 0 3px rgba(26,127,168,.15)}
.sess-type-icon{font-size:2.2rem;margin-bottom:8px}
.sess-type-title{font-weight:800;font-size:.95rem;color:var(--text);margin-bottom:4px}
.sess-type-desc{font-size:.76rem;color:var(--muted);line-height:1.5}

/* ── Live recording banner ───────────────────────────────────── */
.live-banner{background:linear-gradient(135deg,#e4f4f9,#cceaf4);border:1.5px solid #8dcde3;
  border-radius:10px;padding:12px 16px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  animation:pulse 1.2s ease-in-out infinite;display:inline-block;margin-right:7px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.timer{font-family:'Courier New',monospace;font-size:2.1rem;color:var(--text);letter-spacing:3px}

/* ── Event feed ──────────────────────────────────────────────── */
.ev-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.ev-row:last-child{border-bottom:none}
.ev-badge{padding:2px 7px;border-radius:5px;font-size:.62rem;font-weight:700;
  font-family:'Courier New',monospace;text-transform:uppercase;white-space:nowrap}
.b-freq{background:#e8f3ff;color:#1a5fa8}.b-dur{background:#e4f4f9;color:#1a5f40}
.b-int{background:#fef8e2;color:#7a5200}.b-lat{background:#f3eeff;color:#5530a0}

/* ── Intensity pips ──────────────────────────────────────────── */
.int-bar{display:flex;gap:6px;margin-top:9px}
.int-pip{flex:1;height:38px;border-radius:8px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;font-size:.67rem;font-weight:800;
  transition:all .15s;border:2px solid transparent}
.int-pip:hover{transform:scaleY(1.06);filter:brightness(1.08)}

/* ── Stats ───────────────────────────────────────────────────── */
.stat-box{background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:13px;text-align:center}
.stat-n{font-family:'Courier New',monospace;font-size:1.6rem;font-weight:500;color:var(--accent)}
.stat-l{font-size:.68rem;color:var(--muted);margin-top:3px;font-weight:600}

/* ── Progress bars ───────────────────────────────────────────── */
.prog-track{height:7px;background:var(--surface3);border-radius:8px;overflow:hidden;margin:5px 0}
.prog-fill{height:100%;border-radius:8px;transition:width .4s ease}

/* ── Goal cards ──────────────────────────────────────────────── */
.goal-card{background:var(--surface);border:1px solid var(--border);
  border-radius:11px;padding:15px;margin-bottom:11px;box-shadow:var(--shadow)}
.goal-met{border-color:#7ec8e0!important;background:var(--green-soft)!important}
.goal-risk{border-color:#f5aaaa!important;background:var(--red-soft)!important}

/* ── PIN ─────────────────────────────────────────────────────── */
.pin-box{font-family:'Courier New',monospace;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:7px;padding:6px 12px;
  color:var(--accent);font-size:.95rem;letter-spacing:3px;min-width:72px;text-align:center}

/* ── Misc ────────────────────────────────────────────────────── */
.empty{text-align:center;padding:48px 22px;color:var(--muted)}
.empty-icon{font-size:3rem;opacity:.3;margin-bottom:12px}
.back-btn{display:inline-flex;align-items:center;gap:5px;color:var(--muted);
  font-size:.82rem;cursor:pointer;margin-bottom:16px;border:none;background:none;
  font-family:inherit;font-weight:600;padding:0}
.back-btn:hover{color:var(--accent)}
.scroll{max-height:280px;overflow-y:auto}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.fade{animation:fadein .22s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.chip{padding:12px 15px;border-radius:10px;background:var(--surface);
  border:1px solid var(--border);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.chip:hover{border-color:var(--accent);background:var(--accent-soft)}

/* ── Modal ───────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(20,20,26,.42);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:16px;padding:26px;max-width:400px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.18);max-height:85vh;overflow-y:auto}

/* ── Icon picker ─────────────────────────────────────────────── */
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;
  max-height:160px;overflow-y:auto;margin-top:8px}
.icon-opt{padding:7px;border-radius:7px;border:1.5px solid var(--border);
  cursor:pointer;text-align:center;font-size:1.15rem;transition:all .15s}
.icon-opt:hover{border-color:var(--accent);background:var(--accent-soft)}
.icon-opt.selected{border-color:var(--accent);background:var(--accent-soft)}

/* ── Mode selector tabs — DailyWins Entry/Weekly/Monthly/Annual style ── */
.mode-bar{display:flex;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;padding:3px;gap:3px;box-shadow:var(--shadow)}
.mode-btn{flex:1;padding:7px 14px;border-radius:7px;border:none;background:transparent;
  color:var(--muted);font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s}
.mode-btn.active{background:var(--nav);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.2)}

/* ── Parent portal ───────────────────────────────────────────── */
.papp{background:linear-gradient(160deg,#fff8f4 0%,#fff2ea 100%);min-height:100vh;font-family:inherit}
.pcont{max-width:640px;margin:0 auto;padding:26px 18px 70px}
.pheader{background:linear-gradient(135deg,#e06018 0%,#f59e0b 100%);padding:24px 28px;
  border-radius:14px;margin-bottom:22px;color:#fff;box-shadow:0 8px 28px rgba(224,96,24,.28)}
.pcard{background:#fff;border:1px solid var(--pborder);border-radius:13px;padding:18px;
  margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.win-card{background:linear-gradient(135deg,#e4f4f9 0%,#f0f9f5 100%);
  border:2px solid #8ecfb4;border-radius:13px;padding:20px;margin-bottom:12px}
.pin-dots{display:flex;gap:11px;justify-content:center;margin:18px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--paccent);transition:all .15s}
.pin-dot.filled{background:var(--paccent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:268px;margin:0 auto}
.pin-key{padding:14px;border-radius:10px;border:1.5px solid var(--pborder);
  background:#fff;font-size:1.2rem;font-weight:700;cursor:pointer;
  transition:all .15s;color:var(--ptext);font-family:inherit;text-align:center}
.pin-key:hover{background:#fff3ec;border-color:var(--paccent)}
.pin-err{color:#c0392b;font-size:.82rem;text-align:center;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.brow-p{display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1.5px solid var(--pborder)}
.brow-p:last-child{border-bottom:none}
.cnt-badge{background:#fff3ec;color:var(--paccent);font-family:'Courier New',monospace;
  font-size:.86rem;font-weight:600;padding:3px 11px;border-radius:20px}
.abc-item{background:#f8f4f0;border-radius:9px;padding:11px 13px;margin-top:7px;
  font-size:.82rem;color:var(--ptext);line-height:1.6}
.pslabel{font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--pmuted);margin-bottom:10px}

/* ── Responsive ──────────────────────────────────────────────── */
/* ── RESPONSIVE — Tablet (768px and below) ───────────────────── */
@media(max-width:768px){
  .app{padding:0 0 80px}
  .page-body{padding:18px 16px 0}
  .sub-view{padding:18px 16px 0}
  .grid2{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr 1fr}
  .grid4{grid-template-columns:repeat(3,1fr)}
  .beh-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .modal{max-width:90vw;padding:22px 18px}
  .client-card{padding:14px}
  .client-actions{gap:5px}
  h2{font-size:1.1rem}
  .timer{font-size:1.8rem}
  .stat-box{padding:10px}
  .stat-n{font-size:1.3rem}
  /* Admin tables scroll */
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
}

/* ── RESPONSIVE — Phone (520px and below) ────────────────────── */
@media(max-width:520px){
  .app{padding:0 0 72px}
  .page-body{padding:14px 12px 0}
  .sub-view{padding:14px 12px 0}

  /* Nav bar compact */
  .app-header{padding:0 10px;height:54px}
  .nav-logo-svg{height:30px}
  .nav-logo-text .sse-name{font-size:.88rem}
  .nav-logo-text .sse-sub{font-size:.52rem;letter-spacing:1px}
  .nav-actions{gap:4px}
  .nav-actions .btn-sm{padding:4px 7px;font-size:.68rem}
  .nav-actions .btn-amber{padding:4px 7px;font-size:.68rem}

  /* Grids go simpler */
  .grid2{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr}
  .grid4{grid-template-columns:repeat(2,1fr)}
  .beh-grid{grid-template-columns:repeat(2,1fr);gap:6px}

  /* Student cards — stack actions below */
  .client-card{padding:12px}
  .client-card .row.between.mb3{flex-direction:column;align-items:stretch;gap:10px}
  .client-actions{justify-content:flex-start;gap:4px;flex-wrap:wrap}
  .client-avatar{width:36px;height:36px;font-size:.85rem}

  /* Buttons */
  .btn{padding:7px 12px;font-size:.78rem}
  .btn-sm{padding:4px 8px;font-size:.7rem;border-radius:6px}
  .btn-xs{padding:2px 6px;font-size:.65rem}
  .btn-primary{padding:10px 16px;font-size:.85rem}

  /* Behavior buttons — bigger tap targets */
  .beh-btn{padding:16px 8px;min-height:80px;border-radius:12px}
  .beh-icon{font-size:1.5rem}
  .beh-label{font-size:.72rem}

  /* Timer — prominent */
  .timer{font-size:1.6rem;letter-spacing:2px}
  .live-banner{flex-direction:column;gap:8px;text-align:center;padding:10px 12px}

  /* Modals — full screen on phones */
  .modal-overlay{padding:0;align-items:flex-end}
  .modal{max-width:100%;width:100%;max-height:92vh;border-radius:18px 18px 0 0;
    padding:20px 16px;animation:modalSlideUp .25s ease}
  @keyframes modalSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

  /* Settings type selector stacks */
  .sess-type-card{padding:12px}
  .sess-type-icon{font-size:1.8rem;margin-bottom:4px}
  .sess-type-title{font-size:.85rem}
  .sess-type-desc{font-size:.7rem}

  /* Inputs slightly larger for touch */
  .input{padding:10px 12px;font-size:.88rem;border-radius:10px}
  select.input{padding:10px 12px;font-size:.88rem}
  textarea.input{min-height:60px}

  /* Intensity pips — taller for thumb tapping */
  .int-pip{height:44px;font-size:.72rem;border-radius:10px}

  /* Event feed compact */
  .ev-row{padding:6px 0}
  .ev-badge{font-size:.58rem;padding:2px 5px}

  },200);
}

  if(_pendingIP&&S.view==='record'){
    const ip=_pendingIP;
    const pips=[1,2,3,4].map(l=>'<div onclick="logIntFromPrompt('+l+')" style="flex:1;padding:16px 6px;border-radius:12px;background:'+INT_COLORS[l]+';color:'+INT_TEXT[l]+';text-align:center;cursor:pointer;font-weight:800;font-size:.85rem;transition:transform .12s" onmouseover="this.style.transform=\'scale(1.06)\'" onmouseout="this.style.transform=\'scale(1)\'">'+INT_LABELS[l]+'</div>').join('');
    const queueNote='<div style="background:var(--accent-soft);border-radius:8px;padding:5px 10px;font-size:.72rem;color:var(--accent);font-weight:600;text-align:center;margin-bottom:10px">'+(_pendingIP!==_pendingIP?'':''+(S.intensityPrompts.length>1?S.intensityPrompts.length-1+' more waiting after this':''))+'</div>';
    intOverlay='<div style="position:fixed;inset:0;background:rgba(20,20,26,.58);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);animation:fadein .2s ease">'
      +'<div style="background:#fff;border-radius:22px;padding:28px 26px;max-width:420px;width:100%;box-shadow:0 24px 64px rgba(20,20,26,.16)">'
        +(S.intensityPrompts.length>1?'<div style="background:var(--accent-soft);border-radius:8px;padding:5px 10px;font-size:.72rem;color:var(--accent);font-weight:600;text-align:center;margin-bottom:12px">'+S.intensityPrompts.length+' behaviors ended — rate each</div>':'')
        +'<div style="text-align:center;margin-bottom:16px">'
          +'<div style="font-size:2.4rem;margin-bottom:6px">'+ip.behIcon+'</div>'
          +'<div style="font-weight:800;font-size:1.05rem;color:var(--text)">'+esc(ip.behLabel)+'</div>'
          +'<div style="color:var(--green);font-weight:700;font-size:.85rem;margin-top:4px">✓ Ended &nbsp;·&nbsp; '+fmt(ip.durMs)+' duration</div>'
        +'</div>'
        +'<div style="margin-bottom:14px">'
          +'<div style="font-size:.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Consequence (C) — what happened after</div>'
          +'<input id="int-consequence" style="width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:.84rem;font-family:inherit" placeholder="What followed the behavior…" value="'+esc(ip.consequence||'')+'" oninput="updateIntConsequence(this.value)"/>'
        +'</div>'
        +'<div style="background:var(--surface2);border-radius:14px;padding:16px;margin-bottom:14px">'
          +'<div style="font-size:.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;text-align:center">Rate peak intensity</div>'
          +'<div style="display:flex;gap:8px">'+pips+'</div>'
        +'</div>'
        +'<div style="text-align:center">'
          +'<button class="btn btn-ghost btn-sm" onclick="skipIntensityPrompt()" style="color:var(--muted)">Skip</button>'
        +'</div>'
      +'</div>'
    +'</div>';
  }

  const modeBar='';

  let body='';
  if(S.view==='home')         body=buildHome();
  if(S.view==='record')       body=buildRecord();
  if(S.view==='summary')      body=buildSummary();
  if(S.view==='multiSummary') body=buildMultiSummary();
  if(S.view==='analytics')    body=buildAnalytics();
  if(S.view==='assessments')  body=buildAssessments();
  if(S.view==='admin')        body=buildAdmin();

  return intOverlay+modeBar+`<div class="app fade">${body}</div>`+modal;
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function buildModal(){

      <input class="input mb3" id="m-beh-label" value="${esc(b.label)}" placeholder="Behavior name…"/>
      <div class="slabel">Icon</div>
      <div class="icon-grid mb4">

      <div class="slabel">Measurement Type</div>
      <div style="display:flex;gap:6px;margin-bottom:18px">
        ${[{id:'frequency',icon:'🔢',label:'Frequency',desc:'Tap = +1 count'},{id:'duration',icon:'⏱',label:'Duration',desc:'Tap start/stop timer'},{id:'intensity',icon:'📊',label:'Intensity',desc:'Timer + severity rating'}].concat(isBehaviorist()?[{id:'latency',icon:'🔄',label:'Latency',desc:'Time to behavior onset'}]:[]).map(mt=>`<div onclick="${isEdit?"setBehMeasure('"+b.id+"','"+mt.id+"');S._modal.beh._m='"+mt.id+"'":"S._modal._newMeasure='"+mt.id+"'"};rerender()" style="flex:1;padding:10px 8px;border-radius:10px;border:2px solid ${curMeasure===mt.id?'var(--accent)':'var(--border)'};background:${curMeasure===mt.id?'var(--accent-soft)':'var(--surface2)'};text-align:center;cursor:pointer;transition:all .15s">
          <div style="font-size:1.3rem">${mt.icon}</div>
          <div style="font-size:.75rem;font-weight:700;margin-top:4px;color:${curMeasure===mt.id?'var(--accent)':'var(--text)'}">${mt.label}</div>
          <div style="font-size:.65rem;color:var(--muted);margin-top:2px">${mt.desc}</div>
        </div>`).join('')}
      </div>
      <div class="row gap2">
        <button class="btn btn-primary" style="flex:1" onclick="saveBehModal()">Save</button>
        ${isEdit&&!m.beh.preset?`<button class="btn btn-danger" onclick="deleteBehModal()">Delete</button>`:''}
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>`;
  }

  if(m.type==='sessType'){

    const cg=clientGoals(cid);
    const hasGoals=cg.length>0;
    const TYPES=[
      {id:'initial', icon:'🔍', label:'Initial Assessment',
       desc:'Track any behavior to identify patterns and build a behavioral profile. Generates goal recommendations at the end.',
       color:'var(--purple)', soft:'var(--purple-soft)', always:true},
      {id:'general', icon:'📋', label:'General Tracking',
       desc:'Track the student\'s configured behaviors in a structured observation — no goal pressure, pure data collection.',
       color:'var(--amber)', soft:'var(--amber-soft)', always:true},
      {id:'fba', icon:'🧠', label:'Behaviorist Observation',
       desc:isBehaviorist()?'Structured behavioral observation with setting events, antecedent categories, and hypothesis tools. Requires licensed behaviorist affirmation.':'Behaviorist observations can only be started by a licensed behaviorist. Contact your behavior support specialist.',

            <div style="font-size:1.8rem;flex-shrink:0">${tp.icon}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:800;font-size:.92rem;color:${m.sel===tp.id?tp.color:'var(--text)'};margin-bottom:2px">${tp.label}</div>
              <div style="font-size:.75rem;color:var(--muted);line-height:1.4">${tp.desc}</div>
            </div>
            ${m.sel===tp.id?'<div style="width:20px;height:20px;border-radius:50%;background:'+tp.color+';display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#fff;font-size:.75rem;font-weight:900">✓</span></div>':'<div style="width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0"></div>'}

      </div>
      <!-- FBA selected notice -->
      ${m.sel==='fba'?`<div style="background:var(--fba-soft);border:1.5px solid var(--fba-mid);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start">
        <span style="font-size:1.3rem;flex-shrink:0">🧠</span>
        <div>
          <div style="font-weight:800;font-size:.82rem;color:var(--fba-dark);margin-bottom:4px">This session will be uniquely built to meet the specific needs of this client.</div>

      ${m.location==='Other'?`<input class="input" id="sess-location-other" placeholder="Describe the setting…" value="${esc(m.locationOther||'')}" oninput="S._modal.locationOther=this.value" style="margin-top:4px"/>`:''}

          <button class="btn btn-ghost btn-xs" onclick="S._modal.selectedBehs=[...PRESETS.map(b=>b.id)];rerender()">Defaults Only</button>
          <button class="btn btn-ghost btn-xs" onclick="S._modal.selectedBehs=[];rerender()">Clear</button>
        </div>
        <div style="max-height:180px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:5px;padding:2px">
          ${allBehs().map(b=>{
            const on=(m.selectedBehs||[]).includes(b.id);
            return`<div onclick="toggleSessBeh('${b.id}')" style="display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;border:1.5px solid ${on?'var(--accent)':'var(--border)'};background:${on?'var(--accent-soft)':'var(--surface2)'};cursor:pointer;font-size:.78rem;font-weight:700;transition:all .12s">
              ${on?'<span style="color:var(--accent);font-size:.7rem">✓</span>':''}${b.icon} ${esc(b.label)}
            </div>`;
          }).join('')}
        </div>
        <!-- Quick-add behavior -->
        <div class="row gap2 mt2">
          <input class="input" id="sess-quick-beh" placeholder="Add new behavior on the fly…" style="flex:1;font-size:.82rem" onkeydown="if(event.key==='Enter')quickAddSessBeh()"/>
          <button class="btn btn-primary btn-xs" onclick="quickAddSessBeh()">+ Add</button>
        </div>
      </div>
      `:''}
      <div style="margin-bottom:18px"></div>
      <div class="row gap2">
        <button class="btn btn-primary" style="flex:1" id="start-sess-btn" onclick="confirmStartSession()" ${(()=>{
          if(!m.sel) return 'disabled';

          return '';

          </div>`;

      </div>
      <div class="slabel mb2">Session Type</div>
      <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:18px">
        ${[
          {id:'general',icon:'📋',label:'General Tracking',desc:'Track each student\'s configured behaviors — structured observation.',color:'var(--amber)',soft:'var(--amber-soft)'},
        ].map(tp=>`<div class="sess-type-card" style="text-align:left;display:flex;align-items:center;gap:12px;padding:12px 14px;${m.sel===tp.id?'border-color:'+tp.color+';background:'+tp.soft+';box-shadow:0 0 0 3px '+tp.color+'22':''}" onclick="selectSessType('${tp.id}')">
          <div style="font-size:1.6rem;flex-shrink:0">${tp.icon}</div>
          <div style="flex:1"><div style="font-weight:800;font-size:.88rem;color:${m.sel===tp.id?tp.color:'var(--text)'};margin-bottom:2px">${tp.label}</div>
          <div style="font-size:.73rem;color:var(--muted)">${tp.desc}</div></div>
          ${m.sel===tp.id?'<div style="width:18px;height:18px;border-radius:50%;background:'+tp.color+';display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#fff;font-size:.68rem;font-weight:900">✓</span></div>':''}
        </div>`).join('')}
      </div>
      <!-- Time display -->
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">

          <div class="slabel" style="margin-bottom:1px">Date &amp; Time</div>
          <div style="font-weight:700;font-size:.85rem;color:var(--text)">${new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>

        </div>`:'<p class="muted mt3" style="font-size:.78rem;text-align:center">No behaviors selected — all behaviors will show</p>';

        // ── Inline add/edit form ─────────────────────────────────────────
        const editingId=m.editingBehId||null; // custom behavior being edited
        const addingNew=m.addingBeh||false;

        const addOrEditForm=(addingNew||editingId)?`
          <div style="background:var(--surface2);border:1.5px solid var(--accent);border-radius:12px;padding:14px;margin-top:10px">
            <div class="slabel mb2" style="color:var(--accent)">${editingId?'Edit Custom Behavior':'New Custom Behavior'}</div>
            <input class="input mb2" id="cs-beh-label" placeholder="Behavior name…" value="${esc(editingId?(S.customs.find(x=>x.id===editingId)||{}).label||'':'')}"/>
            <div style="font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Icon</div>
            <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">
              ${ICON_OPTS.map(ic=>{
                const curIcon=editingId?(S.customs.find(x=>x.id===editingId)||{}).icon||'📌':m.newBehIcon||'📌';
                return`<div onclick="pickClientBehIcon('${ic}')" id="csiopt-${encodeURIComponent(ic)}" style="padding:6px;border-radius:7px;border:1.5px solid ${curIcon===ic?'var(--accent)':'var(--border)'};background:${curIcon===ic?'var(--accent-soft)':'#fff'};cursor:pointer;font-size:1.1rem;transition:all .12s">${ic}</div>`;
              }).join('')}
            </div>
            <div style="font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:10px">Measurement Type</div>
            <div style="display:flex;gap:5px;margin-bottom:12px">
              ${[{id:'frequency',icon:'🔢',label:'Frequency'},{id:'duration',icon:'⏱',label:'Duration'},{id:'intensity',icon:'📊',label:'Intensity'}].concat(isBehaviorist()?[{id:'latency',icon:'🔄',label:'Latency'}]:[]).map(mt=>{
                const curMt=editingId?getBehMeasure(editingId):(m._newMeasure||'duration');
                return`<div onclick="${editingId?"setBehMeasure('"+editingId+"','"+mt.id+"')":"S._modal._newMeasure='"+mt.id+"';rerender()"}" style="flex:1;padding:8px 4px;border-radius:8px;border:2px solid ${curMt===mt.id?'var(--accent)':'var(--border)'};background:${curMt===mt.id?'var(--accent-soft)':'#fff'};text-align:center;cursor:pointer;transition:all .12s">
                  <div style="font-size:1rem">${mt.icon}</div>
                  <div style="font-size:.68rem;font-weight:700;color:${curMt===mt.id?'var(--accent)':'var(--muted)'}">${mt.label}</div>
                </div>`;
              }).join('')}
            </div>
            <div class="row gap2">
              <button class="btn btn-primary btn-sm" onclick="saveClientCustomBeh('${c.id}')">Save</button>
              ${editingId?`<button class="btn btn-danger btn-sm" onclick="deleteClientCustomBeh('${c.id}','${editingId}')">Delete</button>`:''}
              <button class="btn btn-ghost btn-sm" onclick="cancelClientBehEdit()">Cancel</button>
            </div>
          </div>`:
          `<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-ghost btn-sm" onclick="selectAllClientBehs('${c.id}')">Select All</button>
            <button class="btn btn-ghost btn-sm" onclick="clearClientBehs('${c.id}')">Clear</button>
            <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="startAddClientBeh()">+ Custom Behavior</button>
          </div>`;

        tabContent=`<div style="max-height:280px;overflow-y:auto;padding-right:4px">${rows}</div>
          ${addOrEditForm}
          ${(!addingNew&&!editingId)?preview:''}`;
      }

      if(tab==='profile'){
        tabContent=`
          <div class="slabel mb2">Student Name</div>
          <div class="row gap2 mb4">
            <input class="input" id="cs-name-input" value="${esc(c.name)}" placeholder="Student name…"/>
            <button class="btn btn-primary btn-sm" onclick="saveClientName('${c.id}')">Save</button>
          </div>
          <div class="slabel mb2">Notes</div>
          <textarea class="input mb4" id="cs-notes-input" placeholder="Relevant background, accommodations, triggers…" style="min-height:80px">${esc(c.notes||'')}</textarea>
          <button class="btn btn-primary btn-sm" onclick="saveClientNotes('${c.id}')">Save Notes</button>
          <hr class="divider" style="margin:18px 0"/>
          <div class="slabel mb2" style="color:var(--red)">Danger Zone</div>
          <button class="btn btn-danger btn-sm" onclick="confirmDeleteClient('${c.id}')">🗑 Delete This Student</button>`;
      }

      inner=`<div class="row between mb3">
        <div>
          <div class="client-avatar" style="width:34px;height:34px;font-size:.85rem;display:inline-flex;vertical-align:middle;margin-right:9px">${initials(c.name)}</div>
          <strong>${esc(c.name)}</strong>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
      </div>
      ${tabBar}
      ${tabContent}`;
    }
  }

  return `<div class="modal-overlay" onclick="${showClose?'overlayClose(event)':''}"><div class="modal">${inner}</div></div>`;
}

      <span class="muted" style="font-size:.78rem;white-space:nowrap">${filtered.length}/${S.clients.length}</span>

      out+=`<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:12px;justify-content:center">
        ${letters.map(l=>`<button onclick="scrollToLetter('${l}')" style="width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);cursor:pointer;font-size:.7rem;font-weight:800;color:var(--text2);font-family:inherit;transition:all .12s" onmouseover="this.style.background='var(--accent)';this.style.color='#fff';this.style.borderColor='var(--accent)'" onmouseout="this.style.background='var(--surface2)';this.style.color='var(--text2)';this.style.borderColor='var(--border)'">${l}</button>`).join('')}

        <div class="row between mb3">
          <div class="row gap3">
            ${S._selectMode?`<div style="width:24px;height:24px;border-radius:6px;border:2px solid ${S._selected[c.id]?'var(--accent)':'var(--border2)'};background:${S._selected[c.id]?'var(--accent)':'#fff'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
              ${S._selected[c.id]?'<span style="color:#fff;font-size:.75rem;font-weight:900">✓</span>':''}
            </div>`:''}
            <div class="client-avatar">${initials(c.name)}</div>
            <div>
              <div style="font-weight:800;font-size:1.05rem">${esc(c.name)}</div>
              <div class="row gap2 mt1 wrap">
                ${c.studentId?`<span class="muted" style="font-size:.72rem">ID: ${esc(c.studentId)}</span>`:''}
                ${c.grade?`<span class="tag" style="background:var(--surface2);color:var(--text2)">${esc(c.grade)}</span>`:''}
                ${c.dob?`<span class="muted" style="font-size:.72rem">DOB: ${c.dob}</span>`:''}
              </div>
              <div class="row gap2 mt1 wrap">
                <span class="muted">${cs.length} session${cs.length!==1?'s':''}</span>
                ${cg.length>0?`<span class="tag" style="background:#ecfdf5;color:#065f46">🎯 ${cg.length} goal${cg.length!==1?'s':''}</span>`:''}

              </div>
