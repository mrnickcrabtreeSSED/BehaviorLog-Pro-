// ── AREA CHART (smooth, filled) ─────────────────────────────────────────────
function buildAreaChart(labels,data,color,maxY){
  if(!labels||!data||!data.length)return'';
  const W=700,H=180,P={t:16,r:16,b:42,l:38};
  const cW=W-P.l-P.r, cH=H-P.t-P.b;
  const max=maxY||Math.max(...data,1);
  const n=data.length;
  const xs=data.map((_,i)=>P.l+(n<2?cW/2:i*(cW/(n-1))));
  const ys=data.map(v=>P.t+cH-(v/max)*cH);

  // smooth curve using cubic bezier
  function smooth(pts){
    if(pts.length<2) return `M${pts[0][0]},${pts[0][1]}`;
    let d=`M${pts[0][0]},${pts[0][1]}`;
    for(let i=0;i<pts.length-1;i++){
      const x1=(pts[i][0]+pts[i+1][0])/2;
      d+=` C${x1},${pts[i][1]} ${x1},${pts[i+1][1]} ${pts[i+1][0]},${pts[i+1][1]}`;
    }
    return d;
  }
  const pts=xs.map((x,i)=>[x,ys[i]]);
  const linePath=smooth(pts);
  const areaPath=linePath+` L${xs[xs.length-1]},${P.t+cH} L${xs[0]},${P.t+cH} Z`;

  // Y-axis grid
  const gridLines=[0,0.25,0.5,0.75,1].map(f=>{
    const y=P.t+cH*(1-f);
    const val=Math.round(max*f*10)/10;
    return`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#e8edf5" stroke-width="1"/>
      <text x="${P.l-5}" y="${y+4}" text-anchor="end" font-size="9" fill="#9aa0c0">${val}</text>`;
  }).join('');

  // X-axis labels — show subset if too many
  const step=Math.ceil(n/10);
  const xLabels=xs.map((x,i)=>{
    if(i%step!==0&&i!==n-1) return'';
    return`<text x="${x}" y="${P.t+cH+16}" text-anchor="middle" font-size="9" fill="#9aa0c0">${labels[i]}</text>`;
  }).join('');

  // Dots on data points (only if few enough)
  const dots=n<=20?xs.map((x,i)=>data[i]>0?
    `<circle cx="${x}" cy="${ys[i]}" r="3.5" fill="${color}" stroke="#fff" stroke-width="2"/>`
    :`<circle cx="${x}" cy="${ys[i]}" r="2" fill="#dce1f5"/>`
  ).join(''):'';

  const uid2='c'+Math.random().toString(36).slice(2,7);
  return`<div style="width:100%;overflow:hidden"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <defs>
      <linearGradient id="${uid2}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity=".22"/>
        <stop offset="100%" stop-color="${color}" stop-opacity=".02"/>
      </linearGradient>
    </defs>
    ${gridLines}
    <path d="${areaPath}" fill="url(#${uid2})"/>
    <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${xLabels}
  </svg></div>`;
}

function buildBarChart(data,yLabel){
  if(!data||!data.length)return'';
  const W=500,H=160,P={t:10,r:10,b:40,l:30};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const max=Math.max(...data.map(d=>d.val),1);
  const gap=cW/data.length;
  const bW=Math.min(42,gap*.65);
  let bars='',labs='',vals='';
  data.forEach((d,i)=>{
    const x=P.l+i*gap+gap/2;
    const bH=Math.max(2,(d.val/max)*cH);
    const y=P.t+cH-bH;
    bars+=`<rect x="${x-bW/2}" y="${y}" width="${bW}" height="${bH}" rx="4" fill="url(#bg1)"/>`;
    if(d.val>0)vals+=`<text x="${x}" y="${y-4}" text-anchor="middle" font-size="10" fill="#7880a4" font-weight="600">${d.val}</text>`;
    labs+=`<text x="${x}" y="${P.t+cH+16}" text-anchor="middle" font-size="9" fill="#7880a4">${(d.label||'').slice(0,10)}</text>`;
  });
  let grid='';
  [0,.5,1].forEach(f=>{
    const y=P.t+cH*(1-f);
    grid+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#dce1f5" stroke-width="1"/>`;
    if(f>0)grid+=`<text x="${P.l-3}" y="${y+4}" text-anchor="end" font-size="9" fill="#7880a4">${Math.round(max*f)}</text>`;
  });
  return`<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <defs><linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs>
    ${grid}${bars}${vals}${labs}</svg></div>`;
}
function buildLineChart(data,yLabel){
  if(!data||data.length<2)return'';
  const W=500,H=140,P={t:10,r:10,b:36,l:30};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const max=Math.max(...data.map(d=>d.val),1);
  const pts=data.map((d,i)=>({x:P.l+i*(cW/(data.length-1)),y:P.t+cH-(d.val/max)*cH,lbl:d.label}));
  const poly=pts.map(p=>`${p.x},${p.y}`).join(' ');
  const area=`${P.l},${P.t+cH} `+pts.map(p=>`${p.x},${p.y}`).join(' ')+` ${P.l+cW},${P.t+cH}`;
  let grid='';
  [0,.5,1].forEach(f=>{
    const y=P.t+cH*(1-f);
    grid+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#dce1f5" stroke-width="1"/>`;
    if(f>0)grid+=`<text x="${P.l-3}" y="${y+4}" text-anchor="end" font-size="9" fill="#7880a4">${Math.round(max*f)}</text>`;
  });
  const dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="2"/>`).join('');
  const labs=pts.filter((_,i)=>i===0||i===pts.length-1||pts.length<8||i%Math.ceil(pts.length/6)===0)
    .map(p=>`<text x="${p.x}" y="${P.t+cH+14}" text-anchor="middle" font-size="9" fill="#7880a4">${p.lbl}</text>`).join('');
  return`<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity=".18"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    ${grid}<polygon points="${area}" fill="url(#lg1)"/>
    <polyline points="${poly}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}${labs}</svg></div>`;
}
function buildGoalLineChart(data,target){
  if(!data||data.length<1)return'';
  const W=500,H=110,P={t:14,r:40,b:30,l:30};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const max=Math.max(...data.map(d=>d.val),target*1.5,1);
  const pts=data.map((d,i)=>({x:P.l+(data.length<2?cW/2:i*(cW/Math.max(1,data.length-1))),y:P.t+cH-(d.val/max)*cH}));
  const tY=P.t+cH-(target/max)*cH;
  const poly=pts.map(p=>`${p.x},${p.y}`).join(' ');
  const grid=`<line x1="${P.l}" y1="${P.t+cH}" x2="${W-P.r}" y2="${P.t+cH}" stroke="#dce1f5"/>`;
  const dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--accent)" stroke="#fff" stroke-width="2"/>`).join('');
  const labs=data.map((d,i)=>{
    const x=P.l+(data.length<2?cW/2:i*(cW/Math.max(1,data.length-1)));
    return`<text x="${x}" y="${P.t+cH+13}" text-anchor="middle" font-size="8" fill="#7880a4">${d.label}</text>`;
  }).join('');
  return`<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    ${grid}
    <line x1="${P.l}" y1="${tY}" x2="${W-P.r}" y2="${tY}" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="${W-P.r+4}" y="${tY+4}" font-size="8" fill="#f59e0b" font-weight="700">target</text>
    ${data.length>1?`<polyline points="${poly}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>`:''}
    ${dots}${labs}</svg></div>`;
}
function buildBarChartLight(data,yLabel){
  if(!data||!data.length)return'';
  const W=500,H=120,P={t:8,r:10,b:28,l:22};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const max=Math.max(...data.map(d=>d.val),1);
  const gap=cW/data.length,bW=Math.min(30,gap*.65);
  let bars='',labs='';
  data.forEach((d,i)=>{
    const x=P.l+i*gap+gap/2;
    const bH=Math.max(1,(d.val/max)*cH);
    bars+=`<rect x="${x-bW/2}" y="${P.t+cH-bH}" width="${bW}" height="${bH}" rx="3" fill="#e25d2e" opacity=".7"/>`;
    labs+=`<text x="${x}" y="${P.t+cH+12}" text-anchor="middle" font-size="9" fill="#9a8a80">${d.label}</text>`;
  });
  return`<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <line x1="${P.l}" y1="${P.t+cH}" x2="${W-P.r}" y2="${P.t+cH}" stroke="#f0e8e0"/>
    ${bars}${labs}</svg></div>`;
}


// ── TEMPLATE UPLOAD ────────────────────────────────────────────────────────
function uploadTemplate(input, kind){
  const file = input.files[0];
  if(!file) return;
  const keyMap={bip:['_bipTemplate','_bipTemplateName'],goal:['_goalTemplate','_goalTemplateName'],fba:['_fbaTemplate','_fbaTemplateName']};
  const keys=keyMap[kind]||keyMap.goal;
  const reader = new FileReader();
  reader.onload = function(e){
    S[keys[0]] = e.target.result;
    S[keys[1]] = file.name;
    persist(); rerender();
  };
  if(file.name.match(/\.(txt|md)$/i)){
    reader.readAsText(file);
  } else {
    S[keys[0]] = '[Binary template: '+file.name+']';
    S[keys[1]] = file.name;
    persist(); rerender();
  }
}
function clearTemplate(kind){
  if(!confirm('Remove this template?')) return;
  if(kind==='bip'){ S._bipTemplate=null; S._bipTemplateName=null; }
  else if(kind==='fba'){ S._fbaTemplate=null; S._fbaTemplateName=null; }
  else { S._goalTemplate=null; S._goalTemplateName=null; }
  persist(); rerender();
}

// ── AI DOCUMENT GENERATION ─────────────────────────────────────────────────
function generateFbaDoc(docType, clientId){
  // GATE: AI document generation is a higher-tier paid feature.
  // Even for behaviorists, surface the disclaimer + DPA requirements before any
  // student data could be transmitted to the Anthropic API.
  S._modal={type:'fbaPaywall', docType, clientId, expanded:false};
  rerender();
  return;
}

// Original generation logic preserved for future activation under a signed DPA.
// When that path is enabled, route to this function from a tier-checking wrapper.
function _generateFbaDoc_internal(docType, clientId){
  const client = S.clients.find(c=>c.id===clientId);
  if(!client){ alert('Student not found.'); return; }

  const fbaSessions = S.sessions.filter(s=>s.clientId===clientId && s.isFbaObservation===true);
  const suppSessions = S.sessions.filter(s=>s.clientId===clientId && s.isFbaObservation!==true);
  const allEv = fbaSessions.flatMap(s=>s.events||[]);
  const goals = (S.goals||[]).filter(g=>g.clientId===clientId);

  if(fbaSessions.length===0){
    alert('No Behaviorist Log entries yet. End a session and choose "Save to Behaviorist Log" at the prompt to add an entry before generating documents.');
    return;
  }

  // Build behavior summary
  const byB = {};
  allEv.forEach(ev=>{
    if(!byB[ev.behaviorLabel]) byB[ev.behaviorLabel]={label:ev.behaviorLabel,icon:ev.behaviorIcon||'',freq:0,durs:[],ints:[],ants:[],cons:[]};
    if(ev.type==='frequency') byB[ev.behaviorLabel].freq++;
    if(ev.type==='duration') byB[ev.behaviorLabel].durs.push(ev.durationMs);
    if(ev.type==='intensity') byB[ev.behaviorLabel].ints.push(ev.intensity);
    if(ev.antecedent&&ev.antecedent.trim()) byB[ev.behaviorLabel].ants.push(ev.antecedent);
    if(ev.consequence&&ev.consequence.trim()) byB[ev.behaviorLabel].cons.push(ev.consequence);
  });
  const behSummary = Object.values(byB).map(b=>{
    const avgDur = b.durs.length ? Math.round(b.durs.reduce((a,v)=>a+v,0)/b.durs.length/1000) : null;
    const avgInt = b.ints.length ? (b.ints.reduce((a,v)=>a+v,0)/b.ints.length).toFixed(1) : null;
    return `Behavior: ${b.label}
  Frequency: ${b.freq} incidents across ${fbaSessions.length} sessions
  ${avgDur?'Avg Duration: '+avgDur+' seconds':''}
  ${avgInt?'Avg Intensity: '+avgInt+'/4':''}
  Common antecedents: ${[...new Set(b.ants)].slice(0,5).join('; ')||'none recorded'}
  Common consequences: ${[...new Set(b.cons)].slice(0,5).join('; ')||'none recorded'}`;
  }).join('\n\n');

  const settingEventsSummary = fbaSessions
    .filter(s=>s.settingEvents&&s.settingEvents.length)
    .map(s=>`${new Date(s.startedAt).toLocaleDateString()}: ${s.settingEvents.join(', ')}`)
    .join('\n');

  const hypotheses = fbaSessions
    .filter(s=>s.fbaHypothesis&&s.fbaHypothesis.trim())
    .map(s=>`[${new Date(s.startedAt).toLocaleDateString()} - ${s.behavioristName||'Behaviorist'}]: ${s.fbaHypothesis}`)
    .join('\n');

  const locations = [...new Set(fbaSessions.map(s=>s.location||'').filter(Boolean))];
  const behaviorists = [...new Set(fbaSessions.map(s=>s.behavioristName||'').filter(Boolean))];

  const dataContext = `STUDENT: ${client.name}
FBA SESSIONS: ${fbaSessions.length} (plus ${suppSessions.length} supplemental sessions)
SETTINGS OBSERVED: ${locations.join(', ')||'not specified'}
BEHAVIORIST(S): ${behaviorists.join(', ')||'not specified'}
TOTAL EVENTS LOGGED: ${allEv.length}
DATE RANGE: ${fbaSessions.length?new Date(fbaSessions[0].startedAt).toLocaleDateString()+' – '+new Date(fbaSessions[fbaSessions.length-1].startedAt).toLocaleDateString():''}

BEHAVIOR DATA:
${behSummary||'No events recorded'}

SETTING EVENTS NOTED:
${settingEventsSummary||'None recorded'}

BEHAVIORIST HYPOTHESIS NOTES:
${hypotheses||'None recorded'}

SUPPLEMENTAL DATA: ${suppSessions.length} additional sessions from other observation types available as reference.`;

  const templateContext = docType==='bip' && S._bipTemplate && !S._bipTemplate.startsWith('[Binary')
    ? '\n\nDISTRICT BIP TEMPLATE STRUCTURE TO FOLLOW:\n'+S._bipTemplate.slice(0,2000)
    : docType==='goals' && S._goalTemplate && !S._goalTemplate.startsWith('[Binary')
    ? '\n\nDISTRICT GOAL TEMPLATE STRUCTURE TO FOLLOW:\n'+S._goalTemplate.slice(0,2000)
    : '';

  const templateNameHint = docType==='bip' && S._bipTemplateName ? ' Match the section structure of the uploaded template: '+S._bipTemplateName+'.'
    : docType==='goals' && S._goalTemplateName ? ' Follow the format of the uploaded template: '+S._goalTemplateName+'.'
    : '';

  const prompts = {
    bip: `You are an expert school behaviorist writing a Behavior Intervention Plan (BIP) for a special education student. Use the Behaviorist observation data below to write a complete, professional BIP draft.${templateNameHint}

Include: (1) Student background and behavior description, (2) Identified behavioral function(s) based on ABC data, (3) Antecedent-based strategies (prevention), (4) Teaching replacement behaviors, (5) Consequence strategies, (6) Crisis response protocol if warranted, (7) Progress monitoring plan.

Write in professional IEP language. Be specific and evidence-based. Use the actual data provided.${templateContext}

FBA DATA:
${dataContext}`,

    goals: `You are a special education specialist writing measurable behavior goals for an IEP based on completed FBA data. Use the observation data below to write 2-4 specific, measurable, attainable, relevant, time-bound (SMART) behavior goals.${templateNameHint}

For each goal include: (1) Baseline from FBA data, (2) Annual goal statement with measurable criteria, (3) Short-term objectives (2-3 per goal), (4) Measurement method, (5) Evaluation schedule.

Write in standard IEP goal language. Base all baselines on the actual session data.${templateContext}

FBA DATA:
${dataContext}`,

    summary: `You are a school behaviorist writing a professional FBA Summary narrative. Use the observation data below to write a clear, defensible FBA summary suitable for an IEP team.

Include: (1) Reason for referral and assessment overview, (2) Assessment methods used, (3) Behavioral descriptions and patterns, (4) Antecedent and consequence analysis, (5) Hypothesized behavioral function(s) with rationale, (6) Summary and recommendations.

Write in clear professional language accessible to parents and educators alike.

FBA DATA:
${dataContext}`
  };

  const docLabels = {bip:'BIP Draft', goals:'Behavior Goals', summary:'FBA Summary'};

  // Show a generating modal
  S._modal = {type:'fbaGenerating', docType, clientId, label:docLabels[docType]};
  rerender();

  fetch('/api/claude', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:2000,
      messages:[{role:'user',content:prompts[docType]}]
    })
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.error){
      S._modal={type:'fbaDocResult', docType, clientId, label:docLabels[docType], content:'Error: '+data.error.message+'. Check your API key in Settings.'};
    } else {
      const text = (data.content||[]).map(b=>b.text||'').join('');
      S._modal={type:'fbaDocResult', docType, clientId, label:docLabels[docType], content:text};
    }
    rerender();
  })
  .catch(err=>{
    S._modal={type:'fbaDocResult', docType, clientId, label:docLabels[docType], content:'Network error: '+err.message};
    rerender();
  });
}

// ── PDF Export (HTML print-based, mirrors analytics tabs) ──────────────
// Entry point — opens a popup so the user chooses which tabs to include.
function doExportPDF(){
  if(!S.selClient){return;}
  S._modal={type:'exportPDF',
    sections:{charts:true, reports:true, history:true, goals:true},
    privacy:{includeNotes:false, includeAbcLog:false}
  };
  rerender();
}

function toggleExportOpt(group,key){
  if(!S._modal||S._modal.type!=='exportPDF')return;
  S._modal[group][key]=!S._modal[group][key];
  rerender();
}

function setAllExportOpts(group,val){
  if(!S._modal||S._modal.type!=='exportPDF')return;
  Object.keys(S._modal[group]||{}).forEach(k=>{S._modal[group][k]=val;});
  rerender();
}

function doExportPDFWithOptions(){
  const m=S._modal;
  if(!m||m.type!=='exportPDF')return;
  const opts={sections:{...m.sections},privacy:{...m.privacy}};
  S._modal=null;
  rerender();
  setTimeout(()=>runHTMLExport(opts),60);
}

// Build a printable HTML window that mirrors the analytics tabs (Charts, Reports,
// History, Goals) exactly as the user sees them on screen. We reuse the same
// build* functions that the in-app analytics view uses, so the PDF cannot drift
// from the live UI. The browser's native Print-to-PDF gives us perfect chart
// fidelity (the SVG charts render natively, no jsPDF approximations).
function runHTMLExport(opts){
  const c=S.selClient;
  if(!c) return;

  // Snapshot analytics-related state so we can restore it after capturing each tab
  const savedTab=S._anaTab, savedAnaRange=S._anaRange, savedAnaBeh=S._anaBeh, savedRepRange=S._reportRange;

  // Use the user's currently selected ranges so the PDF matches what they see
  if(!S._anaRange) S._anaRange='week';
  if(!S._anaBeh) S._anaBeh='all';
  if(!S._reportRange) S._reportRange='all';

  const parts=[];

  if(opts.sections.charts){
    parts.push(_makeSection('📊 Charts — Frequency, Duration, Intensity, Heatmap', buildAnalyticsCharts()));
  }
  if(opts.sections.reports){
    parts.push(_makeSection('📄 Reports — Session Summary & Goal Status', buildReports()));
  }
  if(opts.sections.history){
    parts.push(_makeSection('🕐 History — Session Timeline', buildHistory()));
  }
  if(opts.sections.goals){
    parts.push(_makeSection('🎯 Goals — IEP Behavior Goals & Progress', buildGoals()));
  }
  if(opts.privacy.includeNotes || opts.privacy.includeAbcLog){
    parts.push(_makeSection('📝 Detail Appendix', _buildDetailAppendix(c, opts)));
  }

  // Restore state
  S._anaTab=savedTab;
  S._anaRange=savedAnaRange;
  S._anaBeh=savedAnaBeh;
  S._reportRange=savedRepRange;

  const sessionCount=S.sessions.filter(s=>s.clientId===c.id).length;
  const generated=new Date().toLocaleString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});

  // Privacy footer text varies based on what was included
  const includedTabs=Object.entries(opts.sections).filter(([k,v])=>v).map(([k])=>k);
  const sensitiveIncluded=opts.privacy.includeNotes||opts.privacy.includeAbcLog;

  const html=`<!DOCTYPE html><html><head>
<meta charset="UTF-8"/>
<title>BehaviorLog — ${esc(c.name)}</title>
<style>
${_getPrintCSS()}
</style>
</head><body>
<header class="print-header">
  <div class="print-header-inner">
    <div>
      <div class="print-brand">BehaviorLog<span style="color:var(--accent);font-weight:400">  Pro</span></div>
      <h1 class="print-title">${esc(c.name)} — Behavior Data Report</h1>
      <p class="print-meta">Generated ${esc(generated)} · ${sessionCount} session${sessionCount!==1?'s':''} on record · Confidential — FERPA-protected</p>
    </div>
    <div class="print-toolbar no-print">
      <button onclick="window.print()" class="print-btn">🖨 Save as PDF</button>
      <button onclick="window.close()" class="print-btn print-btn-ghost">✕ Close</button>
    </div>
  </div>
</header>

<div class="no-print print-tip">
  <strong>📄 To save:</strong> Click <strong>Save as PDF</strong> above, or press <strong>Ctrl/Cmd+P</strong> → choose <strong>Save as PDF</strong> as destination.
</div>

<main class="print-body">
  ${parts.join('')}
</main>

<footer class="print-footer">
  <p>BehaviorLog Pro · Sure Step Education · This document contains FERPA-protected student data. Distribute only to authorized IEP team members.${sensitiveIncluded?' <strong>Includes free-text narrative content</strong> — heightened sensitivity.':''}</p>
  <p>Report includes: ${includedTabs.map(t=>t.charAt(0).toUpperCase()+t.slice(1)).join(' · ')||'(empty)'}</p>
</footer>
</body></html>`;

  const w=window.open('','_blank');
  if(!w){
    alert('Allow popups for this site to export the report. Then try again.');
    return;
  }
  w.document.open();
  w.document.write(html);
  w.document.close();
  // Give SVG charts a moment to lay out before the print dialog opens
  setTimeout(()=>{ try { w.focus(); } catch(e){} }, 200);
}

function _makeSection(title, htmlBody){
  return `<section class="print-section">
    <h2 class="print-section-title">${esc(title)}</h2>
    <div class="print-section-body">${htmlBody}</div>
  </section>`;
}

// Optional detail appendix — only renders when the user opted in to either of
// these elevated-sensitivity sections.
function _buildDetailAppendix(client, opts){
  const sessions=S.sessions.filter(s=>s.clientId===client.id).sort((a,b)=>a.startedAt-b.startedAt);
  let body='';
  if(opts.privacy.includeNotes){
    const withNotes=sessions.filter(s=>(s.note||'').trim().length>0);
    body+=`<h3 style="font-size:1rem;margin-top:8px">Session Notes (${withNotes.length})</h3>`;
    if(!withNotes.length){
      body+='<p class="muted">No session notes recorded.</p>';
    } else {
      body+='<div style="display:flex;flex-direction:column;gap:8px">';
      withNotes.forEach(s=>{
        body+=`<div class="card" style="margin-bottom:6px;padding:12px 14px">
          <div style="font-weight:700;font-size:.85rem;margin-bottom:4px">${fmtDate(s.startedAt)} · ${fmtTime(s.startedAt)}${s.location?' · 📍 '+esc(s.location):''}</div>
          <div style="font-size:.88rem;color:var(--text2);line-height:1.5;white-space:pre-wrap">${esc(s.note)}</div>
        </div>`;
      });
      body+='</div>';
    }
  }
  if(opts.privacy.includeAbcLog){
    const abcEvents=sessions.flatMap(s=>(s.events||[]).filter(e=>e.antecedent||e.consequence).map(e=>({...e,_sessStart:s.startedAt})));
    body+=`<h3 style="font-size:1rem;margin-top:18px">ABC Log (${abcEvents.length} entries)</h3>`;
    if(!abcEvents.length){
      body+='<p class="muted">No antecedent/consequence data recorded.</p>';
    } else {
      body+='<table style="width:100%;border-collapse:collapse;font-size:.82rem;margin-top:4px"><thead><tr>'
        +'<th style="text-align:left;padding:6px 8px;border-bottom:1.5px solid var(--border);font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Date / Behavior</th>'
        +'<th style="text-align:left;padding:6px 8px;border-bottom:1.5px solid var(--border);font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Antecedent (A)</th>'
        +'<th style="text-align:left;padding:6px 8px;border-bottom:1.5px solid var(--border);font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Consequence (C)</th>'
        +'</tr></thead><tbody>';
      abcEvents.forEach((ev,i)=>{
        body+=`<tr style="background:${i%2?'var(--surface2)':'transparent'}">
          <td style="padding:8px;vertical-align:top;font-size:.78rem;border-bottom:1px solid var(--border)">
            <strong>${esc(ev.behaviorLabel||'')}</strong><br>
            <span class="muted" style="font-size:.72rem">${fmtDateS(ev._sessStart)} ${fmtTime(ev.timestamp||ev._sessStart)}</span>
          </td>
          <td style="padding:8px;vertical-align:top;font-size:.8rem;border-bottom:1px solid var(--border);color:var(--accent)">${esc(ev.antecedent||'—')}</td>
          <td style="padding:8px;vertical-align:top;font-size:.8rem;border-bottom:1px solid var(--border);color:var(--orange)">${esc(ev.consequence||'—')}</td>
        </tr>`;
      });
      body+='</tbody></table>';
    }
  }
  return body;
}

// CSS for the print window — mirrors the in-app analytics view exactly.
// Variables match the live app so colors, spacing, charts all look identical.
function _getPrintCSS(){

function bulkDeleteStudents(){
  const ids=Object.keys(S._selected).filter(k=>S._selected[k]);
  if(!ids.length) return;
  const names=ids.map(id=>{const c=S.clients.find(x=>x.id===id);return c?c.name:'Unknown';});
  if(!confirm('Delete '+ids.length+' student'+(ids.length>1?'s':'')+'?\n\n'+names.join('\n')+'\n\nThis will also delete all their session data and goals.')) return;
  S.clients=S.clients.filter(c=>!ids.includes(c.id));
  S.sessions=S.sessions.filter(s=>!ids.includes(s.clientId));
  S.goals=S.goals.filter(g=>!ids.includes(g.clientId));

  S._selected={};
  persist();rerender();
}

function updateManualBeh(bid,field,val){

function saveManualEntry(cid){
  const m=S._modal;
  if(!m) return;
  const date=document.getElementById('me-date')?.value;
  const time=document.getElementById('me-time')?.value||'09:00';
  const location=document.getElementById('me-location')?.value||'';
  const length=parseInt(document.getElementById('me-length')?.value)||null;
  const notes=document.getElementById('me-notes')?.value||'';

  if(!date){alert('Please enter a date.');return;}

  // Build events from entries
  const events=[];
  const entries=m.entries||{};
  const startTs=new Date(date+'T'+time).getTime();

  Object.entries(entries).forEach(([bid,e])=>{
    const b=allBehs().find(x=>x.id===bid);
    if(!b) return;
    const freq=parseInt(e.freq)||0;
    const durMin=parseFloat(e.durMin)||0;
    const intensity=e.intensity?parseInt(e.intensity):null;

    // Log frequency events
    for(let i=0;i<freq;i++){
      const ev={id:uid(),type:'frequency',behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,timestamp:startTs+(i*60000),antecedent:'',consequence:'',manual:true};
      if(intensity) ev.intensity=intensity;
      events.push(ev);
    }

    // Log duration if provided
    if(durMin>0){
      events.push({id:uid(),type:'duration',behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,timestamp:startTs,durationMs:durMin*60000,antecedent:'',consequence:'',manual:true,intensity:intensity||null});
    }

    // If only intensity provided (no freq or dur), log a single intensity event
    if(intensity&&freq===0&&durMin===0){
      events.push({id:uid(),type:'intensity',behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,timestamp:startTs,intensity,antecedent:'',consequence:'',manual:true});
    }
  });

  if(!events.length){alert('Please enter data for at least one behavior.');return;}

  // Create a session record
  const c=S.clients.find(x=>x.id===cid);
  const sess={
    id:uid(),
    clientId:cid,
    clientName:c?c.name:'Unknown',
    startedAt:startTs,
    endedAt:length?startTs+(length*60000):startTs+(30*60000),
    events,
    note:notes,
    sessType:'manual',
    plannedMins:length,
    location,
    manual:true
  };

  S.sessions.push(sess);
  persist();
  S._modal=null;
  rerender();
  alert('Manual entry saved — '+events.length+' event'+(events.length!==1?'s':'')+' recorded for '+date);
}

// ── CSV Upload ─────────────────────────────────────────────────────────────
function handleCSVUpload(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    const rows=text.split(/\r?\n/).filter(r=>r.trim());
    if(rows.length<2){alert('CSV appears empty or has no data rows.');return;}

    // Parse header — find columns by fuzzy match
    const header=rows[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
    const colMap={};
    const findCol=(names)=>header.findIndex(h=>names.some(n=>h.includes(n)));
    colMap.first=findCol(['first','firstname','fname']);
    colMap.last=findCol(['last','lastname','lname','surname']);
    colMap.name=findCol(['name','student','fullname','studentname']);
    colMap.sid=findCol(['studentid','sid','id','number','studentnumber']);
    colMap.grade=findCol(['grade','gradelevel','gr']);
    colMap.dob=findCol(['dob','dateofbirth','birth','birthday','birthdate']);

    // Need at least a name column
    if(colMap.first<0&&colMap.name<0){
      alert('Could not find a name column in your CSV.\\n\\nLooking for columns like: First Name, Last Name, Student Name, Student ID, Grade, DOB\\n\\nFound: '+rows[0]);
      input.value='';return;
    }

    const added=[];
    const skipped=[];
    for(let i=1;i<rows.length;i++){
      const cols=parseCSVRow(rows[i]);
      if(!cols.length)continue;

      let first='',last='',name='';
      if(colMap.first>=0) first=(cols[colMap.first]||'').trim();
      if(colMap.last>=0) last=(cols[colMap.last]||'').trim();
      if(colMap.name>=0&&!first) name=(cols[colMap.name]||'').trim();

      if(!first&&!name){skipped.push(i+1);continue;}

      if(name&&!first){
        const parts=name.split(/\s+/);
        first=parts[0]||'';
        last=parts.slice(1).join(' ')||'';
      }
      const fullName=[first,last].filter(Boolean).join(' ');

      // Skip duplicates
      if(S.clients.some(c=>c.name.toLowerCase()===fullName.toLowerCase())){skipped.push(fullName+' (dup)');continue;}

      const sid=colMap.sid>=0?(cols[colMap.sid]||'').trim():'';
      const grade=colMap.grade>=0?(cols[colMap.grade]||'').trim():'';
      let dob='';
      if(colMap.dob>=0){
        const raw=(cols[colMap.dob]||'').trim();
        if(raw){
          const d=new Date(raw);
          if(!isNaN(d)) dob=d.toISOString().slice(0,10);
          else dob=raw;
        }
      }

      S.clients.push({
        id:uid(),name:fullName,firstName:first,lastName:last,
        studentId:sid,grade,dob,linkedBehaviorist:'',
        behaviors:[],
        createdAt:Date.now()
      });
      added.push(fullName);
    }

    persist();rerender();
    input.value='';
    let msg=`✅ Imported ${added.length} student${added.length!==1?'s':''}`;
    if(skipped.length) msg+=`\\n⚠ Skipped ${skipped.length} (empty or duplicate)`;
    alert(msg);
  };
  reader.readAsText(file);
}

function parseCSVRow(row){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<row.length;i++){
    const ch=row[i];
    if(ch==='"'){inQ=!inQ;continue;}
    if(ch===','&&!inQ){result.push(cur);cur='';continue;}
    cur+=ch;
  }
  result.push(cur);
  return result;
}

function openShareModal(cid){

// Loads the behaviorist/school-psych directory for the Share dropdown via the
// list_specialists() security-definer RPC (no user_roles SELECT policy needed).
async function loadSpecialists(){
  if(S._offline || !_currentUser || _currentUser.id==='offline') return;
  try{
    const {data,error}=await sb.rpc('list_specialists');
    if(error) throw error;
    const myEmail=(_currentUser.email||'').toLowerCase();
    S._specialists=(data||[]).filter(sp=>(sp.email||'').toLowerCase()!==myEmail);
  }catch(e){ console.warn('loadSpecialists failed:',e); if(typeof S._specialists==='undefined') S._specialists=[]; }
}

function selectSpecialist(email){
  if(!S._modal) return;
  const sp=(S._specialists||[]).find(x=>(x.email||'').toLowerCase()===(email||'').toLowerCase());
  if(!sp) return;
  S._modal._email=sp.email;
  S._modal._role=(sp.role==='school_psych')?'school_psych':'behaviorist';
  rerender();
}
async function shareStudentWith(cid){
  const c=S.clients.find(x=>x.id===cid); if(!c) return;
  const email=(S._modal&&S._modal._email||'').trim().toLowerCase();
  if(!email||!email.includes('@')){ alert('Enter a valid email address.'); return; }
  if(_currentUser&&email===(_currentUser.email||'').toLowerCase()){ alert("That's your own email — share it with someone else."); return; }
  const role=(S._modal&&S._modal._role)||'behaviorist';
  try{
    const {error}=await sb.from('student_shares').upsert(
      {owner_id:_currentUser.id,grantee_email:email,student_id:cid,student_name:c.name,specialist_role:role,access:'read'},
      {onConflict:'owner_id,grantee_email,student_id'});
    if(error) throw error;
    await loadShares();
    if(S._modal){ S._modal._email=''; S._modal._sentMsg={ok:true,email,pending:true}; }
    rerender();
    // Best-effort invite email — the share itself already succeeded above.
    const sent=await emailShareInvite(email,role,c.name);
    if(S._modal&&S._modal.type==='shareStudent') S._modal._sentMsg=sent;
    rerender();
  }catch(e){ console.error('share failed:',e); alert('Could not share: '+(e.message||e)); }
}

// Emails the specialist that a student was shared with them, plus a link to sign in.
// Access is keyed by email via student_shares — no invite code needed. Returns
// {ok,email,err?}; never throws, so a failed email can't undo a successful share.
async function emailShareInvite(email, role, studentName){
  const ownerName=_currentUser?.user_metadata?.full_name||_currentUser?.email||'A teacher';
  const roleLabel=role==='school_psych'?'School Psychologist':'Behaviorist';
  const link=window.location.origin+'/index.html';
  const html=`
    <div style="font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:600px;margin:0 auto;padding:20px">
      <div style="background:#1e3a5f;border-radius:12px 12px 0 0;padding:20px;text-align:center">
        <h1 style="color:#fff;font-size:1.3rem;margin:0">BehaviorLog Pro</h1>
        <p style="color:rgba(255,255,255,.6);font-size:.8rem;margin:4px 0 0">Sure Step Education</p>
      </div>
      <div style="background:#fff;border:1px solid #e0e0e0;border-radius:0 0 12px 12px;padding:24px">
        <p style="font-size:.95rem;margin-bottom:16px"><strong>${esc(ownerName)}</strong> has shared a student with you on <strong>BehaviorLog Pro</strong> as a <strong>${roleLabel}</strong>.</p>
        <div style="background:#f0faf9;border:2px solid #2b7a78;border-radius:10px;padding:16px;text-align:center;margin-bottom:16px">
          <div style="font-size:.72rem;color:#2b7a78;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Student shared with you</div>
          <div style="font-size:1.1rem;font-weight:800;color:#1e3a5f">${esc(studentName||'a student')}</div>
        </div>
        <p style="font-size:.9rem;line-height:1.6;margin-bottom:16px">Sign in with <strong>this email address (${esc(email)})</strong> to view this student's behavior data. You'll see only this student — read-only — under <strong>"Shared with me."</strong></p>
        <div style="text-align:center;margin-bottom:16px">
          <a href="${link}" style="display:inline-block;background:#2b7a78;color:#fff;font-weight:700;font-size:.95rem;text-decoration:none;padding:12px 28px;border-radius:10px">Open BehaviorLog Pro</a>
        </div>
        <p style="font-size:.82rem;color:#888;line-height:1.6">If you don't have an account yet, create one with your Google account using this same email address.</p>
        <p style="font-size:.9rem;margin-top:20px">— Sure Step Education</p>
      </div>
    </div>`;
  try{
    const r=await fetch('/api/send-email',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({to:email,toName:roleLabel,subject:ownerName+' shared a student with you — BehaviorLog Pro',html})
    });
    const data=await r.json();
    if(data&&data.success) return {ok:true,email};
    return {ok:false,email,err:(data&&data.error)||'Email service error'};
  }catch(e){ return {ok:false,email,err:e.message||'Network error'}; }
}
async function revokeShare(shareId){
  try{

// ── Audio chime (lightweight, no dependencies) ────────────────────────────
// AudioContext must be created AND resumed inside a user-gesture handler.
// We create it lazily on first user tap so it's never suspended.
let _intervalAudioCtx=null;

// Call this from a button tap (user gesture) to unlock audio for the session.
// Safe to call multiple times — idempotent.
async function unlockIntervalAudio(){
  try{
    if(!_intervalAudioCtx){
      _intervalAudioCtx=new (window.AudioContext||window.webkitAudioContext)();
    }
    if(_intervalAudioCtx.state==='suspended'){
      await _intervalAudioCtx.resume();
    }
    // Play a silent buffer to fully unlock on iOS
    const buf=_intervalAudioCtx.createBuffer(1,1,22050);
    const src=_intervalAudioCtx.createBufferSource();
    src.buffer=buf;
    src.connect(_intervalAudioCtx.destination);
    src.start(0);
  }catch(e){}
}

function playIntervalChime(){
  try{
    if(!_intervalAudioCtx) return; // not unlocked yet — skip silently
    const ctx=_intervalAudioCtx;
    if(ctx.state==='suspended'){
      // Try to resume then play — best effort
      ctx.resume().then(()=>_doChime(ctx)).catch(()=>{});
    } else {
      _doChime(ctx);
    }
  }catch(e){}
}
function _doChime(ctx){
  try{
    // Two-tone chime: high then slightly lower — more distinct than single beep
    [880, 660].forEach((freq, i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='sine';
      osc.frequency.value=freq;
      const t=ctx.currentTime+(i*0.22);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.2, t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+0.35);
      osc.start(t); osc.stop(t+0.4);
    });
  }catch(e){}
}
function fireIntervalVibrate(){
  // navigator.vibrate is Android/Chrome only — not available on iOS Safari
  try{ if(navigator.vibrate) navigator.vibrate([150,80,150]); }catch(e){}
}
function fireIntervalFlash(){
  try{
    const f=document.getElementById('interval-flash-overlay');
    if(f){
      f.style.opacity='1';

}
function firePrompts(intervalNum){
  if(!S.intervalSess) return;

// ── Start interval session (single OR group) ──────────────────────────────
function startIntervalSession(opts){
  // opts: {mode:'single'|'group', clientIds:[], method, intervalSec, totalMin,
  //        prompts, behaviorIds, location, groupLayout, hasPeer, peerLabel}
  const totalSec=opts.totalMin*60;
  const totalIntervals=Math.floor(totalSec/opts.intervalSec);
  const startedAt=Date.now();
  const clientNames={};
  opts.clientIds.forEach(cid=>{
    const c=S.clients.find(x=>x.id===cid);
    clientNames[cid]=c?c.name:'Unknown';
  });
  // Build empty intervals — scores keyed by clientId and behaviorId
  // '__peer__' is a reserved key for the generic peer comparison student
  const intervals=[];
  for(let i=0;i<totalIntervals;i++){
    const scores={};
    opts.clientIds.forEach(cid=>{
      scores[cid]={};
      opts.behaviorIds.forEach(bid=>{ scores[cid][bid]=false; });
    });
    if(opts.hasPeer){
      scores['__peer__']={};
      opts.behaviorIds.forEach(bid=>{ scores['__peer__'][bid]=false; });
    }
    intervals.push({
      n:i+1,
      startMs:startedAt+(i*opts.intervalSec*1000),
      endMs:startedAt+((i+1)*opts.intervalSec*1000),
      scoredAt:null,
      scores
    });
  }
  S.intervalSess={
    id:uid(),
    mode:opts.mode,
    method:opts.method,
    intervalSec:opts.intervalSec,
    totalSec,
    totalIntervals,
    prompts:opts.prompts||{chime:true,vibrate:true,flash:false},
    groupLayout:opts.mode==='group'?(opts.groupLayout||'side'):null,
    clientIds:opts.clientIds.slice(),
    clientNames,
    behaviorIds:opts.behaviorIds.slice(),
    hasPeer:!!opts.hasPeer,
    peerLabel:(opts.peerLabel||'Peer').trim()||'Peer',
    startedAt,
    endedAt:null,
    currentInterval:0,
    intervals,
    activeRotateIdx:0,
    paused:false,
    pausedAt:null,
    pausedAccumMs:0,
    location:opts.location||'',
    completed:false
  };
  S.view='interval';
  rerender();
  // Unlock AudioContext inside this user-gesture call stack (Begin Session tap),
  // then fire the first prompt. This is the only reliable way to get audio on iOS.
  unlockIntervalAudio().then(()=>{
    // Small delay so the rerender completes before the chime fires
    setTimeout(()=>{ firePrompts(); }, 120);
  }).catch(()=>{ firePrompts(); });
  // Start the interval-tick driver
  startIntervalTick();
}

// ── Interval tick driver — independent of legacy tick() ───────────────────
function startIntervalTick(){
  if(_intervalTick) clearInterval(_intervalTick);
  _intervalTick=setInterval(intervalTickFn, 250);
}
function stopIntervalTick(){
  if(_intervalTick){ clearInterval(_intervalTick); _intervalTick=null; }
}
function intervalTickFn(){
  const sess=S.intervalSess;
  if(!sess||sess.completed) return;

  // Update only the live timer DOM — do NOT call rerender()
  // (rerender would destroy the user's tap state mid-scoring)
  const now=Date.now();
  const elapsed=intervalElapsedMs(now);
  const intervalNum=Math.floor(elapsed/(sess.intervalSec*1000));

  // Auto-advance to next interval when timer crosses boundary
  if(intervalNum>sess.currentInterval && intervalNum<sess.totalIntervals){
    // Mark previous interval as scored (locks in current state)
    const prev=sess.intervals[sess.currentInterval];
    if(prev) prev.scoredAt=now;
    sess.currentInterval=intervalNum;
    // Rotate group: advance the active student
    if(sess.mode==='group'&&sess.groupLayout==='rotate'){
      sess.activeRotateIdx=(sess.activeRotateIdx+1)%sess.clientIds.length;
    }
    // Fire prompts for the new interval — pass number so banner text is correct
    firePrompts(intervalNum+1);
    rerender(); // OK to rerender on interval change — there's no in-progress tap
    return;
  }

  // End of session
  if(intervalNum>=sess.totalIntervals && !sess.completed){
    completeIntervalSession();
    return;
  }

  // Live timer DOM update only
  const remEl=document.getElementById('iv-interval-remaining');
  if(remEl){
    const intoCurrent=elapsed - (sess.currentInterval*sess.intervalSec*1000);
    const remThis=Math.max(0, sess.intervalSec*1000 - intoCurrent);
    remEl.textContent=fmt(remThis);
  }
  const totalRemEl=document.getElementById('iv-total-remaining');
  if(totalRemEl){
    const totalRem=Math.max(0, sess.totalSec*1000 - elapsed);
    totalRemEl.textContent=fmt(totalRem);
  }
  const progEl=document.getElementById('iv-progress-bar');
  if(progEl){
    const pct=Math.min(100, (elapsed/(sess.totalSec*1000))*100);
    progEl.style.width=pct+'%';
  }
}
function intervalElapsedMs(now){
  const sess=S.intervalSess;
  if(!sess) return 0;
  const baseElapsed=(now||Date.now()) - sess.startedAt - sess.pausedAccumMs;
  if(sess.paused && sess.pausedAt){
    return sess.pausedAt - sess.startedAt - sess.pausedAccumMs;
  }
  return baseElapsed;
}

// ── Scoring (the actual data capture) ─────────────────────────────────────
function intervalScore(cid, bid){
  const sess=S.intervalSess;
  if(!sess||sess.completed) return;
  const cur=sess.intervals[sess.currentInterval];
  if(!cur) return;
  if(!cur.scores[cid]) cur.scores[cid]={};
  cur.scores[cid][bid]=!cur.scores[cid][bid];
  // Every tap is a user gesture — keeps AudioContext alive for next chime on iOS
  unlockIntervalAudio().catch(()=>{});
  // Preserve sub-view scroll so tapping a tile doesn't jump to top
  const sv=document.querySelector('.sub-view');
  const svScroll=sv?sv.scrollTop:0;
  rerender();
  const svAfter=document.querySelector('.sub-view');
  if(svAfter && svScroll) svAfter.scrollTop=svScroll;
}

// ── Add behavior mid-session ─────────────────────────────────────────────
function intervalLiveAddBeh(){

  if(!sess||sess.completed) return;

// ── Pause / resume / end ──────────────────────────────────────────────────
function intervalTogglePause(){
  const sess=S.intervalSess;
  if(!sess) return;
  // Use pause/resume tap as another audio unlock opportunity on iOS
  unlockIntervalAudio().catch(()=>{});
  if(sess.paused){
    if(sess.pausedAt){ sess.pausedAccumMs += (Date.now() - sess.pausedAt); }
    sess.paused=false; sess.pausedAt=null;
  }else{
    sess.paused=true; sess.pausedAt=Date.now();
  }
  rerender();
}
function intervalEndEarly(){
  if(!confirm('End this interval session early? Data scored so far will be saved.')) return;
  completeIntervalSession();
}
function completeIntervalSession(){
  const sess=S.intervalSess;
  if(!sess||sess.completed) return;
  // Mark the in-progress interval (if any) as scored at the moment of end
  const cur=sess.intervals[sess.currentInterval];
  if(cur && !cur.scoredAt) cur.scoredAt=Date.now();
  sess.endedAt=Date.now();
  sess.completed=true;
  stopIntervalTick();

  // Save into the regular sessions array (one record per student) so
  // downstream summary/analytics flows pick it up.
  const summary=intervalComputeSummary(sess);
  sess.clientIds.forEach(cid=>{
    const events=[];
    sess.intervals.forEach(iv=>{
      sess.behaviorIds.forEach(bid=>{
        if(iv.scores[cid] && iv.scores[cid][bid]){
          const beh=allBehs().find(b=>b.id===bid);
          events.push({
            id:uid(),type:'interval',
            behaviorId:bid,
            behaviorLabel:beh?beh.label:'Unknown',
            behaviorIcon:beh?beh.icon:'',
            timestamp:iv.startMs,
            intervalNum:iv.n,
            intervalMethod:sess.method,
            intervalSec:sess.intervalSec
          });
        }
      });
    });
    const c=S.clients.find(x=>x.id===cid);
    S.sessions.push({
      id:uid(),
      clientId:cid,
      clientName:c?c.name:'Unknown',
      startedAt:sess.startedAt,
      endedAt:sess.endedAt,
      events,
      note:'',
      sessType:'interval',
      intervalMethod:sess.method,
      intervalSec:sess.intervalSec,
      totalIntervals:sess.totalIntervals,
      groupLayout:sess.groupLayout,
      groupSize:sess.clientIds.length,
      location:sess.location,
      selectedBehs:sess.behaviorIds.slice(),
      // Per-behavior interval percentages (scored / total)
      intervalSummary: summary[cid] || {}
    });
  });
  persist();
  S.view='intervalSummary';
  rerender();
}
function intervalComputeSummary(sess){
  // Returns: {cid: {bid: {scored:N, total:N, pct:0-100}}}
  // Includes '__peer__' key if sess.hasPeer
  const out={};
  const allCids=[...sess.clientIds, ...(sess.hasPeer?['__peer__']:[])];
  allCids.forEach(cid=>{
    out[cid]={};
    sess.behaviorIds.forEach(bid=>{
      let scored=0;
      sess.intervals.forEach(iv=>{
        if(iv.scores[cid] && iv.scores[cid][bid]) scored++;
      });
      // Rotate mode: only count intervals where this student was active (peer always gets full total)
      let total=sess.totalIntervals;
      if(cid!=='__peer__' && sess.mode==='group' && sess.groupLayout==='rotate'){
        total=0;
        sess.intervals.forEach((iv,idx)=>{
          const activeCid=sess.clientIds[idx % sess.clientIds.length];
          if(activeCid===cid) total++;
        });
      }
      out[cid][bid]={
        scored,
        total,
        pct: total>0 ? Math.round((scored/total)*100) : 0
      };
    });
  });
  return out;
}
function intervalDoneAndExit(){
  S.intervalSess=null;
  S.view='home';
  rerender();
}

  const genTime=new Date().toLocaleString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});

    return `<section class="print-section"><h2 class="print-section-title">🎯 ${esc(sess.clientNames[cid]||'Student')}</h2>
      <table class="iv-table"><thead><tr><th>Behavior</th><th style="text-align:center">Intervals</th><th style="text-align:right">${peerSum?'Student % / Peer %':'% Occurrence'}</th></tr></thead><tbody>${rows}</tbody></table>
      <div style="margin-top:10px">${chart}</div></section>`;
  }).join('');

  let peerBlock='';
  if(peerSum){
    const rows=sess.behaviorIds.map(bid=>{
      const beh=allBehs().find(b=>b.id===bid);
      const p=peerSum[bid]||{scored:0,total:0,pct:0};
      return `<tr><td>${beh?esc(beh.label):'Unknown'}</td><td style="text-align:center">${p.scored}/${p.total}</td><td style="text-align:right">${p.pct}%</td></tr>`;
    }).join('');
    peerBlock=`<section class="print-section"><h2 class="print-section-title">👥 ${esc(sess.peerLabel||'Peer')} (comparison)</h2>
      <table class="iv-table"><thead><tr><th>Behavior</th><th style="text-align:center">Intervals</th><th style="text-align:right">% Occurrence</th></tr></thead><tbody>${rows}</tbody></table></section>`;
  }

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<title>Interval Recording — ${esc(sess.clientNames[sess.clientIds[0]]||'Session')}</title>
<style>${_getPrintCSS()}
.iv-table{width:100%;border-collapse:collapse;margin-top:6px}
.iv-table th{text-align:left;padding:6px 10px;font-size:.7rem;color:#666;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #ddd}
.iv-table td{padding:7px 10px;border-bottom:1px solid #eee;font-size:.85rem;font-weight:600}
</style></head><body>
<header class="print-header"><div class="print-header-inner"><div>
  <div class="print-brand">BehaviorLog<span style="color:var(--accent);font-weight:400">  Pro</span></div>
  <h1 class="print-title">Interval Recording — Results</h1>
  <p class="print-meta">${esc(methodLabel)} · ${sess.intervalSec}s intervals · ${sess.totalIntervals} intervals · ${dur} min${sess.location?' · 📍 '+esc(sess.location):''} · Generated ${esc(genTime)} · Confidential — FERPA-protected</p>
</div><div class="print-toolbar no-print">
  <button onclick="window.print()" class="print-btn">🖨 Save as PDF</button>
  <button onclick="window.close()" class="print-btn print-btn-ghost">✕ Close</button>
</div></div></header>
<div class="no-print print-tip"><strong>📄 To save:</strong> Click <strong>Save as PDF</strong> above, or press <strong>Ctrl/Cmd+P</strong> → choose <strong>Save as PDF</strong> as destination.</div>
<main class="print-body">${studentBlocks}${peerBlock}</main>
<footer class="print-footer"><p>BehaviorLog Pro · Interval Recording (${esc(methodLabel)}) · This document contains FERPA-protected student data. Distribute only to authorized IEP team members.</p></footer>
</body></html>`;

  const w=window.open('','_blank');
  if(!w){ alert('Allow popups for this site to export the report. Then try again.'); return; }
  w.document.open();
  w.document.write(html);
  w.document.close();
  setTimeout(()=>{ try { w.focus(); } catch(e){} }, 200);
}

// ── Live recording UI ─────────────────────────────────────────────────────
function buildIntervalRecord(){
  const sess=S.intervalSess;
  if(!sess) return '<div class="sub-view"><p class="muted">No active interval session.</p></div>';
  const elapsed=intervalElapsedMs();
  const intoCurrent=elapsed - (sess.currentInterval*sess.intervalSec*1000);
  const remThis=Math.max(0, sess.intervalSec*1000 - intoCurrent);
  const totalRem=Math.max(0, sess.totalSec*1000 - elapsed);
  const pct=Math.min(100, (elapsed/(sess.totalSec*1000))*100);
  const cur=sess.intervals[sess.currentInterval];
  const methodLabel={momentary:'Momentary',partial:'Partial Interval',whole:'Whole Interval'}[sess.method]||sess.method;
  const methodHint={
    momentary:'Mark only what is happening AT this moment',
    partial:'Mark anything seen at any point in this interval',
    whole:'Mark only behaviors that occur for the ENTIRE interval'
  }[sess.method]||'';

  // Determine which students to show as scoring rows
  let activeCids=sess.clientIds;
  if(sess.mode==='group' && sess.groupLayout==='rotate'){
    // Source of truth: currentInterval index — keeps UI and summary aligned
    const idx=sess.currentInterval % sess.clientIds.length;
    activeCids=[sess.clientIds[idx]];
  }

  // Behavior cards builder for a single student
  function behGridForStudent(cid){
    // Empty state
    if(!sess.behaviorIds.length){
      return '<div class="beh-empty"><div class="beh-empty-icon">📋</div><div class="beh-empty-label">No behaviors selected</div><div class="beh-empty-hint">Go back to setup and choose behaviors to score.</div></div>';
    }
    return sess.behaviorIds.map(bid=>{
      const beh=allBehs().find(b=>b.id===bid);
      if(!beh) return '';
      const scored=cur && cur.scores[cid] && cur.scores[cid][bid];
      // Use .beh-btn CSS class so aspect-ratio, density token, and grid math all apply
      return `<div onclick="intervalScore('${cid}','${bid}')"
        class="beh-btn${scored?' beh-scored':''}"
        style="
          border-width:2.5px;
          border-color:${scored?'var(--fba-green)':'var(--border)'};
          background:${scored?'var(--fba-mid)':'var(--surface)'};
          box-shadow:${scored?'0 0 0 3px rgba(6,122,95,.15)':'none'}">
        <div class="beh-icon">${beh.icon}</div>
        <div class="beh-label" style="color:${scored?'var(--fba-dark)':'var(--text2)'}">${esc(beh.label)}</div>
        ${scored?'<div style="font-size:.58rem;color:var(--fba-green);font-weight:800;margin-top:1px;letter-spacing:.3px">✓ SCORED</div>':''}
      </div>`;
    }).join('');
  }

  const flashOverlay=`<div id="interval-flash-overlay" style="position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .12s;z-index:9999"></div>`;

  // ── Live add-behavior panel ──────────────────────────────────────────
  const liveAddPanel=`<div style="margin-top:6px;margin-bottom:14px;background:var(--surface2);border:1.5px dashed var(--border);border-radius:12px;padding:10px 12px">
    <div style="font-size:.68rem;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase">➕ Add behavior mid-session</div>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="iv-live-add-input" class="input" placeholder="New behavior name…" style="flex:1;font-size:.82rem" onkeydown="if(event.key==='Enter'){event.preventDefault();intervalLiveAddBeh();}"/>
      <button class="btn btn-ghost btn-sm" onclick="intervalLiveAddBeh()" style="white-space:nowrap;border-color:var(--fba-mid)">Add</button>
    </div>
  </div>`;

  let studentSection='';
  if(sess.mode==='single'){
    const cid=sess.clientIds[0];
    if(sess.hasPeer){
      // Side-by-side: target student left, peer right
      studentSection=`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px">
          <div style="background:var(--surface);border:2px solid var(--fba-green);border-radius:14px;padding:10px">
            <div style="font-weight:800;font-size:.76rem;color:var(--fba-dark);margin-bottom:8px;text-align:center">🎯 ${esc(sess.clientNames[cid]||'Student')}</div>
            <div class="beh-grid-wrap"><div class="beh-grid-side">${behGridForStudent(cid)}</div></div>
          </div>
          <div style="background:var(--surface2);border:2px solid var(--border);border-radius:14px;padding:10px">
            <div style="font-weight:800;font-size:.76rem;color:var(--muted);margin-bottom:8px;text-align:center">👥 ${esc(sess.peerLabel||'Peer')}</div>
            <div class="beh-grid-wrap"><div class="beh-grid-side">${behGridForStudent('__peer__')}</div></div>
          </div>
        </div>`;
    } else {
      studentSection=`<div class="beh-grid-wrap" style="margin-bottom:4px"><div class="beh-grid-standalone">${behGridForStudent(cid)}</div></div>`;
    }
  } else if(sess.groupLayout==='side'){
    studentSection=sess.clientIds.map(cid=>`
      <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:12px;margin-bottom:12px">
        <div style="font-weight:800;font-size:.92rem;color:var(--fba-dark);margin-bottom:10px">👤 ${esc(sess.clientNames[cid]||'Student')}</div>
        <div class="beh-grid-wrap"><div class="beh-grid-side">
          ${behGridForStudent(cid)}
        </div></div>
      </div>
    `).join('');
  } else {
    // rotate
    const cid=activeCids[0];
    const activeIdx=sess.currentInterval % sess.clientIds.length;
    const upcoming=sess.clientIds.map((c,i)=>{
      const isActive=i===activeIdx;
      return `<div style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:14px;border:1.5px solid ${isActive?'var(--fba-green)':'var(--border)'};background:${isActive?'var(--fba-mid)':'var(--surface2)'};font-size:.72rem;font-weight:${isActive?'800':'600'};color:${isActive?'var(--fba-dark)':'var(--muted)'};margin:2px">
        ${isActive?'▶ ':''}${esc(sess.clientNames[c]||'Student')}
      </div>`;
    }).join('');
    studentSection=`
      <div style="background:var(--fba-soft);border:1.5px solid var(--fba-mid);border-radius:10px;padding:8px 10px;margin-bottom:14px;text-align:center">
        <div style="font-size:.68rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--fba-green);margin-bottom:6px">Currently Observing (Rotate)</div>
        <div style="display:flex;flex-wrap:wrap;justify-content:center">${upcoming}</div>
      </div>
      <div style="background:var(--surface);border:2px solid var(--fba-green);border-radius:14px;padding:14px;margin-bottom:18px">
        <div style="font-weight:800;font-size:1.05rem;color:var(--fba-dark);margin-bottom:10px;text-align:center">👤 ${esc(sess.clientNames[cid]||'Student')}</div>
        <div class="beh-grid-wrap"><div class="beh-grid-standalone">
          ${behGridForStudent(cid)}
        </div></div>
      </div>`;
  }

  return `${flashOverlay}<div class="sub-view" style="padding-bottom:120px">
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--fba-green)">⏲️ ${methodLabel} ${sess.mode==='group'?'· Group ('+sess.clientIds.length+')':''}</div>
        <h2 style="margin:2px 0 0;color:var(--fba-dark);font-size:1.15rem">Interval Recording</h2>
      </div>
      <div class="row gap2">
        <button class="btn btn-ghost btn-sm" onclick="intervalTogglePause()">${sess.paused?'▶ Resume':'⏸ Pause'}</button>
        <button class="btn btn-ghost btn-sm" onclick="intervalEndEarly()" style="color:#c0392b">End</button>
      </div>
    </div>

    <!-- Hint card -->
    <div style="background:var(--fba-soft);border:1px solid var(--fba-mid);border-radius:10px;padding:8px 12px;margin-bottom:12px;font-size:.74rem;color:var(--fba-dark);line-height:1.4">
      <strong>${methodLabel}:</strong> ${methodHint}
    </div>

    <!-- Big timer card -->
    <div style="background:linear-gradient(135deg,var(--fba-green) 0%,#0a8c70 100%);border-radius:16px;padding:18px;margin-bottom:14px;color:#fff;box-shadow:0 4px 16px rgba(6,122,95,.25)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div>
          <div style="font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.85">Interval ${sess.currentInterval+1} of ${sess.totalIntervals}</div>
          <div style="font-size:1.85rem;font-weight:900;font-family:'Courier New',monospace;letter-spacing:.5px"><span id="iv-interval-remaining">${fmt(remThis)}</span></div>
          <div style="font-size:.7rem;opacity:.85;margin-top:1px">remaining this interval</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.85">Total Remaining</div>
          <div style="font-size:1.4rem;font-weight:800;font-family:'Courier New',monospace"><span id="iv-total-remaining">${fmt(totalRem)}</span></div>
          ${sess.paused?'<div style="font-size:.7rem;background:rgba(255,255,255,.2);border-radius:6px;padding:2px 8px;margin-top:4px;display:inline-block;font-weight:800">⏸ PAUSED</div>':''}
        </div>
      </div>
      <!-- Progress bar -->
      <div style="background:rgba(255,255,255,.2);border-radius:6px;height:6px;overflow:hidden">
        <div id="iv-progress-bar" style="background:#fff;height:100%;width:${pct}%;transition:width .25s"></div>
      </div>
    </div>

    ${studentSection}
    ${liveAddPanel}

    <!-- Footer hint -->
    <div style="text-align:center;font-size:.72rem;color:var(--muted);margin-top:8px;line-height:1.5">
      Tap a behavior tile to mark it scored for this interval. Tap again to unmark.<br>
      Scores lock when the interval ends. The next interval starts automatically.
    </div>
  </div>`;
}

// ── Summary screen ────────────────────────────────────────────────────────
function buildIntervalSummary(){
  const sess=S.intervalSess;
  if(!sess||!sess.completed) return '<div class="sub-view"><p class="muted">No completed session.</p></div>';
  const summary=intervalComputeSummary(sess);
  const methodLabel={momentary:'Momentary Time Sampling',partial:'Partial Interval',whole:'Whole Interval'}[sess.method]||sess.method;
  const dur=Math.round((sess.endedAt-sess.startedAt)/60000);

  const peerSum=sess.hasPeer?(summary['__peer__']||{}):null;

  let perStudent=sess.clientIds.map(cid=>{
    const rows=sess.behaviorIds.map(bid=>{
      const beh=allBehs().find(b=>b.id===bid);
      const s=summary[cid][bid]||{scored:0,total:0,pct:0};
      const p=peerSum?peerSum[bid]||{scored:0,total:0,pct:0}:null;
      const diffColor=p?(s.pct>p.pct?'#067a5f':s.pct<p.pct?'#c0392b':'var(--text)'):'var(--fba-dark)';
      return `<tr>
        <td style="padding:7px 10px;border-bottom:1px solid var(--border);font-weight:700;font-size:.82rem">${beh?beh.icon+' '+esc(beh.label):'Unknown'}</td>
        <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:center;font-family:'Courier New',monospace;font-size:.82rem">${s.scored}/${s.total}</td>
        <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:right;font-weight:800;font-size:.85rem;color:${diffColor}">${s.pct}%${p!==null?` <span style="font-size:.7rem;font-weight:500;color:var(--muted)">vs ${p.pct}%</span>`:''}</td>
      </tr>`;
    }).join('');
    return `<div style="background:var(--surface);border:2px solid var(--fba-green);border-radius:12px;padding:14px;margin-bottom:12px">
      <div style="font-weight:800;font-size:1rem;color:var(--fba-dark);margin-bottom:4px">🎯 ${esc(sess.clientNames[cid]||'Student')}</div>
      ${peerSum?`<div style="font-size:.68rem;color:var(--muted);margin-bottom:8px">% shown as student vs 👥 ${esc(sess.peerLabel||'Peer')} — <span style="color:#067a5f;font-weight:700">green</span>=higher, <span style="color:#c0392b;font-weight:700">red</span>=lower</div>`:''}
      <table style="width:100%;border-collapse:collapse">
        <thead><tr>
          <th style="text-align:left;padding:6px 10px;font-size:.7rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase">Behavior</th>
          <th style="text-align:center;padding:6px 10px;font-size:.7rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase">Intervals</th>
          <th style="text-align:right;padding:6px 10px;font-size:.7rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase">${peerSum?'Student % / Peer %':'% Occurrence'}</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="margin-top:10px">${buildBarChart(sess.behaviorIds.map(bid=>({label:(allBehs().find(b=>b.id===bid)||{}).label||'?',val:(summary[cid][bid]||{pct:0}).pct})),'%')}</div>
    </div>`;
  }).join('');

  // Peer-only summary card
  const peerCard=peerSum?`<div style="background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px">
    <div style="font-weight:800;font-size:1rem;color:var(--muted);margin-bottom:8px">👥 ${esc(sess.peerLabel||'Peer')} (comparison data)</div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr>
        <th style="text-align:left;padding:6px 10px;font-size:.7rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase">Behavior</th>
        <th style="text-align:center;padding:6px 10px;font-size:.7rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase">Intervals</th>
        <th style="text-align:right;padding:6px 10px;font-size:.7rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase">% Occurrence</th>
      </tr></thead>
      <tbody>${sess.behaviorIds.map(bid=>{
        const beh=allBehs().find(b=>b.id===bid);
        const p=peerSum[bid]||{scored:0,total:0,pct:0};
        return `<tr>
          <td style="padding:7px 10px;border-bottom:1px solid var(--border);font-weight:700;font-size:.82rem">${beh?beh.icon+' '+esc(beh.label):'Unknown'}</td>
          <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:center;font-family:'Courier New',monospace;font-size:.82rem">${p.scored}/${p.total}</td>
          <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:right;font-weight:800;font-size:.85rem;color:var(--muted)">${p.pct}%</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>`:'';

  return `<div class="sub-view" style="padding-bottom:80px">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:2.2rem;margin-bottom:6px">✅</div>
      <h2 style="color:var(--fba-dark);margin-bottom:4px">Session Complete</h2>
      <p class="muted" style="font-size:.82rem">${methodLabel} · ${sess.intervalSec}s intervals · ${sess.totalIntervals} intervals · ${dur} min</p>
      ${sess.location?`<p style="font-size:.74rem;color:var(--muted);margin-top:2px">📍 ${esc(sess.location)}</p>`:''}
    </div>
    ${perStudent}
    ${peerCard}
    <div class="row gap2" style="margin-top:18px">
      <button class="btn btn-ghost" style="flex:1" onclick="exportIntervalSummary()">📄 Save / Export (PDF)</button>
      <button class="btn btn-primary" style="flex:1;background:var(--fba-green);border-color:var(--fba-green)" onclick="intervalDoneAndExit()">Done</button>
    </div>
    <p style="font-size:.7rem;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5">
      Tap <strong>Save / Export</strong> to print or save this screen (data + graphs) as a PDF. Session is also saved under each student's history.
    </p>
  </div>`;
}

// ── Branch original confirmStartSession to launch interval mode ──────────
function confirmStartSession(){
  if(!S._modal||!S._modal.sel)return;
  const cid=S._modal.cid;
  const type=S._modal.sel;

  // ── INTERVAL RECORDING branch (single-student) ────────────────────────
  if(type==='interval'){
    const m=S._modal;
    const locSel=document.getElementById('sess-location-select');
    const locRaw=locSel?locSel.value:m.location||'';
    const locOther=document.getElementById('sess-location-other');
    const location=locRaw==='Other'?(locOther?locOther.value.trim()||'Other':'Other'):locRaw;
    const opts={
      mode:'single',
      clientIds:[cid],
      method:m.intervalMethod,
      intervalSec:m.intervalSec,
      totalMin:m.intervalTotalMin,
      prompts:m.intervalPrompts||{chime:true,vibrate:true,flash:false},
      behaviorIds:m.selectedBehs||[],
      location,
      groupLayout:null,
      hasPeer:!!m.hasPeer,
      peerLabel:m.peerLabel||'Peer'
    };
    S._modal=null;
    S.selClient=S.clients.find(c=>c.id===cid);
    startIntervalSession(opts);
    return;
  }

  // ── Original (legacy) flow for all other session types ────────────────
  const inp=document.getElementById('sess-length-input');
  const plannedMins=inp&&inp.value?parseInt(inp.value):S._modal.plannedMins||null;
  const locSel=document.getElementById('sess-location-select');
  const locRaw=locSel?locSel.value:S._modal.location||'';
  const locOther=document.getElementById('sess-location-other');
  const location=locRaw==='Other'?(locOther?locOther.value.trim()||'Other':'Other'):locRaw;
  const selectedBehs=S._modal.selectedBehs||[];
  // behavioristName field retained on session record for legacy compatibility; new flow uses fbaFlaggedBy
  const behavioristName=S._modal.behavioristName||'';
  const startedAt=Date.now();
  S._initialBehs=type==='initial'?selectedBehs:[];
  S._modal=null;
  S.selClient=S.clients.find(c=>c.id===cid);
  S.activeSess={id:uid(),clientId:cid,clientName:S.selClient.name,startedAt,endedAt:null,events:[],note:'',sessType:type,plannedMins,location,behavioristName,selectedBehs};
  S.sessType=type;
  S.sessNote='';S.activeBeh=null;S.measureMode=null;S.abcA='';S.abcC='';
  S.incidents={};S.intensityPrompts=[];S.durRunning=false;S.durElapsed=0;
  S.fbaSettingEvents=[];S.fbaSettingEventsNote='';S.fbaHypothesis='';
  S.view='record';rerender();tick();
}

function endSession(){
  if(!confirm('End this session?')) return;
  // auto-close any running concurrent incidents
  Object.values(S.incidents).forEach(inc=>{
    const durMs=Date.now()-inc.startMs;
    S.activeSess.events.push({id:uid(),type:'duration',behaviorId:inc.behId,behaviorLabel:inc.behLabel,behaviorIcon:inc.behIcon,timestamp:Date.now(),durationMs:durMs,antecedent:inc.abcA,note:inc.note||''});
  });
  S.incidents={};
  S.intensityPrompts=[];
  S.durRunning=false;S.durElapsed=0;
  S.activeSess.endedAt=Date.now();
  // Capture any in-session hypothesis notes the behaviorist typed (preserved if they save to Log)
  if(S.fbaHypothesis && S.fbaHypothesis.trim()){
    S.activeSess.fbaHypothesis=S.fbaHypothesis;
  }
  clearInterval(_tick);
  // Show notes prompt
  S._modal={type:'endNotes'};
  rerender();
}
function saveEndNotes(){
  const note=document.getElementById('end-session-notes')?.value||'';
  S.activeSess.note=note;
  _finishEndSession();
}
function skipEndNotes(){
  S.activeSess.note='';
  _finishEndSession();
}

// ── Smart incident (tap-to-start / tap-to-end) ─────────────────────────────
function startIncident(bid){
  const b=allBehs().find(b=>b.id===bid);
  if(!b) return;

  // ── FREQ tool override: when active, any tap = +1 count ──
  if(S.measureMode==='FREQ'){
    S.activeSess.events.push({
      id:uid(),type:'frequency',
      behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,
      timestamp:Date.now(),antecedent:S.abcA,consequence:''
    });
    S.abcA='';
    rerender();
    return;
  }

  const measure=getBehMeasure(bid);

  // ── FREQUENCY: instant log, no timer ──
  if(measure==='frequency'){
    S.activeSess.events.push({
      id:uid(),type:'frequency',
      behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,
      timestamp:Date.now(),antecedent:S.abcA,consequence:''
    });
    S.abcA='';
    rerender();
    return;
  }

  // ── LATENCY: tap start, tap end = log latency time ──
  if(measure==='latency'){
    if(S.incidents[bid]){
      const inc=S.incidents[bid];
      const latMs=Date.now()-inc.startMs;
      delete S.incidents[bid];
      S.activeSess.events.push({
        id:uid(),type:'latency',
        behaviorId:inc.behId,behaviorLabel:inc.behLabel,behaviorIcon:inc.behIcon,
        timestamp:Date.now(),latencyMs:latMs,
        antecedent:inc.abcA,note:inc.note||'',consequence:''
      });
      rerender();
      return;
    }
    S.incidents[bid]={behId:bid,behLabel:b.label,behIcon:b.icon,startMs:Date.now(),elapsed:0,abcA:S.abcA,note:'',measure};
    S.activeBeh=b;
    S.abcA='';
    tick();rerender();
    return;
  }

  // ── DURATION or INTENSITY: tap-to-start / tap-to-end ──
  if(S.incidents[bid]){
    // Already active — END this behavior
    if(measure==='duration'){
      _endIncidentDurationOnly(bid);
    } else {
      _endIncidentById(bid); // intensity — shows rating prompt
    }
    return;
  }
  // START new incident
  S.incidents[bid]={behId:bid,behLabel:b.label,behIcon:b.icon,startMs:Date.now(),elapsed:0,abcA:S.abcA,note:'',measure};
  S.activeBeh=b;
  S.abcA='';
  tick();
  rerender();
}

function _endIncidentDurationOnly(bid){
  const inc=S.incidents[bid];
  if(!inc) return;
  const durMs=Date.now()-inc.startMs;
  delete S.incidents[bid];
  S.activeSess.events.push({
    id:uid(),type:'duration',
    behaviorId:inc.behId,behaviorLabel:inc.behLabel,behaviorIcon:inc.behIcon,
    timestamp:Date.now(),durationMs:durMs,
    antecedent:inc.abcA,note:inc.note||'',consequence:''
  });
  rerender();
}

function _endIncidentById(bid){
  const inc=S.incidents[bid];
  if(!inc) return;
  const durMs=Date.now()-inc.startMs;
  delete S.incidents[bid];
  // log duration event — consequence will be captured in intensity prompt
  S.activeSess.events.push({
    id:uid(),type:'duration',

function mStartIncident(bid){
  const slot=cs(); if(!slot) return;
  if(!slot.incidents)setCs({incidents:{}});
  const incs=cs().incidents;
  const b=allBehs().find(b=>b.id===bid);
  if(!b)return;

  // FREQ tool override
  if(slot.measureMode==='FREQ'){
    slot.events.push({id:uid(),type:'frequency',behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,timestamp:Date.now(),antecedent:cs().abcA||'',consequence:''});
    setCs({abcA:''});
    rerender();return;
  }

  const measure=getBehMeasure(bid);

  // FREQUENCY: instant log
  if(measure==='frequency'){
    slot.events.push({id:uid(),type:'frequency',behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,timestamp:Date.now(),antecedent:cs().abcA||'',consequence:''});
    setCs({abcA:''});
    rerender();return;
  }

  // LATENCY: tap start/stop = log latency
  if(measure==='latency'){
    if(incs[bid]){
      const inc=incs[bid];
      const latMs=Date.now()-inc.startMs;
      delete incs[bid];
      slot.events.push({id:uid(),type:'latency',behaviorId:inc.behId,behaviorLabel:inc.behLabel,behaviorIcon:inc.behIcon,timestamp:Date.now(),latencyMs:latMs,antecedent:inc.abcA,note:inc.note||'',consequence:''});
      setCs({incidents:incs});
      rerender();return;
    }
    incs[bid]={behId:bid,behLabel:b.label,behIcon:b.icon,startMs:Date.now(),elapsed:0,abcA:cs().abcA||'',note:'',measure};
    setCs({incidents:incs,activeBeh:b,abcA:''});
    rerender();return;
  }

  if(incs[bid]){
    // already active — tap again to end
    if(measure==='duration') mEndIncidentDurationOnly(bid);
    else mEndIncident(bid);
    return;
  }
  incs[bid]={behId:bid,behLabel:b.label,behIcon:b.icon,startMs:Date.now(),elapsed:0,abcA:cs().abcA||"",note:"",measure};
  setCs({incidents:incs,activeBeh:b,abcA:""});
  rerender();
}

// ── CSV export for a single session ───────────────────────────────────────
function exportSessionCSV(sessId){
  const sess=S.sessions.find(s=>s.id===sessId);
  if(!sess)return;
  const rows=[['Time','Type','Behavior','Duration(ms)','Intensity','Latency(ms)','Antecedent','Consequence','Note']];
  (sess.events||[]).forEach(ev=>{
    rows.push([
      new Date(ev.timestamp).toLocaleString(),
      ev.type||'',
      ev.behaviorLabel||'',
      ev.durationMs||'',
      ev.intensity||'',
      ev.latencyMs||'',
      ev.antecedent||'',
      ev.consequence||'',
      ev.note||''
    ]);
  });
  // add strength row if exists
  if(sess.strength){rows.push(['','','','','','','','','']);rows.push(['STRENGTHS NOTE','','','','','','','',sess.strength]);}
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='BT_'+esc(sess.clientName).replace(/\s+/g,'_')+'_'+new Date(sess.startedAt).toISOString().slice(0,10)+'.csv';
  a.click();
}

// ── JSON export for a single session ──────────────────────────────────────

function importDataPrompt(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        if(data.clients)S.clients=data.clients;
        if(data.sessions)S.sessions=data.sessions;
        if(data.goals)S.goals=data.goals;
        if(data.customs)S.customs=data.customs;
        if(data.strengths)S._strengths=data.strengths;
        persist();closeModal();rerender();
        alert('Data imported successfully!');
      }catch(err){alert('Could not read file: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ── Break-glass: founder signs in AS a target user (full session). ──────────
async function breakGlass(email){
  if(!confirm('Enter '+email+' account for troubleshooting? You will be signed in AS this user until you click Exit. Every break-glass is logged.')) return;
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){ alert('No active session.'); return; }
    const resp=await fetch('/api/break-glass',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},body:JSON.stringify({target_email:email})});
    const data=await resp.json().catch(()=>({}));
    if(!resp.ok || !data.access_token){ alert('Break-glass failed: '+(data.error||('HTTP '+resp.status))); return; }
    // Save the founder session so Exit can restore it; mark impersonation active.
    localStorage.setItem('bl_bg_founder', JSON.stringify({access_token:session.access_token, refresh_token:session.refresh_token, email:(_currentUser&&_currentUser.email)||''}));
    localStorage.setItem('bl_bg_active', JSON.stringify({email:(data.target&&data.target.email)||email}));
    await sb.auth.setSession({access_token:data.access_token, refresh_token:data.refresh_token});
    window.location.href='app.html';
  }catch(e){ alert('Break-glass error: '+(e.message||e)); }
}
async function exitBreakGlass(){
  try{
    const saved=JSON.parse(localStorage.getItem('bl_bg_founder')||'null');
    localStorage.removeItem('bl_bg_active');
    if(saved&&saved.access_token){ await sb.auth.setSession({access_token:saved.access_token, refresh_token:saved.refresh_token}); }
    localStorage.removeItem('bl_bg_founder');
  }catch(e){ console.warn('exit break-glass',e); }
  window.location.href='app.html';
}

async function loadAdminUsers(){
  try{
    const {data:roles}=await sb.from('user_roles').select('*');
    if(!roles){S._adminUsers=[];rerender();return;}
    // Start with empty email (not the UUID) so the UI can clearly show "Pending next login"
    S._adminUsers=roles.map(r=>({id:r.user_id,role:r.role,email:'',name:''}));
    // Batch fetch user_data rows for all known user IDs in one query (covered by RLS via admin policy).
    // We only read the _email and _displayName fields written by storeUserMeta() on each user's own login.
    const userIds=roles.map(r=>r.user_id);
    if(userIds.length){
      try{
        const {data:userData}=await sb.from('user_data').select('user_id,data').in('user_id',userIds);
        if(userData&&userData.length){
          const byId={};
          userData.forEach(row=>{byId[row.user_id]=row.data||{};});
          S._adminUsers=S._adminUsers.map(u=>{
            const d=byId[u.id]||{};
            return {...u,email:d._email||'',name:d._displayName||''};
          });
        }
      }catch(e){console.warn('Email lookup unavailable:',e.message);}
    }
    rerender();
  }catch(e){console.error('Load users error:',e);alert('Error loading users: '+e.message);}
}

async function changeUserRole(userId,newRole){
  try{
    await sb.from('user_roles').upsert({user_id:userId,role:newRole},{onConflict:'user_id'});
    if(S._adminUsers) S._adminUsers=S._adminUsers.map(u=>u.id===userId?{...u,role:newRole}:u);
    if(userId===_currentUser.id) S._role=newRole;
    rerender();
  }catch(e){alert('Error changing role: '+e.message);}
}

async function loadAdminInvites(){
  try{
    const {data}=await sb.from('invites').select('*').order('created_at',{ascending:false});
    S._adminInvites=data||[];
    rerender();
  }catch(e){console.error('Load invites error:',e);alert('Error: '+e.message);}
}
