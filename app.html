// ── AREA CHART (smooth, filled) ─────────────────────────────────────────────
function buildAreaChart(labels,data,color,maxY){
  if(!labels||!data||!data.length)return'';
  const W=700,H=180,P={t:16,r:16,b:42,l:38};
  const cW=W-P.l-P.r, cH=H-P.t-P.b;
  const max=maxY||Math.max(...data,1);
  const n=data.length;
  const xs=data.map((_,i)=>P.l+(n<2?cW/2:i*(cW/(n-1))));
  const ys=data.map(v=>P.t+cH-(v/max)*cH);

  // smooth curve using cubic bezier
  function smooth(pts){
    if(pts.length<2) return `M${pts[0][0]},${pts[0][1]}`;
    let d=`M${pts[0][0]},${pts[0][1]}`;
    for(let i=0;i<pts.length-1;i++){
      const x1=(pts[i][0]+pts[i+1][0])/2;
      d+=` C${x1},${pts[i][1]} ${x1},${pts[i+1][1]} ${pts[i+1][0]},${pts[i+1][1]}`;
    }
    return d;
  }
  const pts=xs.map((x,i)=>[x,ys[i]]);
  const linePath=smooth(pts);
  const areaPath=linePath+` L${xs[xs.length-1]},${P.t+cH} L${xs[0]},${P.t+cH} Z`;

  // Y-axis grid
  const gridLines=[0,0.25,0.5,0.75,1].map(f=>{
    const y=P.t+cH*(1-f);
    const val=Math.round(max*f*10)/10;
    return`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#e8edf5" stroke-width="1"/>
      <text x="${P.l-5}" y="${y+4}" text-anchor="end" font-size="9" fill="#9aa0c0">${val}</text>`;
  }).join('');

  // X-axis labels — show subset if too many
  const step=Math.ceil(n/10);
  const xLabels=xs.map((x,i)=>{
    if(i%step!==0&&i!==n-1) return'';
    return`<text x="${x}" y="${P.t+cH+16}" text-anchor="middle" font-size="9" fill="#9aa0c0">${labels[i]}</text>`;
  }).join('');

  // Dots on data points (only if few enough)
  const dots=n<=20?xs.map((x,i)=>data[i]>0?
    `<circle cx="${x}" cy="${ys[i]}" r="3.5" fill="${color}" stroke="#fff" stroke-width="2"/>`
    :`<circle cx="${x}" cy="${ys[i]}" r="2" fill="#dce1f5"/>`
  ).join(''):'';

  const uid2='c'+Math.random().toString(36).slice(2,7);
  return`<div style="width:100%;overflow:hidden"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <defs>
      <linearGradient id="${uid2}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity=".22"/>
        <stop offset="100%" stop-color="${color}" stop-opacity=".02"/>
      </linearGradient>
    </defs>
    ${gridLines}
    <path d="${areaPath}" fill="url(#${uid2})"/>
    <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${xLabels}
  </svg></div>`;
}

function buildBarChart(data,yLabel){
  if(!data||!data.length)return'';
  const W=500,H=160,P={t:10,r:10,b:40,l:30};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const max=Math.max(...data.map(d=>d.val),1);
  const gap=cW/data.length;
  const bW=Math.min(42,gap*.65);
  let bars='',labs='',vals='';
  data.forEach((d,i)=>{
    const x=P.l+i*gap+gap/2;
    const bH=Math.max(2,(d.val/max)*cH);
    const y=P.t+cH-bH;
    bars+=`<rect x="${x-bW/2}" y="${y}" width="${bW}" height="${bH}" rx="4" fill="url(#bg1)"/>`;
    if(d.val>0)vals+=`<text x="${x}" y="${y-4}" text-anchor="middle" font-size="10" fill="#7880a4" font-weight="600">${d.val}</text>`;
    labs+=`<text x="${x}" y="${P.t+cH+16}" text-anchor="middle" font-size="9" fill="#7880a4">${(d.label||'').slice(0,10)}</text>`;
  });
  let grid='';
  [0,.5,1].forEach(f=>{
    const y=P.t+cH*(1-f);
    grid+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#dce1f5" stroke-width="1"/>`;
    if(f>0)grid+=`<text x="${P.l-3}" y="${y+4}" text-anchor="end" font-size="9" fill="#7880a4">${Math.round(max*f)}</text>`;
  });
  return`<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <defs><linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs>
    ${grid}${bars}${vals}${labs}</svg></div>`;
}
function buildLineChart(data,yLabel){
  if(!data||data.length<2)return'';
  const W=500,H=140,P={t:10,r:10,b:36,l:30};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const max=Math.max(...data.map(d=>d.val),1);
  const pts=data.map((d,i)=>({x:P.l+i*(cW/(data.length-1)),y:P.t+cH-(d.val/max)*cH,lbl:d.label}));
  const poly=pts.map(p=>`${p.x},${p.y}`).join(' ');
  const area=`${P.l},${P.t+cH} `+pts.map(p=>`${p.x},${p.y}`).join(' ')+` ${P.l+cW},${P.t+cH}`;
  let grid='';
  [0,.5,1].forEach(f=>{
    const y=P.t+cH*(1-f);
    grid+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#dce1f5" stroke-width="1"/>`;
    if(f>0)grid+=`<text x="${P.l-3}" y="${y+4}" text-anchor="end" font-size="9" fill="#7880a4">${Math.round(max*f)}</text>`;
  });
  const dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="2"/>`).join('');
  const labs=pts.filter((_,i)=>i===0||i===pts.length-1||pts.length<8||i%Math.ceil(pts.length/6)===0)
    .map(p=>`<text x="${p.x}" y="${P.t+cH+14}" text-anchor="middle" font-size="9" fill="#7880a4">${p.lbl}</text>`).join('');
  return`<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity=".18"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    ${grid}<polygon points="${area}" fill="url(#lg1)"/>
    <polyline points="${poly}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}${labs}</svg></div>`;
}
function buildGoalLineChart(data,target){
  if(!data||data.length<1)return'';
  const W=500,H=110,P={t:14,r:40,b:30,l:30};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const max=Math.max(...data.map(d=>d.val),target*1.5,1);
  const pts=data.map((d,i)=>({x:P.l+(data.length<2?cW/2:i*(cW/Math.max(1,data.length-1))),y:P.t+cH-(d.val/max)*cH}));
  const tY=P.t+cH-(target/max)*cH;
  const poly=pts.map(p=>`${p.x},${p.y}`).join(' ');
  const grid=`<line x1="${P.l}" y1="${P.t+cH}" x2="${W-P.r}" y2="${P.t+cH}" stroke="#dce1f5"/>`;
  const dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--accent)" stroke="#fff" stroke-width="2"/>`).join('');
  const labs=data.map((d,i)=>{
    const x=P.l+(data.length<2?cW/2:i*(cW/Math.max(1,data.length-1)));
    return`<text x="${x}" y="${P.t+cH+13}" text-anchor="middle" font-size="8" fill="#7880a4">${d.label}</text>`;
  }).join('');
  return`<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    ${grid}
    <line x1="${P.l}" y1="${tY}" x2="${W-P.r}" y2="${tY}" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="${W-P.r+4}" y="${tY+4}" font-size="8" fill="#f59e0b" font-weight="700">target</text>
    ${data.length>1?`<polyline points="${poly}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>`:''}
    ${dots}${labs}</svg></div>`;
}
function buildBarChartLight(data,yLabel){
  if(!data||!data.length)return'';
  const W=500,H=120,P={t:8,r:10,b:28,l:22};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const max=Math.max(...data.map(d=>d.val),1);
  const gap=cW/data.length,bW=Math.min(30,gap*.65);
  let bars='',labs='';
  data.forEach((d,i)=>{
    const x=P.l+i*gap+gap/2;
    const bH=Math.max(1,(d.val/max)*cH);
    bars+=`<rect x="${x-bW/2}" y="${P.t+cH-bH}" width="${bW}" height="${bH}" rx="3" fill="#e25d2e" opacity=".7"/>`;
    labs+=`<text x="${x}" y="${P.t+cH+12}" text-anchor="middle" font-size="9" fill="#9a8a80">${d.label}</text>`;
  });
  return`<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <line x1="${P.l}" y1="${P.t+cH}" x2="${W-P.r}" y2="${P.t+cH}" stroke="#f0e8e0"/>
    ${bars}${labs}</svg></div>`;
}


// ── TEMPLATE UPLOAD ────────────────────────────────────────────────────────
function uploadTemplate(input, kind){
  const file = input.files[0];
  if(!file) return;
  const keyMap={bip:['_bipTemplate','_bipTemplateName'],goal:['_goalTemplate','_goalTemplateName'],fba:['_fbaTemplate','_fbaTemplateName']};
  const keys=keyMap[kind]||keyMap.goal;
  const reader = new FileReader();
  reader.onload = function(e){
    S[keys[0]] = e.target.result;
    S[keys[1]] = file.name;
    persist(); rerender();
  };
  if(file.name.match(/\.(txt|md)$/i)){
    reader.readAsText(file);
  } else {
    S[keys[0]] = '[Binary template: '+file.name+']';
    S[keys[1]] = file.name;
    persist(); rerender();
  }
}
function clearTemplate(kind){
  if(!confirm('Remove this template?')) return;
  if(kind==='bip'){ S._bipTemplate=null; S._bipTemplateName=null; }
  else if(kind==='fba'){ S._fbaTemplate=null; S._fbaTemplateName=null; }
  else { S._goalTemplate=null; S._goalTemplateName=null; }
  persist(); rerender();
}

// ── AI DOCUMENT GENERATION ─────────────────────────────────────────────────
function generateFbaDoc(docType, clientId){
  const client = S.clients.find(c=>c.id===clientId);
  if(!client){ alert('Student not found.'); return; }

  const fbaSessions = S.sessions.filter(s=>s.clientId===clientId && s.sessType==='fba');
  const suppSessions = S.sessions.filter(s=>s.clientId===clientId && s.sessType!=='fba');
  const allEv = fbaSessions.flatMap(s=>s.events||[]);
  const goals = (S.goals||[]).filter(g=>g.clientId===clientId);

  if(fbaSessions.length===0){
    alert('No Behaviorist Observation sessions recorded yet. Complete at least one behaviorist session before generating documents.');
    return;
  }

  // Build behavior summary
  const byB = {};
  allEv.forEach(ev=>{
    if(!byB[ev.behaviorLabel]) byB[ev.behaviorLabel]={label:ev.behaviorLabel,icon:ev.behaviorIcon||'',freq:0,durs:[],ints:[],ants:[],cons:[]};
    if(ev.type==='frequency') byB[ev.behaviorLabel].freq++;
    if(ev.type==='duration') byB[ev.behaviorLabel].durs.push(ev.durationMs);
    if(ev.type==='intensity') byB[ev.behaviorLabel].ints.push(ev.intensity);
    if(ev.antecedent&&ev.antecedent.trim()) byB[ev.behaviorLabel].ants.push(ev.antecedent);
    if(ev.consequence&&ev.consequence.trim()) byB[ev.behaviorLabel].cons.push(ev.consequence);
  });
  const behSummary = Object.values(byB).map(b=>{
    const avgDur = b.durs.length ? Math.round(b.durs.reduce((a,v)=>a+v,0)/b.durs.length/1000) : null;
    const avgInt = b.ints.length ? (b.ints.reduce((a,v)=>a+v,0)/b.ints.length).toFixed(1) : null;
    return `Behavior: ${b.label}
  Frequency: ${b.freq} incidents across ${fbaSessions.length} sessions
  ${avgDur?'Avg Duration: '+avgDur+' seconds':''}
  ${avgInt?'Avg Intensity: '+avgInt+'/4':''}
  Common antecedents: ${[...new Set(b.ants)].slice(0,5).join('; ')||'none recorded'}
  Common consequences: ${[...new Set(b.cons)].slice(0,5).join('; ')||'none recorded'}`;
  }).join('\n\n');

  const settingEventsSummary = fbaSessions
    .filter(s=>s.settingEvents&&s.settingEvents.length)
    .map(s=>`${new Date(s.startedAt).toLocaleDateString()}: ${s.settingEvents.join(', ')}`)
    .join('\n');

  const hypotheses = fbaSessions
    .filter(s=>s.fbaHypothesis&&s.fbaHypothesis.trim())
    .map(s=>`[${new Date(s.startedAt).toLocaleDateString()} - ${s.behavioristName||'Behaviorist'}]: ${s.fbaHypothesis}`)
    .join('\n');

  const locations = [...new Set(fbaSessions.map(s=>s.location||'').filter(Boolean))];
  const behaviorists = [...new Set(fbaSessions.map(s=>s.behavioristName||'').filter(Boolean))];

  const dataContext = `STUDENT: ${client.name}
FBA SESSIONS: ${fbaSessions.length} (plus ${suppSessions.length} supplemental sessions)
SETTINGS OBSERVED: ${locations.join(', ')||'not specified'}
BEHAVIORIST(S): ${behaviorists.join(', ')||'not specified'}
TOTAL EVENTS LOGGED: ${allEv.length}
DATE RANGE: ${fbaSessions.length?new Date(fbaSessions[0].startedAt).toLocaleDateString()+' – '+new Date(fbaSessions[fbaSessions.length-1].startedAt).toLocaleDateString():''}

BEHAVIOR DATA:
${behSummary||'No events recorded'}

SETTING EVENTS NOTED:
${settingEventsSummary||'None recorded'}

BEHAVIORIST HYPOTHESIS NOTES:
${hypotheses||'None recorded'}

SUPPLEMENTAL DATA: ${suppSessions.length} additional sessions from other observation types available as reference.`;

  const templateContext = docType==='bip' && S._bipTemplate && !S._bipTemplate.startsWith('[Binary')
    ? '\n\nDISTRICT BIP TEMPLATE STRUCTURE TO FOLLOW:\n'+S._bipTemplate.slice(0,2000)
    : docType==='goals' && S._goalTemplate && !S._goalTemplate.startsWith('[Binary')
    ? '\n\nDISTRICT GOAL TEMPLATE STRUCTURE TO FOLLOW:\n'+S._goalTemplate.slice(0,2000)
    : '';

  const templateNameHint = docType==='bip' && S._bipTemplateName ? ' Match the section structure of the uploaded template: '+S._bipTemplateName+'.'
    : docType==='goals' && S._goalTemplateName ? ' Follow the format of the uploaded template: '+S._goalTemplateName+'.'
    : '';

  const prompts = {
    bip: `You are an expert school behaviorist writing a Behavior Intervention Plan (BIP) for a special education student. Use the Behaviorist observation data below to write a complete, professional BIP draft.${templateNameHint}

Include: (1) Student background and behavior description, (2) Identified behavioral function(s) based on ABC data, (3) Antecedent-based strategies (prevention), (4) Teaching replacement behaviors, (5) Consequence strategies, (6) Crisis response protocol if warranted, (7) Progress monitoring plan.

Write in professional IEP language. Be specific and evidence-based. Use the actual data provided.${templateContext}

FBA DATA:
${dataContext}`,

    goals: `You are a special education specialist writing measurable behavior goals for an IEP based on completed FBA data. Use the observation data below to write 2-4 specific, measurable, attainable, relevant, time-bound (SMART) behavior goals.${templateNameHint}

For each goal include: (1) Baseline from FBA data, (2) Annual goal statement with measurable criteria, (3) Short-term objectives (2-3 per goal), (4) Measurement method, (5) Evaluation schedule.

Write in standard IEP goal language. Base all baselines on the actual session data.${templateContext}

FBA DATA:
${dataContext}`,

    summary: `You are a school behaviorist writing a professional FBA Summary narrative. Use the observation data below to write a clear, defensible FBA summary suitable for an IEP team.

Include: (1) Reason for referral and assessment overview, (2) Assessment methods used, (3) Behavioral descriptions and patterns, (4) Antecedent and consequence analysis, (5) Hypothesized behavioral function(s) with rationale, (6) Summary and recommendations.

Write in clear professional language accessible to parents and educators alike.

FBA DATA:
${dataContext}`
  };

  const docLabels = {bip:'BIP Draft', goals:'Behavior Goals', summary:'FBA Summary'};

  // Show a generating modal
  S._modal = {type:'fbaGenerating', docType, clientId, label:docLabels[docType]};
  rerender();

  fetch('/api/claude', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:2000,
      messages:[{role:'user',content:prompts[docType]}]
    })
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.error){
      S._modal={type:'fbaDocResult', docType, clientId, label:docLabels[docType], content:'Error: '+data.error.message+'. Check your API key in Settings.'};
    } else {
      const text = (data.content||[]).map(b=>b.text||'').join('');
      S._modal={type:'fbaDocResult', docType, clientId, label:docLabels[docType], content:text};
    }
    rerender();
  })
  .catch(err=>{
    S._modal={type:'fbaDocResult', docType, clientId, label:docLabels[docType], content:'Network error: '+err.message};
    rerender();
  });
}

// ── PDF Export ─────────────────────────────────────────────────────────────
function doExportPDF(){
  const c=S.selClient;
  const range=S._reportRange||'all';
  let start=null;const end=new Date();
  if(range==='week'){start=new Date();start.setDate(start.getDate()-7);}
  if(range==='month'){start=new Date();start.setMonth(start.getMonth()-1);}
  if(range==='quarter'){start=new Date();start.setMonth(start.getMonth()-3);}
  const clientSessions=S.sessions.filter(s=>s.clientId===c.id)
    .filter(s=>!start||(new Date(s.startedAt)>=start&&new Date(s.startedAt)<=end))
    .sort((a,b)=>a.startedAt-b.startedAt);
  const cGoals=clientGoals(c.id);
  const jsPDF=window.jspdf&&window.jspdf.jsPDF;
  if(!jsPDF){generatePrintHTML(c,clientSessions,cGoals);return;}
  const doc=new jsPDF({orientation:'portrait',unit:'pt',format:'letter'});
  const W=612,H=792,M=48,COL=W-M*2;let y=M;
  const chk=(n=40)=>{if(y+n>H-M){doc.addPage();y=M;}};
  // Header
  doc.setFillColor(67,97,238);doc.rect(0,0,W,90,'F');
  doc.setFillColor(124,58,237);doc.rect(W*.6,0,W*.4,90,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(22);doc.setTextColor(255,255,255);
  doc.text('BehaviorLog',M,38);
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(200,210,255);
  doc.text('IEP Behavior Data Report',M,55);
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
  doc.text(c.name,M,74);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(200,210,255);
  doc.text('Generated: '+fmtDate(Date.now()),W-M,58,{align:'right'});
  if(clientSessions.length>0)doc.text(fmtDate(clientSessions[0].startedAt)+' – '+fmtDate(clientSessions[clientSessions.length-1].startedAt),W-M,72,{align:'right'});
  y=106;
  // Stats
  const totalEv=clientSessions.flatMap(s=>s.events).length;
  const uniqB=[...new Set(clientSessions.flatMap(s=>s.events.map(e=>e.behaviorLabel)))];
  [{l:'Sessions',v:clientSessions.length},{l:'Total Events',v:totalEv},{l:'Behaviors',v:uniqB.length},{l:'Goals',v:cGoals.length}].forEach((st,i)=>{
    const bx=M+i*(COL/4+2);
    doc.setFillColor(238,241,253);doc.setDrawColor(220,225,245);doc.roundedRect(bx,y,COL/4-2,46,5,5,'FD');
    doc.setFont('helvetica','bold');doc.setFontSize(18);doc.setTextColor(67,97,238);
    doc.text(String(st.v),bx+(COL/4-2)/2,y+21,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(120,128,164);
    doc.text(st.l,bx+(COL/4-2)/2,y+35,{align:'center'});
  });
  y+=60;
  // Goals
  if(cGoals.length>0){
    chk(55);
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(26,31,58);
    doc.text('Behavior Goals & Progress',M,y);y+=5;
    doc.setFillColor(200,210,240);doc.rect(M,y,COL,1,'F');y+=9;
    cGoals.forEach(g=>{
      chk(50);
      const counts=clientSessions.slice(-10).map(s=>behFreq(s,g.behaviorLabel));
      const avg=counts.length?counts.reduce((a,v)=>a+v,0)/counts.length:0;
      const met=avg<=g.target;
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(26,31,58);
      doc.text(g.behaviorLabel,M,y);
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(120,128,164);
      doc.text('Target: ≤'+g.target+'/session  |  Avg: '+avg.toFixed(1)+'  |  '+(met?'ON TRACK ✓':'NEEDS SUPPORT'),M,y+12);
      const bX=M,bY=y+19,bW2=COL*.65,bH=7;
      doc.setFillColor(220,224,245);doc.roundedRect(bX,bY,bW2,bH,3,3,'F');
      doc.setFillColor(...(met?[16,185,129]:[239,68,68]));
      doc.roundedRect(bX,bY,Math.max(3,bW2*Math.min(1,avg/Math.max(g.target*1.5,1))),bH,3,3,'F');
      const tX=bX+bW2*(g.target/Math.max(g.target*1.5,1));
      doc.setDrawColor(67,97,238);doc.setLineWidth(1.5);doc.line(tX,bY-2,tX,bY+bH+2);
      y+=g.notes?44:36;
      if(g.notes){doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(120,128,164);doc.text('Notes: '+g.notes,M,y-6);}
      doc.setFillColor(220,225,245);doc.rect(M,y,COL,.5,'F');y+=7;
    });y+=7;
  }
  // Session table
  if(clientSessions.length>0&&uniqB.length>0){
    chk(55);
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(26,31,58);
    doc.text('Session Data',M,y);y+=5;
    doc.setFillColor(200,210,240);doc.rect(M,y,COL,1,'F');y+=9;
    const dispB=uniqB.slice(0,5);
    const dCW=88,nCW=100,bCW=(COL-dCW-nCW)/dispB.length;
    doc.setFillColor(238,241,253);doc.rect(M,y,COL,17,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,31,58);
    doc.text('Date / Time',M+3,y+11);
    dispB.forEach((bl,i)=>doc.text((bl||'').slice(0,12),M+dCW+i*bCW+bCW/2,y+11,{align:'center'}));
    doc.text('Notes',M+dCW+dispB.length*bCW+3,y+11);y+=17;
    clientSessions.forEach((sess,si)=>{
      chk(20);
      doc.setFillColor(...(si%2===0?[248,249,255]:[255,255,255]));doc.rect(M,y,COL,17,'F');
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(26,31,58);
      doc.text(fmtDateS(sess.startedAt)+' '+fmtTime(sess.startedAt),M+3,y+11);
      dispB.forEach((bl,i)=>{
        const cnt=behFreq(sess,bl);
        const goal=cGoals.find(g=>g.behaviorLabel===bl);
        doc.setFont('helvetica',cnt>0?'bold':'normal');
        doc.setTextColor(...(cnt>0&&goal&&cnt>goal.target?[239,68,68]:cnt>0?[16,185,129]:[120,128,164]));
        doc.text(cnt>0?String(cnt):'—',M+dCW+i*bCW+bCW/2,y+11,{align:'center'});
      });
      doc.setFont('helvetica','normal');doc.setTextColor(120,128,164);
      doc.text((sess.note||'').slice(0,24),M+dCW+dispB.length*bCW+3,y+11);
      doc.setDrawColor(220,225,245);doc.setLineWidth(.5);doc.line(M,y+17,M+COL,y+17);y+=17;
    });y+=10;
  }
  // ABC
  const abcEv=clientSessions.flatMap(s=>s.events.filter(e=>e.antecedent||e.consequence).map(e=>({...e,sDate:s.startedAt})));
  if(abcEv.length>0){
    chk(45);
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(26,31,58);
    doc.text('ABC Log',M,y);y+=5;
    doc.setFillColor(200,210,240);doc.rect(M,y,COL,1,'F');y+=9;
    abcEv.slice(0,28).forEach(ev=>{
      chk(30);
      doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(26,31,58);
      doc.text((ev.behaviorLabel||'')+'  ·  '+fmtDateS(ev.sDate)+' '+fmtTime(ev.timestamp),M,y);y+=10;
      if(ev.antecedent){doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(67,97,238);doc.text('A:',M+3,y);doc.setFont('helvetica','normal');doc.setTextColor(26,31,58);doc.text((ev.antecedent||'').slice(0,90),M+14,y);y+=10;}
      if(ev.consequence){doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(194,65,12);doc.text('C:',M+3,y);doc.setFont('helvetica','normal');doc.setTextColor(26,31,58);doc.text((ev.consequence||'').slice(0,90),M+14,y);y+=10;}
      doc.setFillColor(220,225,245);doc.rect(M,y,COL,.5,'F');y+=6;
    });
  }
  // Footers
  const pc=doc.getNumberOfPages();

function saveManualEntry(cid){
  const m=S._modal;
  if(!m) return;
  const date=document.getElementById('me-date')?.value;
  const time=document.getElementById('me-time')?.value||'09:00';
  const location=document.getElementById('me-location')?.value||'';
  const length=parseInt(document.getElementById('me-length')?.value)||null;
  const notes=document.getElementById('me-notes')?.value||'';

  if(!date){alert('Please enter a date.');return;}

  // Build events from entries
  const events=[];
  const entries=m.entries||{};
  const startTs=new Date(date+'T'+time).getTime();

  Object.entries(entries).forEach(([bid,e])=>{
    const b=allBehs().find(x=>x.id===bid);
    if(!b) return;
    const freq=parseInt(e.freq)||0;
    const durMin=parseFloat(e.durMin)||0;
    const intensity=e.intensity?parseInt(e.intensity):null;

    // Log frequency events
    for(let i=0;i<freq;i++){
      const ev={id:uid(),type:'frequency',behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,timestamp:startTs+(i*60000),antecedent:'',consequence:'',manual:true};
      if(intensity) ev.intensity=intensity;
      events.push(ev);
    }

    // Log duration if provided
    if(durMin>0){
      events.push({id:uid(),type:'duration',behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,timestamp:startTs,durationMs:durMin*60000,antecedent:'',consequence:'',manual:true,intensity:intensity||null});
    }

    // If only intensity provided (no freq or dur), log a single intensity event
    if(intensity&&freq===0&&durMin===0){
      events.push({id:uid(),type:'intensity',behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,timestamp:startTs,intensity,antecedent:'',consequence:'',manual:true});
    }
  });

  if(!events.length){alert('Please enter data for at least one behavior.');return;}

  // Create a session record
  const c=S.clients.find(x=>x.id===cid);
  const sess={
    id:uid(),
    clientId:cid,
    clientName:c?c.name:'Unknown',
    startedAt:startTs,
    endedAt:length?startTs+(length*60000):startTs+(30*60000),
    events,
    note:notes,
    sessType:'manual',
    plannedMins:length,
    location,
    manual:true
  };

  S.sessions.push(sess);
  persist();
  S._modal=null;
  rerender();
  alert('Manual entry saved — '+events.length+' event'+(events.length!==1?'s':'')+' recorded for '+date);
}

// ── CSV Upload ─────────────────────────────────────────────────────────────
function handleCSVUpload(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    const rows=text.split(/\r?\n/).filter(r=>r.trim());
    if(rows.length<2){alert('CSV appears empty or has no data rows.');return;}

    // Parse header — find columns by fuzzy match
    const header=rows[0].split(',').map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
    const colMap={};
    const findCol=(names)=>header.findIndex(h=>names.some(n=>h.includes(n)));
    colMap.first=findCol(['first','firstname','fname']);
    colMap.last=findCol(['last','lastname','lname','surname']);
    colMap.name=findCol(['name','student','fullname','studentname']);
    colMap.sid=findCol(['studentid','sid','id','number','studentnumber']);
    colMap.grade=findCol(['grade','gradelevel','gr']);
    colMap.dob=findCol(['dob','dateofbirth','birth','birthday','birthdate']);

    // Need at least a name column
    if(colMap.first<0&&colMap.name<0){
      alert('Could not find a name column in your CSV.\\n\\nLooking for columns like: First Name, Last Name, Student Name, Student ID, Grade, DOB\\n\\nFound: '+rows[0]);
      input.value='';return;
    }

    const added=[];
    const skipped=[];
    for(let i=1;i<rows.length;i++){
      const cols=parseCSVRow(rows[i]);
      if(!cols.length)continue;

      let first='',last='',name='';
      if(colMap.first>=0) first=(cols[colMap.first]||'').trim();
      if(colMap.last>=0) last=(cols[colMap.last]||'').trim();
      if(colMap.name>=0&&!first) name=(cols[colMap.name]||'').trim();

      if(!first&&!name){skipped.push(i+1);continue;}

      if(name&&!first){
        const parts=name.split(/\s+/);
        first=parts[0]||'';
        last=parts.slice(1).join(' ')||'';
      }
      const fullName=[first,last].filter(Boolean).join(' ');

      // Skip duplicates
      if(S.clients.some(c=>c.name.toLowerCase()===fullName.toLowerCase())){skipped.push(fullName+' (dup)');continue;}

      const sid=colMap.sid>=0?(cols[colMap.sid]||'').trim():'';
      const grade=colMap.grade>=0?(cols[colMap.grade]||'').trim():'';
      let dob='';
      if(colMap.dob>=0){
        const raw=(cols[colMap.dob]||'').trim();
        if(raw){
          const d=new Date(raw);
          if(!isNaN(d)) dob=d.toISOString().slice(0,10);
          else dob=raw;
        }
      }

      S.clients.push({
        id:uid(),name:fullName,firstName:first,lastName:last,
        studentId:sid,grade,dob,linkedBehaviorist:'',
        createdAt:Date.now()
      });
      added.push(fullName);
    }

    persist();rerender();
    input.value='';
    let msg=`✅ Imported ${added.length} student${added.length!==1?'s':''}`;
    if(skipped.length) msg+=`\\n⚠ Skipped ${skipped.length} (empty or duplicate)`;
    alert(msg);
  };
  reader.readAsText(file);
}

function parseCSVRow(row){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<row.length;i++){
    const ch=row[i];
    if(ch==='"'){inQ=!inQ;continue;}
    if(ch===','&&!inQ){result.push(cur);cur='';continue;}
    cur+=ch;
  }
  result.push(cur);
  return result;
}

// ── Smart incident (tap-to-start / tap-to-end) ─────────────────────────────
function startIncident(bid){
  const b=allBehs().find(b=>b.id===bid);
  if(!b) return;

  // ── FREQ tool override: when active, any tap = +1 count ──
  if(S.measureMode==='FREQ'){
    S.activeSess.events.push({
      id:uid(),type:'frequency',
      behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,
      timestamp:Date.now(),antecedent:S.abcA,consequence:''
    });
    S.abcA='';
    rerender();
    return;
  }

  const measure=getBehMeasure(bid);

  // ── FREQUENCY: instant log, no timer ──
  if(measure==='frequency'){
    S.activeSess.events.push({
      id:uid(),type:'frequency',
      behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,
      timestamp:Date.now(),antecedent:S.abcA,consequence:''
    });
    S.abcA='';
    rerender();
    return;
  }

  // ── LATENCY: tap start, tap end = log latency time ──
  if(measure==='latency'){
    if(S.incidents[bid]){
      const inc=S.incidents[bid];
      const latMs=Date.now()-inc.startMs;
      delete S.incidents[bid];
      S.activeSess.events.push({
        id:uid(),type:'latency',
        behaviorId:inc.behId,behaviorLabel:inc.behLabel,behaviorIcon:inc.behIcon,
        timestamp:Date.now(),latencyMs:latMs,
        antecedent:inc.abcA,note:inc.note||'',consequence:''
      });
      rerender();
      return;
    }
    S.incidents[bid]={behId:bid,behLabel:b.label,behIcon:b.icon,startMs:Date.now(),elapsed:0,abcA:S.abcA,note:'',measure};
    S.activeBeh=b;
    S.abcA='';
    tick();rerender();
    return;
  }

  // ── DURATION or INTENSITY: tap-to-start / tap-to-end ──
  if(S.incidents[bid]){
    // Already active — END this behavior
    if(measure==='duration'){
      _endIncidentDurationOnly(bid);
    } else {
      _endIncidentById(bid); // intensity — shows rating prompt
    }
    return;
  }
  // START new incident
  S.incidents[bid]={behId:bid,behLabel:b.label,behIcon:b.icon,startMs:Date.now(),elapsed:0,abcA:S.abcA,note:'',measure};
  S.activeBeh=b;
  S.abcA='';
  tick();
  rerender();
}

function _endIncidentDurationOnly(bid){
  const inc=S.incidents[bid];
  if(!inc) return;
  const durMs=Date.now()-inc.startMs;
  delete S.incidents[bid];
  S.activeSess.events.push({
    id:uid(),type:'duration',
    behaviorId:inc.behId,behaviorLabel:inc.behLabel,behaviorIcon:inc.behIcon,
    timestamp:Date.now(),durationMs:durMs,
    antecedent:inc.abcA,note:inc.note||'',consequence:''
  });
  rerender();
}

function _endIncidentById(bid){
  const inc=S.incidents[bid];
  if(!inc) return;
  const durMs=Date.now()-inc.startMs;
  delete S.incidents[bid];
  // log duration event — consequence will be captured in intensity prompt
  S.activeSess.events.push({
    id:uid(),type:'duration',
    behaviorId:inc.behId,behaviorLabel:inc.behLabel,behaviorIcon:inc.behIcon,
    timestamp:Date.now(),durationMs:durMs,

  });

}

function mStartIncident(bid){
  const slot=cs(); if(!slot) return;
  if(!slot.incidents)setCs({incidents:{}});
  const incs=cs().incidents;
  const b=allBehs().find(b=>b.id===bid);
  if(!b)return;

  // FREQ tool override
  if(slot.measureMode==='FREQ'){
    slot.events.push({id:uid(),type:'frequency',behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,timestamp:Date.now(),antecedent:cs().abcA||'',consequence:''});
    setCs({abcA:''});
    rerender();return;
  }

  const measure=getBehMeasure(bid);

  // FREQUENCY: instant log
  if(measure==='frequency'){
    slot.events.push({id:uid(),type:'frequency',behaviorId:b.id,behaviorLabel:b.label,behaviorIcon:b.icon,timestamp:Date.now(),antecedent:cs().abcA||'',consequence:''});
    setCs({abcA:''});
    rerender();return;
  }

  // LATENCY: tap start/stop = log latency
  if(measure==='latency'){
    if(incs[bid]){
      const inc=incs[bid];
      const latMs=Date.now()-inc.startMs;
      delete incs[bid];
      slot.events.push({id:uid(),type:'latency',behaviorId:inc.behId,behaviorLabel:inc.behLabel,behaviorIcon:inc.behIcon,timestamp:Date.now(),latencyMs:latMs,antecedent:inc.abcA,note:inc.note||'',consequence:''});
      setCs({incidents:incs});
      rerender();return;
    }
    incs[bid]={behId:bid,behLabel:b.label,behIcon:b.icon,startMs:Date.now(),elapsed:0,abcA:cs().abcA||'',note:'',measure};
    setCs({incidents:incs,activeBeh:b,abcA:''});
    rerender();return;
  }

  if(incs[bid]){
    // already active — tap again to end
    if(measure==='duration') mEndIncidentDurationOnly(bid);
    else mEndIncident(bid);
    return;
  }
  incs[bid]={behId:bid,behLabel:b.label,behIcon:b.icon,startMs:Date.now(),elapsed:0,abcA:cs().abcA||"",note:"",measure};
  setCs({incidents:incs,activeBeh:b,abcA:""});
  rerender();
}

  const slot=cs(); if(!slot) return;
  const incs=slot.incidents||{};
  const inc=incs[bid]; if(!inc) return;
  const durMs=Date.now()-inc.startMs;
  delete incs[bid];
  slot.events.push({id:uid(),type:"duration",behaviorId:inc.behId,behaviorLabel:inc.behLabel,behaviorIcon:inc.behIcon,timestamp:Date.now(),durationMs:durMs,antecedent:inc.abcA,note:inc.note||"",consequence:""});

  rerender();
}

    ?'Delete '+name+'?\n\nThis will permanently remove the student and all '+sessCount+' session record'+(sessCount!==1?'s':'')+'. This cannot be undone.'
    :'Delete '+name+'? This cannot be undone.';
  if(!confirm(msg)) return;
  S.clients=S.clients.filter(c=>c.id!==cid);
  S.sessions=S.sessions.filter(s=>s.clientId!==cid);
  S.goals=(S.goals||[]).filter(g=>g.clientId!==cid);
  if(S.selClient&&S.selClient.id===cid){S.selClient=null;S.view='home';}
  persist();rerender();
}

function saveStrength(sessId,val){

// ── CSV export for a single session ───────────────────────────────────────
function exportSessionCSV(sessId){
  const sess=S.sessions.find(s=>s.id===sessId);
  if(!sess)return;
  const rows=[['Time','Type','Behavior','Duration(ms)','Intensity','Latency(ms)','Antecedent','Consequence','Note']];
  (sess.events||[]).forEach(ev=>{
    rows.push([
      new Date(ev.timestamp).toLocaleString(),
      ev.type||'',
      ev.behaviorLabel||'',
      ev.durationMs||'',
      ev.intensity||'',
      ev.latencyMs||'',
      ev.antecedent||'',
      ev.consequence||'',
      ev.note||''
    ]);
  });
  // add strength row if exists
  if(sess.strength){rows.push(['','','','','','','','','']);rows.push(['STRENGTHS NOTE','','','','','','','',sess.strength]);}
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='BT_'+esc(sess.clientName).replace(/\s+/g,'_')+'_'+new Date(sess.startedAt).toISOString().slice(0,10)+'.csv';
  a.click();
}

function importDataPrompt(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        if(data.clients)S.clients=data.clients;
        if(data.sessions)S.sessions=data.sessions;
        if(data.goals)S.goals=data.goals;
        if(data.customs)S.customs=data.customs;
        if(data.strengths)S._strengths=data.strengths;
        persist();closeModal();rerender();
        alert('Data imported successfully!');
      }catch(err){alert('Could not read file: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

async function loadAdminUsers(){

    // Get user emails from auth — we'll use the roles data
    S._adminUsers=roles.map(r=>({id:r.user_id,role:r.role,email:r.user_id,name:''}));
    // Try to get emails from user_data
    for(const u of S._adminUsers){
      try{
        const {data:ud}=await sb.from('user_data').select('data').eq('user_id',u.id).single();
        if(ud&&ud.data){u.email=ud.data._email||u.id;u.name=ud.data._displayName||'';}

function buildAssessments(){
  const tab=S._assTab||'dashboard';

  let body='';
  if(tab==='dashboard') body=assTabDashboard(subs,scoredIds);
  if(tab==='send') body=assTabSend();

function assTabDashboard(subs,scoredIds){
  const unscored=subs.filter(s=>!scoredIds.has(s.id)).length;
  const activity=[
    ...S._assSent.map(s=>({text:'📤 Sent '+s.type+' to '+esc(s.respondent)+' for '+esc(s.student),time:s.sentAt})),
    ...subs.map(s=>({text:'📥 '+s.type+' from '+esc(s.respondent||s.informant||'respondent'),time:s.submittedAt})),
    ...S._assScored.map(s=>({text:'✅ Scored '+s.type+' for '+esc(s.studentName)+' — '+(s.primary||'').toUpperCase(),time:s.scoredAt})),
  ].sort((a,b)=>new Date(b.time)-new Date(a.time)).slice(0,10);

function assSend(){
  const student=document.getElementById('ass-student')?.value;
  const type=document.getElementById('ass-type')?.value;
  const respondent=document.getElementById('ass-respondent')?.value;
  const email=document.getElementById('ass-email')?.value;
  const role=document.getElementById('ass-role')?.value;
  if(!student||!respondent||!email){alert('Fill in student, respondent, and email.');return;}
  const types=type==='BOTH'?['QABF','FAST']:[type];

  // Build email HTML
  const assessLinks=types.map(t=>{
    const linkUrl=window.location.origin+'/'+(t==='QABF'?'QABF_Assessment.html':'FAST_Assessment.html')+'?student='+encodeURIComponent(student)+'&respondent='+encodeURIComponent(respondent);
    return `<div style="background:#f8f8f8;padding:12px 16px;border-radius:8px;margin:8px 0;border-left:4px solid ${t==='QABF'?'#7b4ab4':'#3498c0'}">
      <strong>${t==='QABF'?'Questions About Behavioral Function (QABF)':'Functional Assessment Screening Tool (FAST)'}</strong><br>
      <a href="${linkUrl}" style="color:#2b7a78;font-weight:700">${linkUrl}</a>
    </div>`;
  }).join('');

  const emailHtml=`
    <div style="font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:600px;margin:0 auto;padding:20px">
      <div style="background:#1e3a5f;border-radius:12px 12px 0 0;padding:20px;text-align:center">
        <h1 style="color:#fff;font-size:1.3rem;margin:0">BehaviorLog Pro</h1>
        <p style="color:rgba(255,255,255,.6);font-size:.8rem;margin:4px 0 0">Sure Step Education</p>
      </div>
      <div style="background:#fff;border:1px solid #e0e0e0;border-radius:0 0 12px 12px;padding:24px">
        <p style="font-size:.95rem;margin-bottom:16px">Hello ${esc(respondent)},</p>
        <p style="font-size:.9rem;line-height:1.6;margin-bottom:16px">You are being asked to complete a behavioral assessment for <strong>${esc(student)}</strong>. Please click the link below to complete the assessment. It should take approximately ${type==='BOTH'?'15-20':'8-12'} minutes.</p>
        ${assessLinks}
        <p style="font-size:.9rem;line-height:1.6;margin-top:16px">Your responses will be reviewed by the behavior support team. There are no right or wrong answers — please answer based on what you have personally observed.</p>
        <p style="font-size:.9rem;margin-top:20px">Thank you,<br><strong>Sure Step Education Behavior Support Team</strong></p>
      </div>
      <p style="font-size:.72rem;color:#999;text-align:center;margin-top:12px">This is an automated message from BehaviorLog Pro. Please do not reply to this email.</p>
    </div>`;

  // Send email via serverless function
  const btn=document.querySelector('[onclick="assSend()"]');
  if(btn){btn.disabled=true;btn.textContent='Sending…';}

  fetch('/api/send-email',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      to:email,
      toName:respondent,
      subject:'Behavioral Assessment Request — '+student,
      html:emailHtml
    })
  }).then(r=>r.json()).then(data=>{
    if(data.success){
      types.forEach(t=>{
        S._assSent.push({id:t+'-'+uid(),student,type:t,respondent,email,role,sentAt:new Date().toISOString(),status:'pending'});
      });
      persist();
      alert('✅ Assessment'+(types.length>1?'s':'')+' emailed to '+respondent+' at '+email);
      rerender();
    } else {
      alert('❌ Email failed: '+(data.error||'Unknown error')+'\n\nYou can copy the assessment link instead.');
      if(btn){btn.disabled=false;btn.textContent='📧 Send via Email';}
    }
  }).catch(err=>{
    alert('❌ Email failed: '+err.message+'\n\nYou can copy the assessment link instead.');
    if(btn){btn.disabled=false;btn.textContent='📧 Send via Email';}
  });
}

function assScore(subId){
  const subs=getAssSubmissions();
  const sub=subs.find(s=>s.id===subId);
  if(!sub) return;
  const scores=sub.type==='QABF'?scoreQABF(sub):scoreFAST(sub);
  const cats=sub.type==='QABF'?
    {att:{name:'Attention',color:'#4a90d9'},esc:{name:'Escape',color:'#e67e22'},non:{name:'Non-Social',color:'#27ae60'},phy:{name:'Physical',color:'#e74c3c'},tan:{name:'Tangible',color:'#9b59b6'}}:
    {att:{name:'Attention',color:'#4a90d9'},tan:{name:'Tangible',color:'#9b59b6'},esc:{name:'Escape',color:'#e67e22'},sen:{name:'Sensory',color:'#27ae60'},pain:{name:'Pain',color:'#e74c3c'}};
  let highest='',highVal=-1;
  Object.entries(scores).forEach(([k,v])=>{if(v>highVal){highVal=v;highest=k;}});
  
  let bars='';
  Object.entries(cats).forEach(([k,c])=>{
    const v=scores[k]||0;const max=sub.type==='QABF'?15:(k==='sen'||k==='pain'?6:8);
    const pct=Math.round((v/max)*100);const isPrimary=k===highest&&highVal>0;
    bars+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div style="width:110px;font-size:.82rem;font-weight:600">${c.name}${isPrimary?' <span style="background:var(--nav);color:#fff;font-size:.65rem;padding:2px 8px;border-radius:10px">PRIMARY</span>':''}</div>
      <div style="flex:1;height:22px;background:var(--bg2);border-radius:11px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${c.color};border-radius:11px;transition:width .6s"></div></div>
      <div style="width:40px;text-align:right;font-weight:700;font-size:.85rem;color:${c.color}">${v}/${max}</div>
    </div>`;
  });

  const alreadyScored=S._assScored.some(s=>s.submissionId===subId);
  S._scoringTemp={sub,scores,primary:highest};
  S._modal={type:'assScore',content:`
    <h2 style="margin-bottom:14px">Score ${sub.type} — ${esc(sub.studentName||'Student')}</h2>
    <p style="font-size:.84rem;color:var(--muted);margin-bottom:4px"><strong>Respondent:</strong> ${esc(sub.respondent||sub.informant||'Unknown')} · <strong>Behavior:</strong> ${esc(sub.behavior||'N/A')}</p>
    <p class="muted" style="font-size:.78rem;margin-bottom:14px">Submitted ${fmtDate(sub.submittedAt)}</p>
    <div style="background:var(--surface2);border-radius:12px;padding:16px;margin-bottom:12px">${bars}</div>
    ${highVal>0?`<div style="padding:12px;background:var(--green-soft);border-radius:10px;border-left:4px solid var(--accent)"><strong>Primary Function: ${cats[highest]?.name||highest}</strong></div>`:''}
    ${alreadyScored?'':'<button class="btn btn-primary" onclick="assSaveScore()" style="margin-top:12px">✅ Save Score</button>'}
  `};
  rerender();
}

function scoreQABF(sub){
  const catQs={att:[1,6,11,16,21],esc:[2,7,12,17,22],non:[3,8,13,18,23],phy:[4,9,14,19,24],tan:[5,10,15,20,25]};
  const scores={};
  Object.entries(catQs).forEach(([k,qs])=>{let t=0;qs.forEach(q=>{const a=sub.answers[q];if(a&&a.score!=null)t+=a.score;});scores[k]=t;});
  return scores;
}

function scoreFAST(sub){
  const catQs={att:[1,2,3,4,5,6,7,8],tan:[1,2,3,9,10,11,12,13],esc:[1,2,3,14,15,16,17,18],sen:[19,20,21,22,23,24],pain:[19,20,24,25,26,27]};
  const scores={};
  Object.entries(catQs).forEach(([k,qs])=>{let t=0;qs.forEach(q=>{if(sub.answers[q]==='yes')t++;});scores[k]=t;});
  return scores;
}

function assSaveScore(){

  S._assScored.push({submissionId:sub.id,type:sub.type,studentName:sub.studentName,behavior:sub.behavior,respondent:sub.respondent||sub.informant,scores,primary,scoredAt:new Date().toISOString()});

}

// ── BOOT — async startup ───────────────────────────────────────────────────
async function boot(){
  const authed = await initAuth();
  if(!authed) return;

  // Load role from Supabase
  try{
    const {data:roleData}=await sb.from('user_roles').select('role').eq('user_id',_currentUser.id).single();
    if(roleData) S._role=roleData.role;
    else {
      // Check for invite code in URL
      const params=new URLSearchParams(window.location.search);
      const inviteCode=params.get('invite');
      if(inviteCode){
        const {data:inv}=await sb.from('invites').select('*').eq('code',inviteCode).is('used_by',null).single();
        if(inv){
          await sb.from('user_roles').upsert({user_id:_currentUser.id,role:inv.role});
          await sb.from('invites').update({used_by:_currentUser.id,used_at:new Date().toISOString()}).eq('id',inv.id);
          S._role=inv.role;
          window.history.replaceState({},'',window.location.pathname);
        } else {
          await sb.from('user_roles').upsert({user_id:_currentUser.id,role:'teacher'});
          S._role='teacher';
        }
      } else {
        await sb.from('user_roles').upsert({user_id:_currentUser.id,role:'teacher'});
        S._role='teacher';
      }
    }
  }catch(e){
    console.error('Role load error:',e);
    // Try cached role from localStorage
    try{ const cachedRole=localStorage.getItem('bl_role'); if(cachedRole) S._role=cachedRole; else S._role='teacher'; }
    catch(le){S._role='teacher';}
  }
  // Cache role for offline use
  try{localStorage.setItem('bl_role',S._role);}catch(e){}

  // Load cloud data
  stored = await loadFromCloud();

  // Hydrate state
  S.clients   = stored.clients||[];
  S.customs   = stored.customs||[];
  S.sessions  = stored.sessions||[];
  S.goals     = stored.goals||[];
  S._strengths= stored.strengths||{};
  S._bipTemplate    = stored._bipTemplate||null;
  S._bipTemplateName= stored._bipTemplateName||null;
  S._goalTemplate   = stored._goalTemplate||null;
  S._goalTemplateName=stored._goalTemplateName||null;
  S._fbaTemplate    = stored._fbaTemplate||null;
  S._fbaTemplateName= stored._fbaTemplateName||null;
  S._apiKey   = stored._apiKey||null;
  S._assSent  = stored._assSent||[];
  S._assScored= stored._assScored||[];
  S._measureTypes= stored._measureTypes||{};
  // _role is NOT loaded from stored data — Supabase user_roles table is the source of truth

  // Show user info in header
  renderUserBadge();
  storeUserMeta(); // save email/name for admin panel lookup

  rerender();
  tick();

  // Dismiss splash screen
  setTimeout(dismissSplash, 2000);
}

function renderUserBadge(){
  const u=_currentUser;
  if(!u) return;
  const name=u.user_metadata?.full_name||u.email||'Teacher';
  const avatar=u.user_metadata?.avatar_url;
  const roleLabel=S._role==='behaviorist'?'Behaviorist':'Teacher';
  const initials=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const badge=document.createElement('div');
  badge.id='user-badge';
  badge.style.cssText='position:fixed;bottom:16px;right:16px;z-index:9000;display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);border-radius:40px;padding:6px 14px 6px 8px;box-shadow:0 2px 12px rgba(0,0,0,.12);cursor:pointer;font-family:inherit';
  badge.title='Sign out';
  badge.onclick=signOut;
  badge.innerHTML=(avatar
    ?`<img src="${avatar}" style="width:28px;height:28px;border-radius:50%;object-fit:cover"/>`
    :`<div style="width:28px;height:28px;border-radius:50%;background:var(--nav);color:#fff;font-size:.7rem;font-weight:800;display:flex;align-items:center;justify-content:center">${initials}</div>`)
    +`<div style="line-height:1.2"><div style="font-size:.75rem;font-weight:700;color:var(--text)">${name.split(' ')[0]}</div><div style="font-size:.63rem;color:var(--muted)">${roleLabel} · Sign out</div></div>`;
  document.body.appendChild(badge);
}

async function signOut(){
  if(!confirm('Sign out of BehaviorLog Pro?')) return;
  await sb.auth.signOut();
  window.location.href='index.html';
}

// ── Register Service Worker (PWA / offline) ───────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(function(reg){
    console.log('Service worker registered');
    // Check for updates periodically
    setInterval(function(){ reg.update(); }, 60*60*1000); // hourly
  }).catch(function(err){
    console.log('Service worker registration failed:', err);
  });
}

boot();
</script>
