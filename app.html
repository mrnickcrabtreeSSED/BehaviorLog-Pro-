<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BehaviorLog"/>
<meta name="theme-color" content="#1e3a5f"/>
<link rel="manifest" href="/manifest.json"/>
<title>BehaviorLog Pro — Sure Step Education</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── DailyWins palette ── */
  --bg:#f2f0ec;
  --bg2:#e8e5df;
  --surface:#ffffff;
  --surface2:#f7f5f1;
  --surface3:#edeae4;
  --border:#dedad3;
  --border2:#c8c3ba;

  /* nav — Sure Step Education navy */
  --nav:#1e3a5f;
  --nav-text:#ffffff;

  /* primary action — Sure Step Education teal */
  --accent:#1a7fa8;
  --accent-soft:#ddf0f8; /* teal chip bg — verified AA on #0f5d7e label */
  --accent-hover:#15668a;

  /* secondary colors pulled directly from DailyWins pills */
  --orange:#e06018;   /* Sign Out / red-orange */
  --orange-soft:#fef0e6;
  --amber:#e8a100;    /* Schedule pill */
  --amber-soft:#fef8e2;
  --sky:#3498c0;      /* School Team pill */
  --sky-soft:#e5f2fa;
  --purple:#7b4ab4;   /* Customize pill */
  --purple-soft:#f1eaf8;

  /* text */
  --text:#1c1c1c;
  --text2:#3a3a3a;
  --muted:#88857e;

  /* semantic */
  --red:#d43c3c;
  --red-soft:#fdf0f0;
  --yellow:#d99200;
  --yellow-soft:#fef8e2;
  --green:#1a7fa8;
  --green-soft:#ddf0f8;

  --shadow:0 1px 3px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.05);
  --shadow-lg:0 4px 18px rgba(0,0,0,.11),0 1px 4px rgba(0,0,0,.06);

  /* parent portal */
  --pbg:#fff8f2;--psurface:#fff;--ptext:#1c1c1c;
  /* behaviorist session palette */
  --fba-green:#067a5f;
  --fba-soft:#e8f8f3;
  --fba-mid:#d0f0e4;
  --fba-dark:#044f3d;
  --paccent:#1a7fa8;--pmuted:#9a887e;--pborder:#ede5dc;
  --pgreen:#1a7fa8;
}

/* ── Base ────────────────────────────────────────────────────── */
html,body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  overflow-x:hidden;width:100%;max-width:100vw}
.app{max-width:900px;margin:0 auto;padding:0 0 90px;overflow-x:hidden}
.sub-view{padding:22px 22px 0;max-width:900px;margin:0 auto}
h1{font-size:1.6rem;font-weight:800;letter-spacing:-.4px;color:var(--nav-text)}
h2{font-size:1.25rem;font-weight:700;color:var(--text)}
h3{font-size:.95rem;font-weight:700;color:var(--text)}
.muted{color:var(--muted);font-size:.83rem}
.mono{font-family:'Courier New',monospace}

/* ── Layout helpers ──────────────────────────────────────────── */
.row{display:flex;align-items:center}
.between{justify-content:space-between}
.wrap{flex-wrap:wrap}
.gap1{gap:5px}.gap2{gap:10px}.gap3{gap:14px}.gap4{gap:18px}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:13px}.mt4{margin-top:20px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:13px}.mb4{margin-bottom:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.beh-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
@media(max-width:500px){.beh-grid{grid-template-columns:repeat(2,1fr)}}
/* ── Density token: comfortable mode (tablet at arm's length) ──
   Apply data-density="comfortable" to <body> to bump text +15%.
   Designed for in-classroom iPad use where readability > density. ── */
/* ── density="comfortable" token — 15% text bump for in-classroom iPad use ─
   Apply: document.body.dataset.density='comfortable'
   Remove: delete document.body.dataset.density                              */
[data-density="comfortable"]{font-size:108%}
[data-density="comfortable"] .beh-label{font-size:.85rem}
[data-density="comfortable"] .beh-icon{font-size:1.8rem}
[data-density="comfortable"] .beh-btn{min-height:108px}
[data-density="comfortable"] .slabel{font-size:.74rem;letter-spacing:1.5px}
[data-density="comfortable"] .beh-grid-standalone{grid-template-columns:repeat(4,1fr);gap:12px}
[data-density="comfortable"] .beh-grid-side{grid-template-columns:repeat(3,1fr);gap:11px}
[data-density="comfortable"] .btn{font-size:.84rem;padding:9px 18px}
[data-density="comfortable"] .beh-empty-label{font-size:.95rem}
[data-density="comfortable"] .beh-empty-hint{font-size:.8rem}

/* ── Typography ──────────────────────────────────────────────── */
.slabel{font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
  border-radius:16px;font-size:.71rem;font-weight:700}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}

/* ── Sure Step Education nav bar ─────────────────────────────── */
:root{
  --sse-navy:#1e3a5f;
  --sse-teal:#2a8fa8;
  --sse-blue:#1a6fa8;
  --nav:#1e3a5f;
  --nav-text:#ffffff;
}
.app-header{
  background:var(--sse-navy);
  padding:0 26px;
  height:62px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:0;
  position:sticky;
  top:0;
  z-index:50;
  box-shadow:0 2px 10px rgba(30,58,95,.35);
}
/* Notch spacer — fills the area behind the camera/Dynamic Island */
.notch-spacer{
  background:var(--sse-navy);
  height:env(safe-area-inset-top,0);
  position:sticky;
  top:0;
  z-index:51;
  width:100%;
}
.app-header h1{display:none}
.app-header p{display:none}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-svg{height:38px;width:auto;flex-shrink:0}
.nav-logo-text{display:flex;flex-direction:column;line-height:1}
.nav-logo-text .sse-name{
  font-size:1.1rem;font-weight:800;color:#fff;letter-spacing:-.2px;line-height:1.1}
.nav-logo-text .sse-sub{
  font-size:.65rem;font-weight:600;color:rgba(255,255,255,.6);
  letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.nav-actions{display:flex;align-items:center;gap:7px}
.page-body{padding:22px 22px 0;max-width:900px;margin:0 auto}

/* ── Cards ───────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-accent{border-left:4px solid var(--accent)}

/* ── Buttons — match DailyWins pill style ────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;
  border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:700;
  font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.42;cursor:not-allowed}

/* primary = teal green (Students) */
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 6px rgba(26,127,168,.3)}
.btn-primary:hover:not(:disabled){background:var(--accent-hover);transform:translateY(-1px)}

/* ghost */
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--accent);background:var(--accent-soft)}

/* danger */
.btn-danger{background:var(--red-soft);color:var(--red);border:1.5px solid #f5b8b8}
.btn-danger:hover:not(:disabled){background:#fde8e8}

/* orange accent (Sign Out style) */
.btn-orange{background:var(--orange);color:#fff;box-shadow:0 2px 6px rgba(224,96,24,.3)}
.btn-orange:hover:not(:disabled){background:#c4531a;transform:translateY(-1px)}

/* amber (Schedule style) */
.btn-amber{background:var(--amber);color:#fff;box-shadow:0 2px 6px rgba(232,161,0,.3)}
.btn-amber:hover:not(:disabled){background:#c98c00;transform:translateY(-1px)}

/* sky (School Team style) */
.btn-sky{background:var(--sky);color:#fff;box-shadow:0 2px 6px rgba(52,152,192,.3)}
.btn-sky:hover:not(:disabled){background:#2a7fa8;transform:translateY(-1px)}

/* purple (Customize style) */
.btn-purple{background:var(--purple);color:#fff;box-shadow:0 2px 6px rgba(123,74,180,.3)}
.btn-purple:hover:not(:disabled){background:#663da0;transform:translateY(-1px)}

.btn-sm{padding:5px 11px;font-size:.75rem;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:.69rem;border-radius:6px}

/* ── Inputs ──────────────────────────────────────────────────── */
.input{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);
  border-radius:8px;padding:8px 12px;font-size:.86rem;font-family:inherit;
  outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,127,168,.12);background:#fff}
textarea.input{resize:vertical;min-height:70px}
select.input{cursor:pointer}

/* ── Client cards ────────────────────────────────────────────── */
.client-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:18px;margin-bottom:12px;
  box-shadow:var(--shadow);transition:box-shadow .2s,border-color .2s}
.client-card:hover{box-shadow:var(--shadow-lg);border-color:var(--border2)}
.client-avatar{width:42px;height:42px;border-radius:10px;
  background:var(--nav);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:1rem;flex-shrink:0}
.client-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

/* ── Behavior buttons ────────────────────────────────────────── */
/* Standalone = 4-up fixed grid; side-by-side = 3-up fixed grid.
   Tiles grow vertically as needed so icon + label always fit on small phones.
   GRID RULES (locked, do not change):
     Standalone view  → always 4 columns (.beh-grid-standalone)
     Side-by-side     → always 3 columns per student (.beh-grid-side)
     >8 behaviors     → scroll inside .beh-grid-wrap, never reflow
   MOTION TOKENS (standardize easing to ease-in-out except fade):
     beh-pulse: 1.5s ease-in-out  |  pulse: 1s ease-in-out
     splashFloat: 4-5s ease-in-out  |  fade: .22s ease (only exception) */

/* ── Grid layouts (locked column counts) ───────────────────────────────── */
.beh-grid-standalone{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.beh-grid-side{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
/* Scroll container: >8 behaviors scroll here, not reflow */
.beh-grid-wrap{max-height:320px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
/* Legacy .beh-grid kept for non-interval views */

/* ── Behavior button base ────────────────────────────────────────────────── */
.beh-btn{
  /* Removed aspect-ratio:1/1 — was crowding out the label text on small tiles.
     Buttons now grow vertically as needed so icon + label are always readable. */
  border-radius:10px;background:var(--surface2);
  border:1.5px solid var(--border);cursor:pointer;text-align:center;
  transition:border-color .15s ease-in-out,background .15s ease-in-out,
             box-shadow .15s ease-in-out,opacity .22s ease-in-out;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:6px;position:relative;
  min-height:96px;padding:12px 6px;
  width:100%;box-sizing:border-box}
.beh-btn:hover{border-color:var(--accent);background:var(--accent-soft)}
.beh-icon{font-size:1.6rem;line-height:1;flex-shrink:0}
/* Behaviors have no emoji — hide the empty icon slot so the label stays centered */
.beh-icon:empty{display:none}
/* Label is always visible — never clipped to invisibility on small tiles */
.beh-label{
  font-size:.78rem;font-weight:700;color:var(--text2);line-height:1.2;
  word-break:break-word;hyphens:auto;max-width:100%;padding:0 2px;
  display:block;overflow:visible}
.beh-selected{border-color:var(--accent)!important;background:var(--accent-soft)!important}

/* ── States ─────────────────────────────────────────────────────────────── */
/* RECORDING: loudest thing on screen */
.beh-recording{
  border-color:var(--red)!important;
  background:#fde4e6!important;
  animation:beh-pulse 1.5s ease-in-out infinite;
  z-index:1}
/* Non-recording siblings dim so eye locks on active timer */
.beh-dimmed{opacity:.6;transition:opacity .22s ease-in-out}
/* Disabled / locked (e.g. incident running on another device) */
.beh-disabled{opacity:.38;pointer-events:none;filter:grayscale(.6)}
/* Empty state — shown when no behaviors are selected */
.beh-empty{
  background:var(--surface2);border:1.5px dashed var(--border);
  border-radius:12px;padding:28px 16px;text-align:center;margin-bottom:16px}
.beh-empty-icon{font-size:2rem;margin-bottom:8px}
.beh-empty-label{font-weight:700;color:var(--muted);font-size:.88rem}
.beh-empty-hint{font-size:.74rem;color:var(--muted);margin-top:4px;line-height:1.5}

/* ── Recording pulse animation ───────────────────────────────────────────── */
@keyframes beh-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(212,60,60,.4);border-color:#f87171}
  50%{box-shadow:0 0 0 8px rgba(212,60,60,0);border-color:var(--red)}
}
/* Scored state in interval recording (green variant of selected) */
.beh-scored{
  border-color:var(--fba-green)!important;
  background:var(--fba-mid)!important}

/* ── Session type selector ───────────────────────────────────── */
.sess-type-card{border:2px solid var(--border);border-radius:12px;padding:18px;
  cursor:pointer;transition:all .2s;background:var(--surface);text-align:center}
.sess-type-card:hover{border-color:var(--accent);background:var(--accent-soft)}
.sess-type-card.selected{border-color:var(--accent);background:var(--accent-soft);
  box-shadow:0 0 0 3px rgba(26,127,168,.15)}
.sess-type-icon{font-size:2.2rem;margin-bottom:8px}
.sess-type-title{font-weight:800;font-size:.95rem;color:var(--text);margin-bottom:4px}
.sess-type-desc{font-size:.76rem;color:var(--muted);line-height:1.5}

/* ── Live recording banner ───────────────────────────────────── */
.live-banner{background:linear-gradient(135deg,#e4f4f9,#cceaf4);border:1.5px solid #8dcde3;
  border-radius:10px;padding:12px 16px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  animation:pulse 1.2s ease-in-out infinite;display:inline-block;margin-right:7px} /* --dur-pulse */
/* Motion token: --dur-pulse:1.2s, --dur-beh:1.5s, --dur-float:4s, --dur-fade:.22s — all ease-in-out */
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.timer{font-family:'Courier New',monospace;font-size:2.1rem;color:var(--text);letter-spacing:3px}

/* ── Event feed ──────────────────────────────────────────────── */
.ev-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.ev-row:last-child{border-bottom:none}
.ev-badge{padding:2px 7px;border-radius:5px;font-size:.62rem;font-weight:700;
  font-family:'Courier New',monospace;text-transform:uppercase;white-space:nowrap}
.b-freq{background:#e8f3ff;color:#1a5fa8}.b-dur{background:#e4f4f9;color:#1a5f40}
.b-int{background:#fef8e2;color:#7a5200}.b-lat{background:#f3eeff;color:#5530a0}

/* ── Intensity pips ──────────────────────────────────────────── */
.int-bar{display:flex;gap:6px;margin-top:9px}
.int-pip{flex:1;height:38px;border-radius:8px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;font-size:.67rem;font-weight:800;
  transition:all .15s;border:2px solid transparent}
.int-pip:hover{transform:scaleY(1.06);filter:brightness(1.08)}

/* ── Stats ───────────────────────────────────────────────────── */
.stat-box{background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:13px;text-align:center}
.stat-n{font-family:'Courier New',monospace;font-size:1.6rem;font-weight:500;color:var(--accent)}
.stat-l{font-size:.68rem;color:var(--muted);margin-top:3px;font-weight:600}

/* ── Progress bars ───────────────────────────────────────────── */
.prog-track{height:7px;background:var(--surface3);border-radius:8px;overflow:hidden;margin:5px 0}
.prog-fill{height:100%;border-radius:8px;transition:width .4s ease}

/* ── Goal cards ──────────────────────────────────────────────── */
.goal-card{background:var(--surface);border:1px solid var(--border);
  border-radius:11px;padding:15px;margin-bottom:11px;box-shadow:var(--shadow)}
.goal-met{border-color:#7ec8e0!important;background:var(--green-soft)!important}
.goal-risk{border-color:#f5aaaa!important;background:var(--red-soft)!important}

/* ── PIN ─────────────────────────────────────────────────────── */
.pin-box{font-family:'Courier New',monospace;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:7px;padding:6px 12px;
  color:var(--accent);font-size:.95rem;letter-spacing:3px;min-width:72px;text-align:center}

/* ── Misc ────────────────────────────────────────────────────── */
.empty{text-align:center;padding:48px 22px;color:var(--muted)}
.empty-icon{font-size:3rem;opacity:.3;margin-bottom:12px}
.back-btn{display:inline-flex;align-items:center;gap:5px;color:var(--muted);
  font-size:.82rem;cursor:pointer;margin-bottom:16px;border:none;background:none;
  font-family:inherit;font-weight:600;padding:0}
.back-btn:hover{color:var(--accent)}
.scroll{max-height:280px;overflow-y:auto}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.fade{animation:fadein .22s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.chip{padding:12px 15px;border-radius:10px;background:var(--surface);
  border:1px solid var(--border);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.chip:hover{border-color:var(--accent);background:var(--accent-soft)}

/* ── Modal ───────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(20,20,26,.42);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:16px;padding:26px;max-width:400px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.18);max-height:85vh;overflow-y:auto}

/* ── Icon picker ─────────────────────────────────────────────── */
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;
  max-height:160px;overflow-y:auto;margin-top:8px}
.icon-opt{padding:7px;border-radius:7px;border:1.5px solid var(--border);
  cursor:pointer;text-align:center;font-size:1.15rem;transition:all .15s}
.icon-opt:hover{border-color:var(--accent);background:var(--accent-soft)}
.icon-opt.selected{border-color:var(--accent);background:var(--accent-soft)}

/* ── Mode selector tabs — DailyWins Entry/Weekly/Monthly/Annual style ── */
.mode-bar{display:flex;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;padding:3px;gap:3px;box-shadow:var(--shadow)}
.mode-btn{flex:1;padding:7px 14px;border-radius:7px;border:none;background:transparent;
  color:var(--muted);font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s}
.mode-btn.active{background:var(--nav);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.2)}

/* ── Parent portal ───────────────────────────────────────────── */
.papp{background:linear-gradient(160deg,#fff8f4 0%,#fff2ea 100%);min-height:100vh;font-family:inherit}
.pcont{max-width:640px;margin:0 auto;padding:26px 18px 70px}
.pheader{background:linear-gradient(135deg,#e06018 0%,#f59e0b 100%);padding:24px 28px;
  border-radius:14px;margin-bottom:22px;color:#fff;box-shadow:0 8px 28px rgba(224,96,24,.28)}
.pcard{background:#fff;border:1px solid var(--pborder);border-radius:13px;padding:18px;
  margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.win-card{background:linear-gradient(135deg,#e4f4f9 0%,#f0f9f5 100%);
  border:2px solid #8ecfb4;border-radius:13px;padding:20px;margin-bottom:12px}
.pin-dots{display:flex;gap:11px;justify-content:center;margin:18px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--paccent);transition:all .15s}
.pin-dot.filled{background:var(--paccent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:268px;margin:0 auto}
.pin-key{padding:14px;border-radius:10px;border:1.5px solid var(--pborder);
  background:#fff;font-size:1.2rem;font-weight:700;cursor:pointer;
  transition:all .15s;color:var(--ptext);font-family:inherit;text-align:center}
.pin-key:hover{background:#fff3ec;border-color:var(--paccent)}
.pin-err{color:#c0392b;font-size:.82rem;text-align:center;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.brow-p{display:flex;align-items:center;justify-content:space-between;

/* ── Touch device optimizations ──────────────────────────────── */
@media(hover:none) and (pointer:coarse){
  /* Remove hover effects that cause sticky states on touch */
  .btn:hover:not(:disabled){transform:none}
  .client-card:hover{box-shadow:var(--shadow);border-color:var(--border)}
  .chip:hover{border-color:var(--border);background:var(--surface)}
  .beh-btn:hover{border-color:var(--border);background:var(--surface2)}
  /* Active states instead */
  .btn:active:not(:disabled){transform:scale(.97);opacity:.85}
  .beh-btn:active{border-color:var(--accent);background:var(--accent-soft);transform:scale(.96)}
  .client-card:active{border-color:var(--border2)}
  /* Larger touch targets — but don't shrink the base min-height that the label needs */
  .int-pip{min-height:44px}
  /* Prevent text selection on rapid taps */
  .beh-btn,.btn,.int-pip,.client-card{-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  /* Prevent double-tap zoom globally */
  *{touch-action:manipulation}
  /* Smooth scrolling */
  .scroll{-webkit-overflow-scrolling:touch}
}

/* ── Safe area for devices with notch/gesture bar ────────────── */

<script>
// ── Supabase Config — replace with your project values ────────────────────
const SUPABASE_URL  = 'https://jroporggvvmgrczdhnme.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyb3BvcmdndnZtZ3JjemRobm1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjA1MjMsImV4cCI6MjA5MDM5NjUyM30.iLEM2Lh4Ob0H6qua9kqGArspnkXu8cbSBe5WFj8fT20';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Auth guard — redirect to login if not signed in ────────────────────────
let _currentUser = null;
async function initAuth(){
  try{
    const {data:{session}} = await sb.auth.getSession();
    if(!session){ window.location.href='index.html'; return false; }
    _currentUser = session.user;
    return true;
  }catch(e){
    console.error('Auth error (possibly offline):',e);
    // If offline, check if we have cached user data
    try{
      const local=localStorage.getItem(KEY);
      if(local){
        S._offline=true;
        _currentUser={id:'offline',email:'offline'};
        updateOfflineBanner();
        return true;
      }
    }catch(le){}
    window.location.href='index.html';
    return false;
  }
}

// ── Storage — Supabase cloud sync ──────────────────────────────────────────
const KEY='bl_v5'; // kept for legacy localStorage migration
let _saveTimer=null;

async function loadFromCloud(){
  try{
    const {data,error}=await sb.from('user_data').select('data').eq('user_id',_currentUser.id).single();
    if(error&&error.code!=='PGRST116') throw error;
    if(data&&data.data){
      // Keep local backup
      try{localStorage.setItem(KEY,JSON.stringify(data.data));}catch(e){}
      return data.data;
    }
    // Try migrating from localStorage on first cloud load
    const local=localStorage.getItem(KEY);
    if(local){ const parsed=JSON.parse(local); await saveToCloud(parsed); return parsed; }
    return {};
  }catch(e){
    console.error('Cloud load error:',e);
    // Offline fallback — load from localStorage
    try{
      const local=localStorage.getItem(KEY);
      if(local){
        S._offline=true;
        console.log('Loaded from local backup (offline)');
        return JSON.parse(local);
      }
    }catch(le){}
    return {};
  }
}

async function saveToCloud(d){
  try{
    await sb.from('user_data').upsert({user_id:_currentUser.id,data:d},{onConflict:'user_id'});
    if(S._offline){S._offline=false;updateOfflineBanner();}
  }catch(e){
    console.error('Cloud save error:',e);
    S._offline=true;
    updateOfflineBanner();
  }
}

// ── Shared access (teacher ↔ behaviorist / school psych) ───────────────────
// (a) Loads the shares I created as owner (for card badges + the Share modal).
// (b) Pulls students shared WITH me via the security-definer RPC and merges them
//     into S.clients/sessions/goals tagged _shared (read-only; excluded from persist).
async function loadShares(){
  if(S._offline || !_currentUser || _currentUser.id==='offline') return;
  try{
    const {data:mine}=await sb.from('student_shares').select('*').eq('owner_id',_currentUser.id);
    S._myShares=mine||[];
  }catch(e){ console.warn('loadShares(owner) failed:',e); S._myShares=S._myShares||[]; }
  try{
    const {data:rows,error}=await sb.rpc('get_shared_students');
    if(error) throw error;
    // Re-merge cleanly: drop any prior shared items first
    S.clients=S.clients.filter(c=>!c._shared);
    S.sessions=S.sessions.filter(s=>!s._shared);
    S.goals=S.goals.filter(g=>!g._shared);
    (rows||[]).forEach(r=>{
      if(!r.client) return;
      S.clients.push({...r.client,_shared:true,_ownerEmail:r.owner_email,_ownerId:r.owner_id,_access:r.access,_specialistRole:r.specialist_role});
      (r.sessions||[]).forEach(s=>S.sessions.push({...s,_shared:true}));
      (r.goals||[]).forEach(g=>S.goals.push({...g,_shared:true}));
    });
  }catch(e){ console.warn('loadShares(rpc) failed:',e); }
}

function load(){ return {}; } // stub — real data loaded async in boot()
function save(d){
  // Always save locally for offline backup
  try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}
  // Debounce — save 1.5s after last change to avoid hammering DB
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>saveToCloud(d),1500);
}

function updateOfflineBanner(){
  let banner=document.getElementById('offline-banner');
  if(S._offline){
    if(!banner){
      banner=document.createElement('div');
      banner.id='offline-banner';
      banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:200;background:#e06018;color:#fff;text-align:center;padding:6px 12px;padding-top:calc(6px + env(safe-area-inset-top,0));font-size:.78rem;font-weight:700;font-family:inherit;transition:transform .3s ease';
      banner.innerHTML='📡 Offline — data saving locally, will sync when reconnected';
      document.body.appendChild(banner);
      // Push header down
      const hdr=document.querySelector('.app-header');
      if(hdr) hdr.style.top='32px';
    }
  } else {
    if(banner){
      banner.innerHTML='✅ Back online — syncing...';
      banner.style.background='#067a5f';
      setTimeout(()=>{
        banner.remove();
        const hdr=document.querySelector('.app-header');
        if(hdr) hdr.style.top='0';
      },2000);
    }
  }
}

// Listen for online/offline events
window.addEventListener('online',function(){
  if(S._offline){
    S._offline=false;
    updateOfflineBanner();
    persist(); // sync pending data
  }
});
window.addEventListener('offline',function(){
  S._offline=true;
  updateOfflineBanner();
});

// ── Render ─────────────────────────────────────────────────────────────────
let _tick=null;
let _intervalTick=null;
function render(){
  // ── Preserve scroll position + focus across full innerHTML rebuilds ──
  // The page can scroll in three places: (a) window/document — main page,
  // (b) the .modal element — session-setup modal scrolls internally,
  // (c) any .beh-grid-wrap — behavior grids with >8 buttons scroll inside.
  // Capture all three before innerHTML is rewritten.

  // (a) Window scroll — iPad Safari uses documentElement, others use window.
  const _scrollY = window.scrollY || window.pageYOffset || document.documentElement.scrollTop || 0;

  // (b) Modal scroll — only one modal is ever open; capture its scrollTop.
  const _modalEl = document.querySelector('.modal');
  const _modalScroll = _modalEl ? _modalEl.scrollTop : 0;

  // (c) Behavior-grid wrappers — capture by index so we can restore in order.
  const _gridWraps = document.querySelectorAll('.beh-grid-wrap');
  const _gridScrolls = [];
  _gridWraps.forEach(el => _gridScrolls.push(el.scrollTop));

  // Focus + caret position for active text input
  const _ae = document.activeElement;
  const _focusId = (_ae && _ae.id) ? _ae.id : null;
  let _selStart = null, _selEnd = null;
  if (_focusId && _ae && typeof _ae.selectionStart === 'number') {
    _selStart = _ae.selectionStart;
    _selEnd   = _ae.selectionEnd;
  }

  // ── Rebuild DOM ────────────────────────────────────────────────────
  document.getElementById('app').innerHTML=buildApp();

  // ── Restore focus first (with preventScroll so focusing doesn't jump) ──
  if (_focusId) {
    const el = document.getElementById(_focusId);
    if (el) {
      try { el.focus({ preventScroll: true }); } catch(e) { try { el.focus(); } catch(_){} }
      if (_selStart != null && typeof el.setSelectionRange === 'function') {
        try { el.setSelectionRange(_selStart, _selEnd); } catch(e){}
      }
    }
  }

  // ── Restore window scroll on all platforms ──────────────────────────
  if(_scrollY > 0){
    try { window.scrollTo({ top: _scrollY, behavior: 'instant' }); } catch(e){ window.scrollTo(0, _scrollY); }
    document.documentElement.scrollTop = _scrollY;
    document.body.scrollTop = _scrollY;
  }

  // ── Restore modal scroll ────────────────────────────────────────────
  // The modal element was destroyed and recreated, so we must look it up again.
  if (_modalScroll > 0) {
    const newModal = document.querySelector('.modal');
    if (newModal) newModal.scrollTop = _modalScroll;
  }

  // ── Restore behavior-grid scroll (matched by index) ─────────────────
  if (_gridScrolls.length > 0) {
    const newGrids = document.querySelectorAll('.beh-grid-wrap');
    newGrids.forEach((el, i) => {
      if (_gridScrolls[i] != null && _gridScrolls[i] > 0) el.scrollTop = _gridScrolls[i];
    });
  }
}
function rerender(){render();}
function tick(){
  clearInterval(_tick);
  _tick=setInterval(()=>{
    if(S.durRunning)S.durElapsed=Date.now()-S.durStart;
    if(S.latRunning)S.latElapsed=Date.now()-S.latStart;
    // Multi-client: update banner for focused session
    const fcs=cs();
    if(fcs){
      const elapsed=Date.now()-fcs.startedAt;
      const el=document.getElementById('sess-elapsed');
      if(el)el.textContent=fmt(elapsed)+' elapsed';
      const rem=document.getElementById('sess-remain');
      if(rem&&fcs.plannedMins){
        const plannedMs=fcs.plannedMins*60000;
        const over=elapsed>plannedMs;
        const diff=over?elapsed-plannedMs:plannedMs-elapsed;
        rem.textContent=over?'⚠ +'+fmt(diff)+' over':'⏱ '+fmt(diff)+' left';
        rem.style.color=over?'var(--red)':'var(--muted)';
        const banner=rem.closest('.live-banner');
        if(banner)banner.style.background=over?'linear-gradient(135deg,#fde4e6,#ffe4e6)':'';
      }
      // Update tab badge counters
      S.multiSessions.forEach((_,i)=>{
        const badge=document.getElementById('tab-badge-'+i);
        if(badge)badge.textContent=S.multiSessions[i].events.length;
      });
      // incident timer for focused client
      if(fcs.incident){
        const elapsed2=Date.now()-fcs.incident.startMs;
        S.multiSessions[S.activeClientIdx].incident.elapsed=elapsed2;
        const dt=document.getElementById('dur-timer');
        if(dt)dt.textContent=fmt(elapsed2);
        const mini=document.getElementById('inc-mini-timer');
        if(mini)mini.textContent=fmt(elapsed2);
      }
      const lt=document.getElementById('lat-timer');if(lt)lt.textContent=fmt(fcs.latElapsed||0);
    }
    // Legacy single-session compat
    if(S.activeSess&&!S.isMulti){
      const elapsed=Date.now()-S.activeSess.startedAt;
      const el=document.getElementById('sess-elapsed');
      if(el)el.textContent=fmt(elapsed)+' elapsed';
      // update all concurrent incident timers (single session)
      Object.values(S.incidents).forEach(inc=>{
        inc.elapsed=Date.now()-inc.startMs;
        const el=document.getElementById('inc-timer-'+inc.behId);
        if(el)el.textContent=fmt(inc.elapsed);
      });
      // update multi-session slot incident timers
      if(S.isMulti){
        const slot=cs();
        if(slot&&slot.incidents){
          Object.values(slot.incidents).forEach(inc=>{
            inc.elapsed=Date.now()-inc.startMs;
            const el=document.getElementById('inc-timer-m-'+inc.behId);
            if(el)el.textContent=fmt(inc.elapsed);
          });
        }
      }
      const lt=document.getElementById('lat-timer');if(lt)lt.textContent=fmt(S.latElapsed);
    }
  },200);
}

      inner=`<div class="row between mb3">
        <div>

  if(m.type==='exportPDF'){

        <div style="width:22px;height:22px;border-radius:6px;border:2px solid ${on?'var(--accent)':'var(--border2)'};background:${on?'var(--accent)':'#fff'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s">

        <a href="mailto:nick@surestepeducation.com?subject=BehaviorLog%20Pro%20%E2%80%94%20AI%20Document%20Generation%20Inquiry&body=Hi%20Nick%2C%0A%0AI%27m%20interested%20in%20enabling%20the%20AI-assisted%20BIP%2FFBA%2Fgoal%20generation%20feature%20in%20BehaviorLog%20Pro.%20Please%20send%20me%20information%20about%20the%20administrative%20agreement%20and%20DPA%20requirements.%0A%0AOrganization%3A%20%0ARole%3A%20%0ANumber%20of%20behaviorists%3A%20%0A%0AThanks%21" class="btn btn-primary" style="flex:1;min-width:200px;text-align:center;text-decoration:none">📧 Contact Sure Step</a>
        ${!showLearnMore?`<button class="btn btn-ghost" onclick="S._modal.expanded=true;rerender()" style="flex:1;min-width:140px">${'ℹ️ Learn More'}</button>`:`<button class="btn btn-ghost" onclick="S._modal.expanded=false;rerender()" style="flex:1;min-width:140px">Show Less</button>`}

  }

  return `<div class="modal-overlay" onclick="${showClose?'overlayClose(event)':''}"><div class="modal">${inner}</div></div>`;
}

              ${S._selected[c.id]?'<span style="color:#fff;font-size:.75rem;font-weight:900">✓</span>':''}
            </div>`:''}
            <div class="client-avatar">${initials(c.name)}</div>
            <div>
              <div style="font-weight:800;font-size:1.05rem">${esc(c.name)}</div>

          ${S._selectMode?'':`<button class="btn btn-ghost btn-sm" onclick="openManualEntry('${c.id}')" title="Manual data entry" style="color:var(--purple)">📝 Enter</button>`}

            ${S._selectMode?'':`<button class="btn btn-ghost btn-sm desktop-only" title="Student settings" onclick="openClientSettings('${c.id}')">⚙️</button>`}
            ${S._selectMode?'':`<button class="btn btn-ghost btn-sm desktop-only" title="Delete student" style="color:var(--red);border:1.5px solid #fca5a5;background:#fff5f5" onclick="confirmDeleteClient('${c.id}')">🗑</button>`}

    if(!filtered.length) out+=`<div class="empty" style="padding:20px"><p class="muted" style="font-size:.85rem">No students matching "${esc(S._clientSearch)}"</p></div>`;

  out+='</div>'; // close page-body
